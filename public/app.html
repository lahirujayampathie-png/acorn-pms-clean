<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acorn Group PMS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Brand */
  --navy:#1B2B6B;--navy-d:#111E4E;--navy-l:#EEF2FF;--navy-b:#C7D2FE;
  --blue:#2563EB;--blue-d:#1d4ed8;--blue-l:#EFF6FF;--blue-b:#BFDBFE;
  --red:#DC2626;--red-d:#B91C1C;--red-l:#FEF2F2;--red-b:#FECACA;
  --green:#16A34A;--green-d:#15803d;--green-l:#F0FDF4;--green-b:#BBF7D0;
  --amber:#D97706;--amber-l:#FFFBEB;--amber-b:#FDE68A;
  --teal:#0D9488;--teal-l:#F0FDFA;--teal-b:#99F6E4;
  --purple:#7C3AED;--purple-l:#F5F3FF;--purple-b:#DDD6FE;
  --orange:#EA580C;--orange-l:#FFF7ED;--orange-b:#FED7AA;
  --gold:#F59E0B;--gold-l:#FFFBEB;--gold-b:#FDE68A;
  /* Neutrals */
  --g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;
  --g400:#94A3B8;--g500:#64748B;--g600:#475569;--g700:#334155;
  --g800:#1E293B;--g900:#0F172A;
  --font:'DM Sans',system-ui,sans-serif;
  --r:8px;--r-lg:12px;--r-xl:16px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 16px rgba(0,0,0,.08);
  --sidebar:248px;--topbar:56px;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--g100);color:var(--g900);font-size:13px;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:var(--font)}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sidebar);flex-shrink:0;background:var(--navy-d);border-right:none;display:flex;flex-direction:column;overflow:hidden;box-shadow:4px 0 20px rgba(0,0,0,.15)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:var(--topbar);flex-shrink:0;background:#fff;border-bottom:2px solid var(--g100);display:flex;align-items:center;padding:0 28px;gap:12px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
#content{flex:1;overflow-y:auto;padding:24px}
.sb-header{padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{display:flex;align-items:center;gap:11px}
.sb-logo-area{padding:2px 0 6px}
.sb-a30-strip{display:flex;align-items:center;gap:6px;margin-top:6px;padding-top:6px;border-top:1px solid var(--g100)}
.sb-name{font-size:13px;font-weight:600;color:var(--g900)}.sb-sub{font-size:10px;color:var(--g400);margin-top:1px}
.sb-cycle{margin:10px 10px 0;background:rgba(255,255,255,.08);border-radius:var(--r);padding:8px 11px;border:1px solid rgba(255,255,255,.12)}
.sb-cycle-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.07em}
.sb-cycle-val{font-size:11px;color:rgba(255,255,255,.9);font-weight:600;margin-top:2px}
.sb-user{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-uname{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-urole{font-size:10px;color:rgba(255,255,255,.45);margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 8px 4px}
.sb-sec{font-size:9px;font-weight:700;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:.1em;padding:12px 12px 5px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);font-size:13px;color:rgba(255,255,255,.6);cursor:pointer;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;transition:background .15s,color .15s;position:relative;letter-spacing:.01em}
.sb-item:hover{background:rgba(255,255,255,.1);color:#fff}.sb-item.on{background:rgba(255,255,255,.14);color:#fff;font-weight:600;border-right:none}
.sb-item.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:22px;background:var(--gold);border-radius:0 3px 3px 0;box-shadow:0 0 8px rgba(245,158,11,.4)}
.sb-icon{font-size:14px;flex-shrink:0;opacity:.55;width:18px;text-align:center}.sb-item.on .sb-icon{opacity:1}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px;min-width:16px;text-align:center}
.sb-footer{padding:8px;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:3px}
.sb-foot-btn{padding:8px 12px;border-radius:var(--r);border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);font-size:12px;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;text-align:left}
.sb-foot-btn:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.9)}
#page-title{font-size:16px;font-weight:700;flex:1;color:var(--navy);letter-spacing:-.02em}
.cycle-pill{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;background:var(--green-l);color:var(--green);border:1px solid var(--green-b)}
.cycle-pill.mid{background:var(--amber-l);color:var(--amber);border-color:var(--amber-b)}
.cycle-pill.end{background:var(--red-l);color:var(--red);border-color:var(--red-b)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--r);font-size:12px;font-weight:500;border:1px solid var(--g200);background:#fff;color:var(--g700);cursor:pointer;transition:all .12s;white-space:nowrap;font-family:var(--font)}
.btn:hover{background:var(--g50);border-color:var(--g300)}.btn:active{transform:translateY(1px)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 1px 4px rgba(37,99,235,.25)}
.btn-blue:hover{background:var(--blue-d)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}.btn-green:hover{background:#15803d}
.btn-red{background:#fff;color:var(--red);border-color:var(--red-b)}.btn-red:hover{background:var(--red-l)}
.btn-amber{background:#fff;color:#92400E;border-color:#FCD34D}.btn-amber:hover{background:#FFFBEB}
.btn-ghost{border-color:transparent;background:transparent}.btn-ghost:hover{background:var(--g100)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.card{background:#fff;border:1px solid var(--g200);border-radius:var(--r-lg);padding:18px 20px;box-shadow:var(--sh);margin-bottom:14px}
.card-title{font-size:13px;font-weight:600;color:var(--g900);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-sub{font-size:11px;font-weight:400;color:var(--g400)}
.stats{display:grid;gap:12px;margin-bottom:16px}
.s5{grid-template-columns:repeat(5,1fr)}.s4{grid-template-columns:repeat(4,1fr)}.s3{grid-template-columns:repeat(3,1fr)}
.stat{background:#fff;border:1px solid var(--g200);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--sh);transition:all .2s;position:relative;overflow:hidden}
.stat:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.stat-val{font-size:26px;font-weight:600;line-height:1;margin-bottom:4px;letter-spacing:-.03em}
.stat-lbl{font-size:11px;color:var(--g500);font-weight:500}.stat-sub{font-size:10px;color:var(--g400);margin-top:3px}
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;font-size:10px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.06em;padding:9px 14px;border-bottom:1px solid var(--g200);white-space:nowrap}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--g100);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}.tbl tbody tr:hover td{background:var(--g50)}
.nc{display:flex;align-items:center;gap:9px}
.en{font-weight:500;color:var(--g900);font-size:12px}.es{font-size:10px;color:var(--g400);margin-top:1px}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.bd{background:var(--g100);color:var(--g600);border:1px solid var(--g200)}
.bs{background:var(--blue-l);color:var(--blue-d);border:1px solid var(--blue-b)}
.ba{background:var(--green-l);color:var(--green);border:1px solid var(--green-b)}
.br{background:var(--red-l);color:var(--red);border:1px solid var(--red-b)}
.bp{background:var(--amber-l);color:var(--amber);border:1px solid var(--amber-b)}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.av-sm{width:24px;height:24px;font-size:9px}.av-lg{width:42px;height:42px;font-size:15px}
.prog{display:flex;align-items:center;gap:8px}
.prog-bar{flex:1;height:5px;background:var(--g100);border-radius:99px;overflow:hidden;min-width:40px}
.prog-fill{height:100%;border-radius:99px;transition:width .3s}
.prog-pct{font-size:11px;color:var(--g500);min-width:32px;text-align:right}
.tabs{display:flex;border-bottom:1px solid var(--g200);margin-bottom:18px}
.tab{padding:9px 16px;font-size:12px;color:var(--g500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .12s;font-weight:500;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.tab:hover{color:var(--g800)}.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.fg{margin-bottom:13px}
.fl{display:block;font-size:11px;font-weight:600;color:var(--g600);margin-bottom:5px;letter-spacing:.01em}
.fi{width:100%;padding:8px 11px;border:1px solid var(--g300);border-radius:var(--r);font-size:12px;color:var(--g900);background:#fff;outline:none;transition:border-color .12s,box-shadow .12s;font-family:var(--font)}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea.fi{resize:vertical;min-height:65px}select.fi{cursor:pointer}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:var(--r-xl);width:600px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 25px 80px rgba(0,0,0,.18);border:1px solid var(--g200)}
.modal-lg{width:860px}
.mhead{padding:18px 22px 14px;border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.mtitle{font-size:14px;font-weight:700;color:var(--g900)}
.mbody{padding:18px 22px}.mfoot{padding:12px 22px 18px;border-top:1px solid var(--g200);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff}
.mx{background:none;border:none;font-size:20px;color:var(--g400);cursor:pointer;padding:0 4px;line-height:1}
.mx:hover{color:var(--g700)}
.kra-block{border:1px solid var(--g200);border-radius:var(--r-lg);margin-bottom:10px;overflow:hidden}
.kra-head{background:var(--g50);padding:11px 15px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;transition:background .1s}
.kra-head:hover{background:var(--g100)}
.kra-n{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kra-name{flex:1;font-size:12px;font-weight:600;color:var(--g900)}
.kra-wt{font-size:10px;color:var(--blue-d);font-weight:600;background:var(--blue-l);padding:2px 8px;border-radius:20px;border:1px solid var(--blue-b)}
.kra-sc{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.kra-body{padding:4px 15px 13px}
.kpi-hdr,.kpi-row{display:grid;align-items:center;gap:6px}
.kpi-hdr{padding:7px 0 3px;border-bottom:1px solid var(--g200);margin-bottom:2px}
.kpi-ch{font-size:9px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.05em;text-align:center}
.kpi-ch:first-child{text-align:left}
.kpi-row{padding:8px 0;border-bottom:1px solid var(--g100)}.kpi-row:last-child{border-bottom:none}
.kpi-txt{font-size:11px;color:var(--g700);line-height:1.45}.kpi-c{font-size:11px;color:var(--g500);text-align:center}
.kpi-inp{width:100%;padding:5px 6px;border:1px solid var(--g300);border-radius:6px;font-size:12px;text-align:center;font-family:var(--font);outline:none;transition:border-color .1s}
.kpi-inp:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,.1)}
.kpi-inp:disabled{background:var(--g50);opacity:.6}
.kpi-inp.active{border-color:var(--blue-b);background:var(--blue-l)}
.kpi-inp.mgr{border-color:var(--green-b);background:var(--green-l)}
.grid-std{grid-template-columns:1fr 66px 98px 82px 98px}
.grid-std-mgr{grid-template-columns:1fr 66px 98px 82px 98px 98px}
.grid-ext{grid-template-columns:1fr 72px 72px 66px 98px 82px 98px}
.alert{padding:10px 14px;border-radius:var(--r);font-size:12px;margin-bottom:12px;line-height:1.55;display:flex;gap:8px;align-items:flex-start}
.al-info{background:var(--blue-l);color:#1E40AF;border:1px solid var(--blue-b)}
.al-warn{background:var(--amber-l);color:#92400E;border:1px solid var(--amber-b)}
.al-ok{background:var(--green-l);color:#166534;border:1px solid var(--green-b)}
.al-err{background:var(--red-l);color:#991B1B;border:1px solid var(--red-b)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-row input,.filter-row select{padding:6px 10px;border:1px solid var(--g300);border-radius:var(--r);font-size:12px;font-family:var(--font);outline:none;color:var(--g900)}
.filter-row input{width:190px}.filter-row input:focus,.filter-row select:focus{border-color:var(--blue)}
.empty{text-align:center;padding:40px;color:var(--g400);font-size:13px}
.chip{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid var(--g200);color:var(--g500);display:inline-block;background:var(--g50)}
/* Cycle status */
.cycle-status-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.cs-item{background:#fff;border:1px solid var(--g200);border-radius:var(--r-lg);padding:14px 16px;position:relative;overflow:hidden;box-shadow:var(--sh)}
.cs-item.active{border-color:var(--blue)}.cs-item.active::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue)}
.cs-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g400);margin-bottom:5px}
.cs-item.active .cs-lbl{color:var(--blue)}
.cs-status{font-size:13px;font-weight:600;color:var(--g700);margin-bottom:2px}.cs-item.active .cs-status{color:var(--blue-d)}
.cs-date{font-size:10px;color:var(--g400)}
/* Supervisor info */
.sup-info{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--blue-l);border-radius:var(--r-lg);border:1px solid var(--blue-b);margin-bottom:14px}
.sup-lbl{font-size:9px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.sup-name{font-size:13px;font-weight:600;color:var(--blue-d)}.sup-role{font-size:10px;color:var(--g500)}
.locked-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#FFF7ED;border:1px solid #FED7AA;border-radius:var(--r-lg);margin-bottom:14px;font-size:12px;color:#9A3412}
/* Review type */
.rev-type-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--g200)}
.rev-type-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600}
.rt-mid{background:var(--amber-l);color:#92400E;border:1px solid var(--amber-b)}
.rt-annual{background:var(--green-l);color:#14532D;border:1px solid var(--green-b)}
/* Dev goals */
.dev-goal-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:9px 12px;background:var(--g50);border-radius:var(--r);border:1px solid var(--g200)}
.dev-num{width:22px;height:22px;border-radius:50%;background:var(--purple);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* Competencies */
.comp-card{border:1px solid var(--g200);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;background:#fff}
.comp-name{font-size:12px;font-weight:600;color:var(--g900);margin-bottom:3px}
.comp-def{font-size:11px;color:var(--g500);line-height:1.5;margin-bottom:10px}
.comp-ratings{display:flex;gap:20px;flex-wrap:wrap}
.comp-rating-col{flex:1;min-width:180px}
.comp-rating-lbl{font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.comp-rating-lbl.mgr{color:var(--blue)}
/* Rating scale key */
.rating-key{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.rating-key-item{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--r);font-size:11px;font-weight:500;border:1px solid var(--g200)}
/* HR Toggle */
.cycle-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--g100)}
.cycle-toggle-row:last-child{border-bottom:none}
.toggle-pill{width:44px;height:24px;border-radius:99px;border:none;cursor:pointer;position:relative;transition:background .22s;flex-shrink:0}
.toggle-pill.on{background:var(--green)}.toggle-pill.off{background:var(--g300)}
.toggle-pill::after{content:'';position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .22s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle-pill.on::after{left:23px}.toggle-pill.off::after{left:3px}
/* Phase tiles */
.phase-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:4px}
.phase-tile{background:#fff;border-radius:var(--r-xl);border:2px solid var(--g200);overflow:hidden;transition:all .2s;box-shadow:var(--sh);display:flex;flex-direction:column}
.phase-tile.open{border-color:var(--green);box-shadow:0 0 0 1px var(--green-b),var(--sh-md)}
.phase-tile-top{padding:18px 20px 16px;display:flex;flex-direction:column;gap:10px;flex:1}
.phase-tile.open .phase-tile-top{background:linear-gradient(145deg,#f0fdf4 0%,#fff 60%)}
.phase-tile-icon{font-size:28px;line-height:1}
.phase-tile-name{font-size:14px;font-weight:700;color:var(--g900);letter-spacing:-.01em}
.phase-tile-date-row{display:flex;align-items:center;gap:5px;font-size:11px}
.phase-tile-date-row .dv{font-weight:600;color:var(--g700)}
.phase-tile-date-row .darr{color:var(--g300)}
.phase-tile-status{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;width:fit-content}
.phase-tile-status.open{background:var(--green-l);color:var(--green);border:1px solid var(--green-b)}
.phase-tile-status.closed{background:var(--g100);color:var(--g500);border:1px solid var(--g200)}
.phase-tile-status .sd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.phase-tile-status.open .sd{background:var(--green)}
.phase-tile-status.closed .sd{background:var(--g300)}
.phase-tile-body{padding:16px 20px;border-top:1px solid var(--g100);background:var(--g50)}
.ptb-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.ptb-full{margin-bottom:10px}
.ptb-label{font-size:9px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.ptb-input{width:100%;padding:8px 10px;border:1.5px solid var(--g200);border-radius:var(--r);font-size:12px;color:var(--g900);font-family:var(--font);outline:none;background:#fff;transition:border-color .12s,box-shadow .12s}
.ptb-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.ext-info{display:flex;gap:7px;padding:8px 10px;background:var(--blue-l);border:1px solid var(--blue-b);border-radius:var(--r);font-size:10px;color:#1e40af;line-height:1.5;margin-bottom:10px}
.phase-tile-actions{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:10px;border-top:1px solid var(--g100)}
.phase-toggle-wrap{display:flex;align-items:center;gap:8px}
.phase-toggle-lbl{font-size:11px;color:var(--g500);font-weight:500}
/* Competency Dashboard Cards */
.comp-dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px}
.comp-dash-card{
  background:#fff;border:1.5px solid var(--g200);border-radius:var(--r-lg);
  padding:14px 15px;position:relative;overflow:hidden;
  transition:box-shadow .15s,transform .15s;cursor:default;
}
.comp-dash-card:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.comp-dash-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.cdc-1::before{background:linear-gradient(90deg,#2563EB,#60A5FA)}
.cdc-2::before{background:linear-gradient(90deg,#7C3AED,#A78BFA)}
.cdc-3::before{background:linear-gradient(90deg,#0D9488,#34D399)}
.cdc-4::before{background:linear-gradient(90deg,#DC2626,#F87171)}
.cdc-5::before{background:linear-gradient(90deg,#D97706,#FCD34D)}
.cdc-6::before{background:linear-gradient(90deg,#1B2B6B,#3B82F6)}
.comp-dash-num{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;margin-bottom:9px;flex-shrink:0}
.cdn-1{background:var(--blue)}.cdn-2{background:var(--purple)}.cdn-3{background:var(--teal)}
.cdn-4{background:var(--red)}.cdn-5{background:var(--amber)}.cdn-6{background:var(--navy)}
.comp-dash-name{font-size:11px;font-weight:700;color:var(--g800);line-height:1.35;margin-bottom:5px}
.comp-dash-def{font-size:10px;color:var(--g400);line-height:1.5}
.comp-dash-rating{margin-top:10px;padding-top:8px;border-top:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between}
.comp-dash-score{font-size:10px;font-weight:600;color:var(--g400)}

/* Year-end competency ratings table */
.comp-rate-table{width:100%;border-collapse:collapse;font-size:12px}
.comp-rate-table th{text-align:left;font-size:9px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.07em;padding:8px 12px;border-bottom:2px solid var(--g200)}
.comp-rate-table td{padding:12px;border-bottom:1px solid var(--g100);vertical-align:top}
.comp-rate-table tr:last-child td{border-bottom:none}
.comp-rate-table tbody tr:hover td{background:var(--g50)}
.comp-name-cell{font-size:11px;font-weight:600;color:var(--g900);margin-bottom:3px}
.comp-def-cell{font-size:10px;color:var(--g400);line-height:1.45}
.rating-select{padding:5px 8px;border:1.5px solid var(--g200);border-radius:var(--r);font-size:12px;font-family:var(--font);outline:none;background:#fff;min-width:140px;transition:border-color .12s}
.rating-select:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,.1)}
.comp-comment-inp{width:100%;padding:6px 9px;border:1px solid var(--g200);border-radius:var(--r);font-size:11px;font-family:var(--font);outline:none;margin-top:5px;transition:border-color .12s;resize:none}
.comp-comment-inp:focus{border-color:var(--blue)}
/* Toast */
#toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:var(--r-lg);font-size:12px;font-weight:500;z-index:999;opacity:0;transform:translateY(8px);transition:all .22s;pointer-events:none;max-width:320px;box-shadow:var(--sh-md)}
#toast.show{opacity:1;transform:translateY(0)}.t-ok{background:var(--green);color:#fff}.t-err{background:var(--red);color:#fff}.t-info{background:var(--g900);color:#fff}.t-warn{background:var(--amber);color:#fff}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--g300);border-radius:99px}
</style>
</head>

var _booting=true;
function xhr(method,url,body,cb){
  var r=new XMLHttpRequest();
  r.open(method,url,true); r.setRequestHeader('Content-Type','application/json'); r.withCredentials=true;
  r.onreadystatechange=function(){
    if(r.readyState!==4)return;
    if(r.status===401){
      if(!_booting){
        // Session expired mid-use — show message, don't loop
        toast('Session expired. Please save your work and log in again.','error');
        setTimeout(function(){window.location.replace('/');},3000);
      } else {
        cb('401',null);
      }
      return;
    }
    var d; try{d=JSON.parse(r.responseText);}catch(e){d={error:'Bad response'};}
    if(r.status>=400)cb(d.error||'Error '+r.status,null); else cb(null,d);
  };
  r.onerror=function(){cb('Network error',null);};
  r.send(body?JSON.stringify(body):null);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function initials(n){return String(n||'').split(' ').slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase();}
var AVC=[['#DBEAFE','#1E3A8A'],['#DCFCE7','#14532D'],['#EDE9FE','#4C1D95'],
         ['#FEF3C7','#78350F'],['#D1FAE5','#064E3B'],['#FCE7F3','#831843'],['#FEE2E2','#7F1D1D']];
function avc(id){return AVC[Math.abs(id||0)%AVC.length];}
function avEl(e,sz){

function bdg(s){

         not_started:'bd',self_submitted:'bs',mgr_submitted:'ba'};
  var l={draft:'Draft',submitted:'Submitted',approved:'Approved',rejected:'Returned',
         pending:'Pending',not_started:'Not Started',self_submitted:'Emp Submitted',mgr_submitted:'Mgr Reviewed'};
  return '<span class="badge '+(m[s]||'bd')+'">'+(l[s]||s||'Not Started')+'</span>';
}
function rBdg(r){
  if(!r)return'<span class="badge bd">\u2014</span>';
  var x=RATINGS.find(function(v){return v.r===r;});
  return x?'<span class="badge" style="background:'+x.bg+';color:'+x.col+'"><strong>'+r+'</strong> \u2014 '+x.lbl+'</span>'
          :'<span class="badge bd">'+r+'</span>';
}
function getRating(p){return RATINGS.find(function(r){return p>=r.min;})||RATINGS[4];}
function pb(p,col){
  var w=Math.min(Math.max(p||0,0),100);
  return '<div class="prog"><div class="prog-bar"><div class="prog-fill" style="width:'+w+'%;background:'+(col||'#3B82F6')+'"></div></div><span class="prog-pct">'+Math.round(p||0)+'%</span></div>';
}
// KRA achievement = sum(kpi_ach × kpi_weight/100) for all KPIs in KRA
// Overall score = sum(kra_ach × kra_weight/100) — direct weighted sum, no division needed
function calcKraAch(kra, phase){
  var kraAch=0, hasAny=false;
  (kra.kpis||[]).forEach(function(p){
    var a=(phase==='end')?(p.end_ach!=null?p.end_ach:p.mid_ach):p.mid_ach;
    if(a!=null){kraAch+=a*(p.kpi_weight/100);hasAny=true;}
  });
  return hasAny?Math.round(kraAch*10)/10:null;
}
function calcMgrKraAch(kra, phase){
  var kraAch=0, hasAny=false;
  (kra.kpis||[]).forEach(function(p){
    var a=(phase==='end')?(p.mgr_end_ach!=null?p.mgr_end_ach:p.mgr_mid_ach):p.mgr_mid_ach;
    if(a!=null){kraAch+=a*(p.kpi_weight/100);hasAny=true;}
  });
  return hasAny?Math.round(kraAch*10)/10:null;
}
function calcScore(kras,phase){
  if(!kras||!kras.length)return null;
  var W=0,T=0;
  kras.forEach(function(k){
    var ka=calcKraAch(k,phase);
    if(ka!=null){W+=ka*(k.kra_weight/100);T+=k.kra_weight;}
  });
  // W is already the weighted sum (e.g. 25%×30% + X%×70% = result %)
  // Normalise only if not all KRAs have data
  return T>0?Math.round((T===100?W:W/T*100)*10)/10:null;
}
function calcMgrScore(kras,phase){
  if(!kras||!kras.length)return null;
  var W=0,T=0;
  kras.forEach(function(k){
    var ka=calcMgrKraAch(k,phase);
    if(ka!=null){W+=ka*(k.kra_weight/100);T+=k.kra_weight;}
  });
  return T>0?Math.round((T===100?W:W/T*100)*10)/10:null;
}
function isHR(){return G.user&&G.user.role==='hr_admin';}
function rl(r){return RL[r]||0;}
function fmtD(ts){return ts?new Date(ts*1000).toLocaleDateString('en-GB'):'\u2014';}
function fmtDateRange(s,e){
  // s,e = 'YYYY-MM-DD' strings → '01 Apr – 30 Apr 2026'
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var sd=new Date(s),ed=new Date(e);
  var sm=months[sd.getMonth()],em=months[ed.getMonth()];
  var sy=sd.getFullYear(),ey=ed.getFullYear();
  var start=sd.getDate()+' '+sm+(sy!==ey?' '+sy:'');
  var end=ed.getDate()+' '+em+' '+ey;
  return start+' \u2013 '+end;
}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}

function toast(msg,type){

var editKRAs=null;


function pgGoals(){
  var cyc=G.cycle||{};
  xhr('GET','/api/goals/my',null,function(err,gs){
    if(err){
      setContent(
        '<div class="alert al-err">\u26a0 Could not load your goals. Please try refreshing.</div>'+
        '<div style="text-align:center;margin-top:20px">'+
        '<button class="btn btn-blue" onclick="resetGoalState()">&#8635; Reload My Goals</button></div>');
      return;
    }
    if(!gs&&!editKRAs){
      if(!cyc.goal_setting_open){
        setContent('<div class="alert al-warn" style="margin-top:20px">\u26aa Goal setting is currently <strong>closed</strong>. HR will open it when the cycle begins.</div>');
        return;
      }
      setContent(
        '<div class="alert al-info">You have not set goals for FY 2026\u201327 yet.</div>'+
        '<div class="card" style="text-align:center;padding:50px 20px">'+
        '<div style="font-size:48px;margin-bottom:14px">\ud83c\udfaf</div>'+
        '<div style="font-size:17px;font-weight:600;margin-bottom:8px">Set your FY 2026\u201327 Goals</div>'+
        '<div style="font-size:13px;color:var(--g400);margin-bottom:24px">Define KRAs and KPIs. All weights must total 100%.</div>'+
        '<button class="btn btn-blue" id="start-goals-btn">Start Goal Setting \u2192</button></div>');
      sel('start-goals-btn').onclick=startGoals;
      return;
    }
    var doRender=function(){
      var canEdit=(!gs||gs.status==='draft'||gs.status==='rejected');

      // Only load from server if editKRAs is null (fresh load or after save)
      // IMPORTANT: If status is 'approved', always use server data — supervisor may have amended weightages
      if(!editKRAs || (gs&&gs.status==='approved')){
        if(gs&&gs.kras&&gs.kras.length){
          editKRAs=JSON.parse(JSON.stringify(gs.kras));
        } else if(!gs){
          // No sheet at all — show start button
          if(canEdit){
            setContent(
              '<div class="alert al-info">You have not set goals for FY 2026\u201327 yet.</div>'+
              '<div class="card" style="text-align:center;padding:50px 20px">'+
              '<div style="font-size:48px;margin-bottom:14px">\ud83c\udfaf</div>'+
              '<div style="font-size:17px;font-weight:600;margin-bottom:8px">Set your FY 2026\u201327 Goals</div>'+
              '<div style="font-size:13px;color:var(--g400);margin-bottom:24px">Define KRAs and KPIs. All weights must total 100%.</div>'+
              '<button class="btn btn-blue" id="start-goals-btn">Start Goal Setting \u2192</button></div>');
            sel('start-goals-btn').onclick=startGoals;
          } else {
            setContent('<div class="alert al-warn" style="margin-top:20px">No goals found.</div>');
          }
          return;
        }
      }

      var src=(editKRAs&&editKRAs.length)?{kras:editKRAs,status:gs?gs.status:'draft'}:gs;
      xhr('GET','/api/goals/'+G.user.emp_no+'/dev-goals',null,function(de,dg){
        devGoals=(dg&&dg.length)?dg:[{goal_text:'',target_date:''},{goal_text:'',target_date:''}];
        devGoals.forEach(function(g,i){
          var tb=sel('dg-text-'+i),db2=sel('dg-date-'+i);
          if(tb&&tb.value.trim())g.goal_text=tb.value;
          if(db2&&db2.value)g.target_date=db2.value;
        });
        renderGoalPage(src,gs,canEdit);
      });
    };
    if(G.user.reports_to&&!G.supData){
      xhr('GET','/api/employees/'+G.user.reports_to,null,function(se,sup){G.supData=sup;doRender();});
    }else{doRender();}
  });
}

function renderGoalPage(src,gs,canEdit){
  var kras=src.kras||[];
  var kraTotal=kras.reduce(function(s,k){return s+(k.kra_weight||0);},0);
  var wtOk=Math.abs(kraTotal-100)<0.5;
  var sc=calcScore(kras,'mid'),rt=sc!=null?getRating(sc):null;
  var isLocked=gs&&gs.status==='approved';
  var isExt=isExtCo(G.user.company||'');

  var h='';
  // Supervisor info
  if(G.supData){
    var sup=G.supData,c=avc(sup.emp_no);
    h+='<div class="sup-info">'+
      '<div class="av av-sm" style="background:'+c[0]+';color:'+c[1]+'">'+initials(sup.name)+'</div>'+
      '<div><div class="sup-lbl">Your Supervisor</div>'+
      '<div class="sup-name">'+esc(sup.name)+'</div>'+
      '<div class="sup-role">'+esc(sup.designation||RLB[sup.role]||'')+'</div></div></div>';
  }
  if(isLocked&&!canEdit){
    h+='<div class="locked-banner">\ud83d\udd12 Your goals are <strong>approved and locked</strong>. Only your supervisor or HR can make changes. You can view at any time.</div>';
  }

  // Header row
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">'+
    '<div style="display:flex;align-items:center;gap:10px">'+bdg(gs?gs.status:'draft')+
    (gs&&gs.approved_by_name?'<span style="font-size:11px;color:var(--g400)">Approved by '+esc(gs.approved_by_name)+'</span>':'')+'</div>'+
    '<div style="display:flex;align-items:center;gap:8px">'+
    '<button class="btn btn-ghost btn-sm" style="font-size:11px;color:var(--g400)" onclick="resetGoalState()" title="If your page is stuck or not loading correctly, click this to reset">&#8635; Reload</button>'+
    '<div id="goal-action-btns"></div></div></div>';

  // Stats
  h+='<div class="stats s4" style="margin-bottom:14px">'+
    '<div class="stat"><div class="stat-val" id="kra-total-val" style="color:'+(wtOk?'#16A34A':'#DC2626')+'">'+kraTotal+'%</div>'+
    '<div class="stat-lbl">KRA Weight Total</div>'+
    '<div class="stat-sub" id="kra-total-sub" style="color:'+(wtOk?'#16A34A':'#DC2626')+'">'+(wtOk?'\u2713 100%':'\u26a0 Must equal 100%')+'</div></div>'+
    sCard(kras.length,'KRAs',kras.reduce(function(s,k){return s+(k.kpis?k.kpis.length:0);},0)+' KPIs',null)+
    sCard(sc!=null?sc+'%':'\u2014','Mid-Year Score',rt?rt.r+' \u2014 '+rt.lbl:'No data yet',rt?rt.col:null)+
    sCard('\u2014','Year-End Score','\ud83d\udd12 Post-calibration','#9CA3AF')+'</div>';

  if(gs&&gs.supervisor_comments)h+='<div class="alert al-ok">\u2713 <strong>Manager feedback:</strong> '+esc(gs.supervisor_comments)+'</div>';
  if(gs&&gs.status==='rejected')h+='<div class="alert al-err">\u2717 Goals returned for revision. Please update and resubmit.</div>';

  // Rating scale key
  h+=ratingKey();

  // KRA blocks
  var freqOpts=['Monthly','Quarterly','Annual'];
  kras.forEach(function(kra,ki){
    var kpiTotal=(kra.kpis||[]).reduce(function(s,k){return s+(k.kpi_weight||0);},0);
    var kpiOk=Math.abs(kpiTotal-100)<0.5;
    var kraAch=calcKraAch(kra,'mid'); // sum(kpi_ach × kpi_weight/100)
    var scBg=kraAch!=null?(kraAch>=85?'#F0FDF4':kraAch>=60?'#FFFBEB':'#FEF2F2'):'';
    var scCol=kraAch!=null?(kraAch>=85?'#14532D':kraAch>=60?'#78350F':'#7F1D1D'):'';
    // grid: std = desc | weight | mid | rating, ext adds track+assess
    var grid=isExt?'grid-template-columns:1fr 72px 72px 66px 98px 82px':'grid-template-columns:1fr 66px 98px 82px';
    h+='<div class="kra-block" id="kra-'+ki+'">'+
      '<div class="kra-head" id="kra-hd-'+ki+'" style="display:flex;align-items:center;gap:9px;padding:11px 15px;background:var(--g50)">'+
      '<div class="kra-n">'+(ki+1)+'</div>';
    if(canEdit){
      h+='<input class="fi" id="kra-nm-'+ki+'" style="flex:1;font-weight:600;font-size:12px;background:transparent;border-color:transparent" value="'+esc(kra.kra_name)+'">';
      h+='<span style="font-size:11px;color:var(--g500);margin-right:3px">Weight:</span>'+
        '<input type="number" class="fi" id="kra-wt-'+ki+'" style="width:58px;text-align:center;font-weight:600;color:var(--blue-d);background:var(--blue-l);border-color:var(--blue-b)" value="'+kra.kra_weight+'" min="0" max="100" oninput="liveKRACheck()">'+
        '<span style="font-size:11px;color:var(--g500)">%</span>';
    }else{
      h+='<div class="kra-name">'+esc(kra.kra_name)+'</div><span class="kra-wt">'+kra.kra_weight+'%</span>';
    }
    if(kraAch!=null)h+='<span class="kra-sc" style="background:'+scBg+';color:'+scCol+'">'+kraAch+'%</span>';
    if(canEdit)h+='<button class="btn btn-ghost btn-sm" id="kra-up-'+ki+'" style="padding:3px 7px;font-size:11px" title="Move Up">\u25b2</button>'+
      '<button class="btn btn-ghost btn-sm" id="kra-dn-'+ki+'" style="padding:3px 7px;font-size:11px" title="Move Down">\u25bc</button>'+
      '<button class="btn btn-red btn-sm" id="kra-rm-'+ki+'">Remove</button>';
    h+='<span id="kra-arr-'+ki+'" style="color:var(--g400);font-size:12px;margin-left:4px">\u25be</span></div>';

    h+='<div id="kra-bd-'+ki+'" class="kra-body">'+
      '<div style="display:grid;'+grid+';gap:6px;padding:7px 0 3px;border-bottom:1px solid var(--g200);margin-bottom:2px">'+
      '<div class="kpi-ch" style="text-align:left">KPI Description</div>'+
      (isExt?'<div class="kpi-ch">Track Freq</div><div class="kpi-ch">Assess Freq</div>':'')+
      '<div class="kpi-ch">KPI Wt%</div>'+
      '<div class="kpi-ch" style="color:var(--blue)">Mid-Year Ach%</div>'+
      '<div class="kpi-ch">Rating</div></div>';

    (kra.kpis||[]).forEach(function(kpi,pi){
      var midEnabled=gs&&gs.status==='approved';
      var aRt=kpi.mid_ach!=null?getMidIndicativeRating(kpi.mid_ach):null;
      h+='<div style="display:grid;'+grid+';gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid var(--g100)"><div>';
      if(canEdit){
        h+='<input class="fi" id="kpi-desc-'+ki+'-'+pi+'" style="font-size:11px" value="'+esc(kpi.desc)+'">';
        h+='<button class="btn btn-ghost" id="kpi-rm-'+ki+'-'+pi+'" style="color:var(--red);font-size:10px;padding:2px 4px;margin-top:2px">\u2715 remove</button>';
      }else{h+='<span class="kpi-txt">'+esc(kpi.desc)+'</span>';}
      h+='</div>';
      if(isExt){
        h+='<div class="kpi-c">';
        if(canEdit)h+='<select class="fi" id="kpi-tf-'+ki+'-'+pi+'" style="font-size:10px;padding:3px 4px">'+freqOpts.map(function(f){return'<option'+(kpi.track_freq===f?' selected':'')+'>'+f+'</option>';}).join('')+'</select>';
        else h+=esc(kpi.track_freq||'\u2014');
        h+='</div><div class="kpi-c">';
        if(canEdit)h+='<select class="fi" id="kpi-af-'+ki+'-'+pi+'" style="font-size:10px;padding:3px 4px">'+freqOpts.map(function(f){return'<option'+(kpi.assess_freq===f?' selected':'')+'>'+f+'</option>';}).join('')+'</select>';
        else h+=esc(kpi.assess_freq||'\u2014');
        h+='</div>';
      }
      h+='<div class="kpi-c">';
      if(canEdit)h+='<input class="kpi-inp" type="number" id="kpi-wt-'+ki+'-'+pi+'" min="0" max="100" value="'+kpi.kpi_weight+'" oninput="liveKPICheck('+ki+')">';
      else h+=kpi.kpi_weight+'%';
      h+='</div>';
      h+='<div class="kpi-c"><input class="kpi-inp active" type="number" id="kpi-mid-'+ki+'-'+pi+'" min="0" max="200" step="any" value="'+(kpi.mid_ach!=null?kpi.mid_ach:'')+'" placeholder="Enter%"'+(midEnabled?'':' disabled')+' oninput="liveKPIAchCheck(this,'+ki+','+pi+')"></div>';
      h+='<div class="kpi-c">'+(aRt?rBdg(aRt.r):'<span style="color:var(--g400);">\u2014</span>')+'</div>';
      h+='</div>';
    });

    h+='<div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;font-size:11px">'+
      '<span id="kpi-total-'+ki+'" style="color:'+(kpiOk?'var(--green)':'var(--red)')+'">KPI weights: '+kpiTotal+'%'+(kpiOk?' \u2713':' \u26a0 must equal 100%')+'</span>'+
      (canEdit?'<button class="btn btn-sm" style="color:var(--blue);border-color:var(--blue-b);background:var(--blue-l)" id="kpi-add-'+ki+'">\u002b Add KPI</button>':'')+
      '</div></div></div>';
  });

  // Development Goals section
  h+='<div class="card" style="margin-top:14px">'+
    '<div class="card-title">Personal Development Goals <span class="card-sub">Minimum 2 required</span></div>'+
    '<div style="font-size:12px;color:var(--g500);margin-bottom:12px">Set personal growth goals for this review cycle \u2014 skills to develop, training, areas to improve.</div>'+
    '<div id="dev-goals-list"></div>'+
    (canEdit?'<button class="btn btn-sm btn-ghost" id="dev-add-btn" style="margin-top:4px">\u002b Add Development Goal</button>':'')+
    '</div>';

  if(canEdit)h+='<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--g200)">'+
    '<div id="submit-errors" style="margin-bottom:10px"></div>'+
    '<div style="display:flex;justify-content:flex-end;gap:8px" id="goal-save-area"></div></div>';
  setContent(h);

  // Wire action buttons
  var ab=sel('goal-action-btns');
  if(ab&&canEdit){
    ab.innerHTML='<button class="btn btn-sm" id="btn-add-kra">\u002b Add KRA</button>'+
      '<button class="btn btn-sm" id="btn-save-draft">Save Draft</button>'+
      '<button class="btn btn-blue btn-sm" id="btn-submit-goals">Submit for Approval \u2192</button>';
    sel('btn-add-kra').onclick=function(){collectEdits();addKRA();};
    sel('btn-save-draft').onclick=function(){collectEdits();saveGoalDraft();};
    sel('btn-submit-goals').onclick=function(){collectEdits();submitGoals();};
  }
  var sa=sel('goal-save-area');
  if(sa){
    sa.innerHTML='<button class="btn" id="btn-sv2">Save Draft</button><button class="btn btn-blue" id="btn-sub2">Submit for Approval \u2192</button>';
    sel('btn-sv2').onclick=function(){collectEdits();saveGoalDraft();};
    sel('btn-sub2').onclick=function(){collectEdits();submitGoals();};
  }

  // Wire KRA controls
  kras.forEach(function(kra,ki){
    var hd=sel('kra-hd-'+ki);
    // In edit mode, don't wire collapse — clicking the header while editing
    // collapses the KPI body, making it look like KPIs have disappeared.
    // Collapse is only useful in read-only (locked/submitted) view mode.
    if(hd&&!canEdit)hd.onclick=function(e){
      if(e.target.tagName==='INPUT'||e.target.tagName==='BUTTON'||e.target.tagName==='SELECT')return;
      toggleKRA(ki);
    };
    var rm=sel('kra-rm-'+ki);if(rm)rm.onclick=(function(i){return function(){collectEdits();removeKRA(i);};})(ki);
    var upBtn=sel('kra-up-'+ki);if(upBtn)upBtn.onclick=(function(i){return function(){collectEdits();moveKRA(i,-1);};})(ki);
    var dnBtn=sel('kra-dn-'+ki);if(dnBtn)dnBtn.onclick=(function(i){return function(){collectEdits();moveKRA(i,1);};})(ki);
    var ak=sel('kpi-add-'+ki);if(ak)ak.onclick=(function(i){return function(){collectEdits();addKPI(i);};})(ki);
    (kra.kpis||[]).forEach(function(kpi,pi){
      var rkpi=sel('kpi-rm-'+ki+'-'+pi);
      if(rkpi)rkpi.onclick=(function(ki2,pi2){return function(){collectEdits();removeKPI(ki2,pi2);};})(ki,pi);
    });
  });

  renderDevGoals(devGoals,canEdit);
}

function collectEdits(){
  if(!editKRAs)return;
  editKRAs.forEach(function(kra,ki){
    var nm=sel('kra-nm-'+ki),wt=sel('kra-wt-'+ki);
    if(nm)kra.kra_name=nm.value;
    if(wt)kra.kra_weight=parseFloat(wt.value)||0;
    (kra.kpis||[]).forEach(function(kpi,pi){
      var d=sel('kpi-desc-'+ki+'-'+pi),tf=sel('kpi-tf-'+ki+'-'+pi),af=sel('kpi-af-'+ki+'-'+pi),w=sel('kpi-wt-'+ki+'-'+pi);
      if(d)kpi.desc=d.value;if(tf)kpi.track_freq=tf.value;if(af)kpi.assess_freq=af.value;
      if(w)kpi.kpi_weight=parseFloat(w.value)||0;
      var mid=sel('kpi-mid-'+ki+'-'+pi);if(mid)kpi.mid_ach=mid.value===''?null:parseFloat(mid.value);
    });
  });
  devGoals.forEach(function(g,i){
    var tb=sel('dg-text-'+i),db2=sel('dg-date-'+i);
    if(tb)g.goal_text=tb.value;if(db2)g.target_date=db2.value;
  });
}

var _warnTimer={};
function _debouncedWarn(key,msg){
  clearTimeout(_warnTimer[key]);
  _warnTimer[key]=setTimeout(function(){toast(msg,'warn');},800);
}

function liveKRACheck(){
  try{
    if(!editKRAs)return;
    var tot=0;
    for(var ki=0;ki<editKRAs.length;ki++){
      var el=sel('kra-wt-'+ki);
      if(!el)continue;
      var v=parseFloat(el.value)||0;
      tot+=v;
      if(v>100){el.style.borderColor='var(--red)';el.style.background='#FEF2F2';}
      else{el.style.borderColor='var(--blue-b)';el.style.background='var(--blue-l)';}
    }
    var wtOk=Math.abs(tot-100)<0.5;
    var tv=sel('kra-total-val'),ts=sel('kra-total-sub');
    if(tv){tv.textContent=Math.round(tot*10)/10+'%';tv.style.color=wtOk?'#16A34A':'#DC2626';}
    if(ts){ts.textContent=wtOk?'\u2713 100%':'\u26a0 Must equal 100%';ts.style.color=wtOk?'#16A34A':'#DC2626';}
    if(wtOk){var e=sel('submit-errors');if(e)e.innerHTML='';}
  }catch(ex){}
}

function liveKPICheck(ki){
  try{
    if(!editKRAs||!editKRAs[ki])return;
    var tot=0,pi=0;
    // Count KPI inputs directly from DOM — don't rely on editKRAs[ki].kpis length
    while(true){
      var el=sel('kpi-wt-'+ki+'-'+pi);
      if(!el)break;
      var v=parseFloat(el.value)||0;
      tot+=v;
      if(v>100){el.style.borderColor='var(--red)';el.style.background='#FEF2F2';}
      else{el.style.borderColor='';el.style.background='';}
      pi++;
    }
    var wtOk=Math.abs(tot-100)<0.5;
    var s=sel('kpi-total-'+ki);
    if(s){
      s.textContent='KPI weights: '+Math.round(tot*10)/10+'%'+(wtOk?' \u2713':' \u26a0 must equal 100%');
      s.style.color=wtOk?'var(--green)':'var(--red)';
    }
  }catch(ex){}
}

function liveKPIAchCheck(inp,ki,pi){
  try{
    var v=parseFloat(inp.value);
    if(!isNaN(v)&&v>100){
      inp.style.borderColor='var(--amber)';
      inp.style.background='var(--amber-l)';
      _debouncedWarn('ach'+ki+pi,'KPI achievement exceeds 100% \u2014 confirm this is correct');
    }else{
      inp.style.borderColor='';
      inp.style.background='';
    }
  }catch(ex){}
}

function saveGoalDraft(){
  if(!editKRAs){toast('Nothing to save','error');return;}
  collectEdits();
  // Take a snapshot NOW before any async operations can modify editKRAs
  var snapshot=JSON.parse(JSON.stringify(editKRAs));
  var kpisSent=snapshot.reduce(function(s,k){return s+(k.kpis?k.kpis.length:0);},0);
  var valid=devGoals.filter(function(g){return g.goal_text&&g.goal_text.trim();});
  xhr('POST','/api/goals',{kras:snapshot,draft:true},function(err){
    if(err){toast(err,'error');return;}
    xhr('POST','/api/goals/'+G.user.emp_no+'/dev-goals',{goals:valid},function(){
      editKRAs=null;
      devGoals=[];
      if(G.goalCache)delete G.goalCache[G.user.emp_no];
      xhr('GET','/api/goals/my',null,function(err2,gs){
        if(!err2&&gs&&gs.kras){
          var kpisBack=gs.kras.reduce(function(s,k){return s+(k.kpis?k.kpis.length:0);},0);
          if(kpisBack<kpisSent){
            editKRAs=snapshot;
            toast('Draft saved (restoring KPIs)','warn');
          } else {
            toast('Draft saved \u2713','ok');
          }
        } else {
          toast('Draft saved \u2713','ok');
        }
        pgGoals();
      });
    });
  });
}

function submitGoals(){
  if(!editKRAs){toast('No goals to submit','error');return;}
  collectEdits();

  var errors=[];

  // Check 1: KRA weights
  var kraTotal=editKRAs.reduce(function(s,k){return s+(k.kra_weight||0);},0);
  if(Math.abs(kraTotal-100)>0.5){
    errors.push('KRA weights total <strong>'+Math.round(kraTotal*10)/10+'%</strong> \u2014 must equal exactly 100%');
  }

  // Check 2: KPI weights per KRA
  editKRAs.forEach(function(kra){
    var kpiTotal=(kra.kpis||[]).reduce(function(s,k){return s+(k.kpi_weight||0);},0);
    if(Math.abs(kpiTotal-100)>0.5){
      errors.push('KPI weights in <strong>"'+kra.kra_name+'"</strong> total '+Math.round(kpiTotal*10)/10+'% \u2014 must equal 100%');
    }
  });

  // Check 3: Development goals
  var valid=devGoals.filter(function(g){return g.goal_text&&g.goal_text.trim();});
  if(valid.length<2){
    errors.push('At least <strong>2 personal development goals</strong> are required \u2014 you have entered '+valid.length);
  }

  var errDiv=sel('submit-errors');
  if(errors.length>0){
    if(errDiv){
      errDiv.innerHTML='<div class="alert al-err" style="margin-bottom:0">'+
        '<div style="font-weight:600;margin-bottom:6px">\u2717 Please fix these before submitting to your supervisor:</div>'+
        '<ul style="margin:0;padding-left:18px">'+
        errors.map(function(e){return'<li style="margin-bottom:4px">'+e+'</li>';}).join('')+
        '</ul></div>';
      errDiv.scrollIntoView({behavior:'smooth',block:'nearest'});
    }
    return;
  }

  if(errDiv)errDiv.innerHTML='';

  xhr('POST','/api/goals',{kras:editKRAs},function(err){
    if(err){toast(err,'error');return;}
    xhr('POST','/api/goals/'+G.user.emp_no+'/dev-goals',{goals:valid},function(){});
    xhr('POST','/api/goals/'+G.user.emp_no+'/submit',null,function(err2){
      if(err2){toast(err2,'error');return;}
      delete G.goalCache[G.user.emp_no];editKRAs=null;
      toast('Goals submitted for approval! \u2713','ok');renderNav();pgGoals();
    });
  });
}

// FY month map: 1=Apr,2=May,3=Jun,4=Jul,5=Aug,6=Sep,7=Oct,8=Nov,9=Dec,10=Jan,11=Feb,12=Mar
var FY_MONTHS=['April','May','June','July','August','September','October','November','December','January','February','March'];
var MONTHLY_TARGET=8.5; // % per month target

function fyMonthNum(calMonth){
  // calMonth: JS Date.getMonth()+1 (1=Jan,...,12=Dec)
  return calMonth>=4?calMonth-4+1:calMonth+(12-4)+1;
}
function currentFYMonth(){
  var m=new Date().getMonth()+1; // 1-12
  return fyMonthNum(m);
}

// ── MONTHLY PROGRESS TRACKER ─────────────────────────────────
function buildMonthlyTracker(gs,mp,readOnly){
  var entries=(mp&&mp.entries)||[];
  var curFYM=currentFYMonth();
  var mpMap={};
  entries.forEach(function(e){
    if(!mpMap[e.kpi_id])mpMap[e.kpi_id]={};
    mpMap[e.kpi_id][e.month]=e;
  });
  var opts='';
  for(var m=1;m<=12;m++){
    var future=m>curFYM;
    opts+='<option value="'+m+'"'+(m===curFYM?' selected':'')+(future?' disabled':'')+'>'+
      'M'+m+' \u2014 '+FY_MONTHS[m-1]+(m===curFYM?' (current)':'')+'</option>';
  }
  var h='<div class="alert al-info">\ud83d\udcc8 <strong>Monthly Progress Tracker</strong> \u2014 '+
    'Record your KPI achievement increment each month. Target: <strong>8.5% per month</strong>. '+
    'No approvals needed \u2014 this is for your own visibility.</div>';
  if(!readOnly){
    h+='<div class="card" style="margin-bottom:14px">'+
      '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">'+
      '<label style="font-size:12px;font-weight:600;color:var(--g700)">Select Month:</label>'+
      '<select class="fi" id="mt-month-sel" style="width:220px">'+opts+'</select>'+
      '<span style="font-size:11px;color:var(--g500)">You can backdate entries for any past month</span>'+
      '</div></div>';
  }
  h+=buildMonthlySummary(gs,mpMap,curFYM);
  h+='<div id="mt-entry-area">'+buildMonthlyEntryGrid(gs,mpMap,curFYM,readOnly,gs&&gs.reviews)+'</div>';
  if(!readOnly){
    h+='<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">'+
      '<button class="btn btn-blue" id="mt-save-btn">Save Month \u2713</button></div>';
  }
  return h;
}

function buildMonthlySummary(gs,mpMap,curFYM){
  var h='<div class="card" style="margin-bottom:14px">'+
    '<div class="card-title">Cumulative Progress '+
    '<span class="card-sub">Monthly KPI increments &middot; 8.5% target per month</span></div>'+
    '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:10px">'+
    '<thead><tr><td style="padding:4px 8px;font-weight:600;color:var(--g600);min-width:160px">KRA / KPI</td>';
  for(var m=1;m<=curFYM;m++){
    h+='<td style="padding:4px 6px;text-align:center;font-weight:600;color:var(--g500);white-space:nowrap">'+
      FY_MONTHS[m-1].slice(0,3)+'</td>';
  }
  h+='<td style="padding:4px 8px;text-align:center;font-weight:700;color:var(--blue);border-left:2px solid var(--blue-b)">Cumul.</td>'+
    '<td style="padding:4px 6px;text-align:center;font-weight:700;color:var(--g600)">Rating</td></tr></thead><tbody>';

  var overallCumul=0;
  gs.kras.forEach(function(kra,ki){
    var kraCumul=0;
    var kpis=kra.kpis||[];
    // Compute KRA monthly & cumulative
    var kraMonthTotals=[];
    for(var m=1;m<=curFYM;m++){
      var mAch=0;
      kpis.forEach(function(kpi){
        var e=mpMap[kpi.id]&&mpMap[kpi.id][m];
        mAch+=(e&&e.increment_ach!=null?e.increment_ach:0)*(kpi.kpi_weight/100);
      });
      kraMonthTotals.push(Math.round(mAch*10)/10);
      kraCumul+=mAch;
    }
    kraCumul=Math.round(kraCumul*10)/10;
    var kraExpected=curFYM*MONTHLY_TARGET;
    var kraIndPct=kraExpected>0?Math.round((kraCumul/kraExpected)*100*10)/10:null;
    var kraRt=kraIndPct!=null?getRating(kraIndPct):null;

    h+='<tr style="background:var(--g50)">'+
      '<td style="padding:6px 8px;font-weight:700;font-size:11px;color:var(--g800)">'+
      '<span style="color:var(--g400);margin-right:4px">'+(ki+1)+'.</span>'+esc(kra.kra_name)+
      '<span style="font-size:9px;font-weight:400;color:var(--g400);margin-left:6px">Wt: '+kra.kra_weight+'%</span></td>';
    kraMonthTotals.forEach(function(v){
      h+='<td style="padding:4px 6px;text-align:center">'+(v>0?'<span style="color:var(--g700);font-weight:500">'+v+'%</span>':'<span style="color:var(--g200)">—</span>')+'</td>';
    });
    h+='<td style="padding:4px 8px;text-align:center;font-weight:700;color:var(--blue);border-left:2px solid var(--blue-b)">'+kraCumul+'%</td>'+
      '<td style="padding:4px 6px;text-align:center">'+(kraRt?rBdg(kraRt.r):'—')+'</td></tr>';

    // KPI rows
    kpis.forEach(function(kpi){
      var kpiCumul=0;
      var kpiMonths=[];
      for(var m=1;m<=curFYM;m++){
        var e=mpMap[kpi.id]&&mpMap[kpi.id][m];
        var inc=e&&e.increment_ach!=null?e.increment_ach:0;
        kpiCumul+=inc;
        kpiMonths.push(inc);
      }
      kpiCumul=Math.round(kpiCumul*10)/10;
      var kpiExpected=curFYM*MONTHLY_TARGET;
      var kpiIndPct=kpiExpected>0?Math.round((kpiCumul/kpiExpected)*100*10)/10:null;
      var kpiRt=kpiIndPct!=null?getRating(kpiIndPct):null;
      h+='<tr style="border-bottom:1px solid var(--g100)">'+
        '<td style="padding:4px 8px 4px 20px;font-size:10px;color:var(--g600)">'+esc(kpi.desc)+
        ' <span style="color:var(--g300)">'+kpi.kpi_weight+'%</span></td>';
      kpiMonths.forEach(function(v){
        h+='<td style="padding:3px 6px;text-align:center">'+(v>0?'<span style="color:var(--g600)">'+v+'%</span>':'<span style="color:var(--g200)">—</span>')+'</td>';
      });
      h+='<td style="padding:3px 8px;text-align:center;font-weight:600;color:var(--blue);border-left:2px solid var(--blue-b)">'+kpiCumul+'%</td>'+
        '<td style="padding:3px 6px;text-align:center">'+(kpiRt?rBdg(kpiRt.r):'—')+'</td></tr>';
    });

    overallCumul+=kraCumul*(kra.kra_weight/100);
  });

  overallCumul=Math.round(overallCumul*10)/10;
  var overallExp=curFYM*MONTHLY_TARGET;
  var overallIndPct=overallExp>0?Math.round((overallCumul/overallExp)*100*10)/10:null;
  var overallRt=overallIndPct!=null?getRating(overallIndPct):null;

  h+='<tr style="background:var(--blue-l);border-top:2px solid var(--blue-b)">'+
    '<td style="padding:7px 8px;font-weight:700;font-size:11px;color:var(--blue-d)">Overall</td>';
  for(var m=1;m<=curFYM;m++)h+='<td></td>';
  h+='<td style="padding:7px 8px;text-align:center;font-size:14px;font-weight:700;color:var(--blue-d);border-left:2px solid var(--blue-b)">'+overallCumul+'%</td>'+
    '<td style="padding:7px 6px;text-align:center">'+(overallRt?rBdg(overallRt.r):'—')+'</td></tr>';

  h+='<tr style="background:var(--g50)"><td style="padding:3px 8px;font-size:9px;color:var(--g400)">Target (8.5%/mo)</td>';
  for(var m=1;m<=curFYM;m++){
    h+='<td style="padding:3px 6px;text-align:center;font-size:9px;color:var(--g400)">'+Math.round(m*MONTHLY_TARGET*10)/10+'%</td>';
  }
  h+='<td style="padding:3px 8px;text-align:center;font-size:9px;color:var(--g400);border-left:2px solid var(--blue-b)">'+Math.round(overallExp*10)/10+'%</td><td></td></tr>';

  return h+'</tbody></table></div></div>';
}

function buildMonthlyEntryGrid(gs,mpMap,selMonth,readOnly,reviews){
  var midRev=reviews?reviews.find(function(r){return r.review_type==='mid_year';}):null;
  var yeRev=reviews?reviews.find(function(r){return r.review_type==='year_end';}):null;
  var locked=(midRev&&midRev.self_submitted_at&&selMonth<=6)||(yeRev&&yeRev.self_submitted_at&&selMonth>=7)||readOnly;

  var h='<div class="card">'+
    '<div class="card-title">'+FY_MONTHS[selMonth-1]+' \u2014 Month '+selMonth+
    ' <span class="card-sub">Enter this month\'s achievement increment &middot; Cumulative target: '+
    Math.round(selMonth*MONTHLY_TARGET*10)/10+'%</span></div>';
  if(locked&&!readOnly){
    h+='<div class="alert al-warn">\ud83d\udd12 This period is locked \u2014 '+
      (selMonth<=6?'mid-year review submitted':'year-end review submitted')+'.</div>';
  }

  gs.kras.forEach(function(kra,ki){
    h+='<div style="margin-bottom:14px">'+
      '<div style="font-size:11px;font-weight:700;color:var(--g700);padding:6px 10px;background:var(--g50);border-radius:var(--r);margin-bottom:6px">'+
      (ki+1)+'. '+esc(kra.kra_name)+
      ' <span style="font-size:10px;font-weight:400;color:var(--g500)">Weight: '+kra.kra_weight+'%</span></div>';
    (kra.kpis||[]).forEach(function(kpi){
      var e=mpMap[kpi.id]&&mpMap[kpi.id][selMonth];
      var inc=e&&e.increment_ach!=null?e.increment_ach:'';
      var note=e&&e.notes?e.notes:'';
      var prior=0;
      for(var m=1;m<selMonth;m++){
        var pe=mpMap[kpi.id]&&mpMap[kpi.id][m];
        prior+=(pe&&pe.increment_ach!=null?pe.increment_ach:0);
      }
      prior=Math.round(prior*10)/10;
      var cumWithThis=prior+(inc!==''?parseFloat(inc)||0:0);
      var expected=selMonth*MONTHLY_TARGET;
      var indPct=expected>0?Math.round((cumWithThis/expected)*100*10)/10:null;
      var indRt=indPct!=null?getRating(indPct):null;

      h+='<div style="display:grid;grid-template-columns:1fr 90px 110px 72px 1fr;gap:8px;align-items:center;'+
        'padding:8px 0;border-bottom:1px solid var(--g100)">'+
        '<div><div style="font-size:11px;font-weight:500;color:var(--g800)">'+esc(kpi.desc)+'</div>'+
        '<div style="font-size:10px;color:var(--g400);margin-top:2px">KPI wt: <strong>'+kpi.kpi_weight+'%</strong> &middot; Prior cumul: <strong>'+prior+'%</strong></div></div>'+

        '<div style="text-align:center">'+
        (locked?'<div style="font-weight:700;color:var(--g700);font-size:13px">'+(inc!==''?inc+'%':'—')+'</div>':
        '<input class="kpi-inp active" type="number" min="0" max="200" step="any" id="mt-kpi-'+kpi.id+
        '" value="'+inc+'" placeholder="0%" oninput="mtUpdateInd('+kpi.id+','+selMonth+','+prior+')">')+
        '<div style="font-size:9px;color:var(--g400);margin-top:2px">This month</div></div>'+

        '<div style="text-align:center" id="mt-cumul-'+kpi.id+'">'+
        '<div style="font-size:13px;font-weight:700;color:var(--blue)">'+Math.round(cumWithThis*10)/10+'%</div>'+
        '<div style="font-size:9px;color:var(--g400)">cumulative</div></div>'+

        '<div style="text-align:center" id="mt-ind-'+kpi.id+'">'+
        (indRt?rBdg(indRt.r)+'<div style="font-size:9px;color:var(--g400);text-align:center">indicative</div>':
        '<span style="color:var(--g300)">—</span>')+'</div>'+

        '<div>'+(locked?'<span style="font-size:10px;color:var(--g500)">'+esc(note)+'</span>':
        '<input class="fi" id="mt-note-'+kpi.id+'" style="font-size:10px" placeholder="Notes (optional)\u2026" value="'+esc(note)+'">')+
        '</div></div>';
    });
    h+='</div>';
  });
  return h+'</div>';
}

function mtUpdateInd(kpiId,selMonth,priorCumul){
  var inp=sel('mt-kpi-'+kpiId);
  if(!inp)return;
  var inc=inp.value!==''?parseFloat(inp.value)||0:0;
  var cumul=Math.round((priorCumul+inc)*10)/10;
  var cEl=sel('mt-cumul-'+kpiId);
  if(cEl)cEl.innerHTML='<div style="font-size:13px;font-weight:700;color:var(--blue)">'+cumul+'%</div>'+
    '<div style="font-size:9px;color:var(--g400)">cumulative</div>';
  var expected=selMonth*MONTHLY_TARGET;
  var indPct=expected>0?Math.round((cumul/expected)*100*10)/10:null;
  var indRt=indPct!=null?getRating(indPct):null;
  var iEl=sel('mt-ind-'+kpiId);
  if(iEl)iEl.innerHTML=indRt?rBdg(indRt.r)+'<div style="font-size:9px;color:var(--g400);text-align:center">indicative</div>':
    '<span style="color:var(--g300)">—</span>';
}

function wireMonthlyTracker(gs,mp,empNo,readOnly){
  if(readOnly)return;
  var entries=(mp&&mp.entries)||[];
  var mpMap={};
  entries.forEach(function(e){if(!mpMap[e.kpi_id])mpMap[e.kpi_id]={};mpMap[e.kpi_id][e.month]=e;});

  var msel=sel('mt-month-sel');
  if(msel){
    msel.onchange=function(){
      var m=parseInt(this.value);
      html('mt-entry-area',buildMonthlyEntryGrid(gs,mpMap,m,false,gs&&gs.reviews));
    };
  }

  var sb=sel('mt-save-btn');
  if(sb){
    sb.onclick=function(){
      var mselNow=sel('mt-month-sel');
      var month=mselNow?parseInt(mselNow.value):currentFYMonth();
      var toSave=[];
      gs.kras.forEach(function(kra){
        (kra.kpis||[]).forEach(function(kpi){
          var inp=sel('mt-kpi-'+kpi.id);
          var noteInp=sel('mt-note-'+kpi.id);
          if(inp){
            toSave.push({
              kpi_id:kpi.id,
              increment_ach:inp.value!==''?parseFloat(inp.value):null,
              notes:noteInp?noteInp.value||null:null
            });
          }
        });
      });
      if(!toSave.length){toast('No KPI inputs found','info');return;}
      sb.disabled=true;sb.textContent='Saving\u2026';
      xhr('POST','/api/monthly-progress/'+empNo,{month:month,entries:toSave},function(err){
        sb.disabled=false;sb.textContent='Save Month \u2713';
        if(err){toast(err,'error');return;}
        toast('\u2713 '+FY_MONTHS[month-1]+' saved','ok');
        xhr('GET','/api/monthly-progress/'+empNo,null,function(me,mp2){
          var entries2=(mp2&&mp2.entries)||[];
          var mpMap2={};
          entries2.forEach(function(e){if(!mpMap2[e.kpi_id])mpMap2[e.kpi_id]={};mpMap2[e.kpi_id][e.month]=e;});
          // Rebuild summary only, keep month selector value
          var curM=month;
          html('rev-body',buildMonthlyTracker(gs,mp2,false));
          wireMonthlyTracker(gs,mp2,empNo,false);
          var msel2=sel('mt-month-sel');if(msel2)msel2.value=curM;
          html('mt-entry-area',buildMonthlyEntryGrid(gs,mpMap2,curM,false,gs&&gs.reviews));
        });
      });
    };
  }
}

// KPI indicative rating at mid-year:
// By mid-year employee should have achieved 50% of their annual target
// Progress = (mid_ach / 50) × 100 → apply A-E bands
// e.g. 30% achieved → (30/50)×100 = 60% → D
// e.g. 60% achieved → (60/50)×100 = 120% → A
function getMidIndicativeRating(midAch){
  if(midAch==null)return null;
  return getRating((midAch/50)*100);
}

  var isExt=isExtCo(G.user.company||'');

      (midRev.mgr_develop?'<div class="fg"><label class="fl">Development Areas</label><div style="padding:8px 12px;background:#fff;border-radius:var(--r);font-size:12px;color:var(--g700)">'+esc(midRev.mgr_develop)+'</div></div>':'')+
      (midRev.supervisor_agrees===0?'<div class="alert al-warn" style="margin-top:8px">\u26a0 Your supervisor has a different view on the achievement ratings. See their comments above.</div>':'')+
      '</div>';
  }

  h+=ratingKey();
  gs.kras.forEach(function(kra,ki){
    // KRA achievement = sum(kpi_ach × kpi_weight/100)
    var kraAch=calcKraAch(kra,'mid');
    // For colour: compare kraAch vs (kra_weight×50%) expected at mid-year
    var midKraExpected=kra.kra_weight*0.5;
    var pctVsExpected=kraAch!=null&&midKraExpected>0?(kraAch/midKraExpected)*100:null;
    h+='<div class="kra-block"><div class="kra-head" style="cursor:default">'+
      '<div class="kra-n">'+(ki+1)+'</div><div class="kra-name">'+esc(kra.kra_name)+'</div>'+
      '<span class="kra-wt">'+kra.kra_weight+'%</span>';
    if(kraAch!=null){
      var sb=pctVsExpected>=100?'#F0FDF4':pctVsExpected>=80?'#FFFBEB':'#FEF2F2',
          sc2=pctVsExpected>=100?'#14532D':pctVsExpected>=80?'#78350F':'#7F1D1D';
      h+='<span class="kra-sc" style="background:'+sb+';color:'+sc2+'" title="Mid-year KRA achievement">'+kraAch+'%</span>';
    }
    h+='</div><div class="kra-body">'+
      '<div style="display:grid;'+grid+';gap:6px;padding:7px 0 3px;border-bottom:1px solid var(--g200);margin-bottom:2px">'+
      '<div class="kpi-ch" style="text-align:left">KPI</div>'+
      (isExt?'<div class="kpi-ch">Track</div><div class="kpi-ch">Assess</div>':'')+
      '<div class="kpi-ch">Weight</div>'+
      '<div class="kpi-ch">Status</div>'+
      '<div class="kpi-ch" style="color:var(--blue)">Mid-Year Ach%</div>'+
      '<div class="kpi-ch">Indicative Rating</div></div>';
    kra.kpis.forEach(function(kpi){
      var indRt=getMidIndicativeRating(kpi.mid_ach);
      var st=kpi.mid_status||'on_track';
      var stColors={'on_track':'var(--green)','at_risk':'var(--amber)','completed':'var(--blue)'};

        '<div class="kpi-txt">'+esc(kpi.desc)+'</div>'+

        '<div class="kpi-c">'+kpi.kpi_weight+'%</div>'+
        '<div class="kpi-c">'+

          '<select class="fi" id="rv-st-'+kpi.id+'" style="font-size:10px;padding:3px 5px;border-color:'+(stColors[st]||'var(--g300)')+'">'+
          '<option value="on_track"'+(st==='on_track'?' selected':'')+'>On Track</option>'+
          '<option value="at_risk"'+(st==='at_risk'?' selected':'')+'>At Risk</option>'+
          '<option value="completed"'+(st==='completed'?' selected':'')+'>Completed</option>'+
          '</select>')+
        '</div>'+
        '<div class="kpi-c">'+
        (submitted?
          '<span style="font-weight:600;color:var(--g700)">'+(kpi.mid_ach!=null?kpi.mid_ach+'%':'\u2014')+'</span>':
          '<input class="kpi-inp active" type="number" min="0" max="200" step="any" id="rv-kpi-'+kpi.id+'" value="'+(kpi.mid_ach!=null?kpi.mid_ach:'')+'" placeholder="Enter%">')+
        '</div>'+
        '<div class="kpi-c" title="Indicative: tracks against 50% mid-year target">'+
        (indRt?rBdg(indRt.r)+'<span style="font-size:9px;color:var(--g400);display:block;text-align:center">indicative</span>':
        '<span style="color:var(--g400)">\u2014</span>')+'</div></div>';
    });
    h+='</div></div>';
  });

  // Overall indicative score card
  // sc = calcScore(kras,'mid') = weighted avg of KPI achievements across all KRAs
  // Indicative: compare sc vs 50% expected → (sc/50)*100 → A-E bands
  if(sc!=null){
    var midExpectedOverall=50; // by mid-year should have hit 50% of annual targets
    var indPct=Math.round((sc/midExpectedOverall)*100*10)/10;
    var indRtO=getRating(indPct);
    h+='<div class="card" style="background:var(--blue-l);border-color:var(--blue-b)">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">'+
      '<div>'+
      '<div style="font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Mid-Year Overall Achievement</div>'+
      '<div style="font-size:34px;font-weight:700;color:var(--blue-d);letter-spacing:-.03em">'+sc+'%</div>'+
      '<div style="font-size:11px;color:var(--g500);margin-top:4px">50% expected at mid-year \u2014 you are at '+sc+'%</div>'+
      '<div style="font-size:12px;color:var(--g600);margin-top:10px">Indicative Rating: '+rBdg(indRtO.r)+
      ' <span style="font-size:10px;color:var(--g500)">'+esc(indRtO.desc)+'</span></div>'+
      '</div>'+
      '<div style="font-size:11px">'+
      '<div style="font-size:10px;font-weight:700;color:var(--g600);margin-bottom:7px">Mid-year indicative bands</div>'+
      '<div style="font-size:10px;color:var(--g500);margin-bottom:6px">Based on achieving 50% of annual target</div>'+
      RATINGS.map(function(r){
        var lo=r.r==='A'?'>62.5%':r.r==='B'?'50.5\u201362.5%':r.r==='C'?'42.5\u201350.5%':r.r==='D'?'30\u201342.5%':'<30%';
        return'<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">'+
          rBdg(r.r)+'<span style="font-size:10px;color:var(--g500)">'+lo+'</span></div>';
      }).join('')+
      '</div></div></div>';
  }

  h+='<div class="card"><div class="card-title">Self-Evaluation &amp; Comments</div>'+
    '<div class="fg"><label class="fl">What went well this period?</label>'+
    '<textarea class="fi" id="rv-well" rows="2" placeholder="Key achievements and successes\u2026"'+(submitted?' disabled':'')+'>'+
    (midRev&&midRev.self_went_well?esc(midRev.self_went_well):'')+
    '</textarea></div>'+
    '<div class="fg"><label class="fl">Areas for improvement in H2</label>'+
    '<textarea class="fi" id="rv-impr" rows="2" placeholder="What could you do better?"'+(submitted?' disabled':'')+'>'+
    (midRev&&midRev.self_improve?esc(midRev.self_improve):'')+
    '</textarea></div>'+
    '<div class="fg"><label class="fl">Support needed from your supervisor</label>'+
    '<textarea class="fi" id="rv-supp" rows="2" placeholder="Training, resources, guidance needed\u2026"'+(submitted?' disabled':'')+'>'+
    (midRev&&midRev.self_support_needed?esc(midRev.self_support_needed):'')+

    '<div class="fg"><label class="fl">Your overall comments <span style="font-size:10px;color:var(--g400)">(visible to supervisor and HR)</span></label>'+

    '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">'+

      '<button class="btn btn-blue" id="rv-submit-btn">Submit Mid-Year Review \u2192</button>')+
    '</div></div>';
  return h;
}

function wireRevBtns(gs,revType,windowOpen){
  var sb=sel('rv-save-btn'),sub=sel('rv-submit-btn');
  if(sb){
    sb.disabled=!windowOpen;
    sb.title=windowOpen?'':'Mid-year review window is not open';
    sb.onclick=function(){saveAchs(gs,'mid');};
  }
  if(sub){
    sub.disabled=!windowOpen;
    sub.title=windowOpen?'':'Mid-year review window is not open';
    sub.onclick=function(){
      if(!confirm('Submit your mid-year review?\n\nOnce submitted, your KPI entries will be locked and cannot be edited.\n\nAre you sure?'))return;
      sub.disabled=true;sub.textContent='Submitting\u2026';
      // First save the KPI achievements
      var kpis=[];
      gs.kras.forEach(function(k){k.kpis.forEach(function(p){
        var inp=sel('rv-kpi-'+p.id);
        if(inp){var obj={id:p.id,mid_ach:inp.value===''?null:parseFloat(inp.value)};
          var stSel=sel('rv-st-'+p.id);if(stSel)obj.mid_status=stSel.value||'on_track';
          kpis.push(obj);}
      });});
      var doSubmit=function(){
        xhr('POST','/api/reviews/'+G.user.emp_no+'/submit-self-full',{
          review_type:revType||'mid_year',
          went_well:(sel('rv-well')||{}).value||'',
          improve:(sel('rv-impr')||{}).value||'',
          support:(sel('rv-supp')||{}).value||'',
          employee_comments:(sel('rv-emp-comments')||{}).value||''
        },function(err){
          if(err){toast(err,'error');sub.disabled=false;sub.textContent='Submit Mid-Year Review \u2192';return;}
          toast('\u2713 Mid-year review submitted successfully!','ok');
          setTimeout(function(){go('myReviews');},800);
        });
      };
      if(kpis.length){
        xhr('PUT','/api/goals/'+G.user.emp_no+'/kpis',{kpis:kpis,review_type:'mid_year'},function(err2){
          if(err2){toast(err2,'error');sub.disabled=false;sub.textContent='Submit Mid-Year Review \u2192';return;}
          doSubmit();
        });
      } else {doSubmit();}
    };
  }
}
function saveAchs(gs,phase){
  var kpis=[];
  gs.kras.forEach(function(k){k.kpis.forEach(function(p){
    var inp=sel('rv-kpi-'+p.id)||(phase==='end'?sel('ye-kpi-'+p.id):null);
    if(inp){
      var obj={id:p.id};
      if(phase==='end'){
        obj.end_ach=inp.value===''?null:parseFloat(inp.value);
      } else {
        obj.mid_ach=inp.value===''?null:parseFloat(inp.value);
        var stSel=sel('rv-st-'+p.id);
        if(stSel)obj.mid_status=stSel.value||'on_track';
      }
      kpis.push(obj);
    }
  });});
  if(kpis.length)xhr('PUT','/api/goals/'+G.user.emp_no+'/kpis',{kpis:kpis,review_type:phase==='end'?'year_end':'mid_year'},function(err){if(err)toast(err,'error');else toast('Saved \u2713','ok');});
}

// Competency rating scale 1-5
var COMP_RATINGS=[
  {v:1,lbl:'Unsatisfactory',desc:'Does not meet expectations',col:'#B91C1C',bg:'#FEF2F2'},
  {v:2,lbl:'Developing',desc:'Partially meets expectations',col:'#C2410C',bg:'#FFF7ED'},
  {v:3,lbl:'Proficient',desc:'Meets expectations',col:'#92400E',bg:'#FFFBEB'},
  {v:4,lbl:'Exceeds Expectations',desc:'Consistently above the standard',col:'#166534',bg:'#F0FDF4'},
  {v:5,lbl:'Exceptional',desc:'Significantly exceeds expectations',col:'#1E3A8A',bg:'#EFF6FF'}
];
function compRatingBdg(v){
  if(!v)return'<span style="color:var(--g300)">\u2014</span>';
  var r=COMP_RATINGS.find(function(x){return x.v==v;});
  if(!r)return'<span style="color:var(--g400)">'+v+'</span>';
  return'<span style="display:inline-flex;align-items:center;gap:4px;background:'+r.bg+';color:'+r.col+
    ';font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap">'+
    r.v+' \u2014 '+r.lbl+'</span>';
}
function compRatingSelect(id,val){
  return'<select class="fi" id="'+id+'" style="font-size:11px">'+
    '<option value="">\u2014 Select \u2014</option>'+
    COMP_RATINGS.map(function(r){
      return'<option value="'+r.v+'"'+(val==r.v?' selected':'')+'>'+r.v+' \u2014 '+r.lbl+'</option>';
    }).join('')+
    '</select>';
}

  var h='<div class="alert al-info" style="margin-bottom:14px">'+

      r.v+' \u2014 '+r.lbl+'<span style="font-weight:400;opacity:.75"> &middot; '+r.desc+'</span></div>';

      '<div style="width:24px;height:24px;border-radius:7px;background:'+col+';color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(i+1)+'</div>'+
      '<div><div style="font-size:12px;font-weight:700;color:var(--g900);margin-bottom:3px">'+esc(c.name)+'</div>'+
      '<div style="font-size:11px;color:var(--g400);line-height:1.45">'+esc(c.def)+'</div></div></div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+
      // Employee self-rating
      '<div style="background:var(--g50);border-radius:var(--r);padding:10px 12px">'+
      '<div style="font-size:9px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Your Self-Rating</div>'+
      (canEdit?
        compRatingSelect('comp-self-'+c.id,er.self_rating)+
        '<textarea class="fi" id="comp-self-cmt-'+c.id+'" rows="2" style="margin-top:6px;font-size:10px" placeholder="Your comments on this competency\u2026">'+esc(er.self_comment||'')+'</textarea>':
        (er.self_rating?compRatingBdg(er.self_rating)+
          (er.self_comment?'<div style="font-size:10px;color:var(--g500);margin-top:4px;font-style:italic">'+esc(er.self_comment)+'</div>':''):
          '<span style="font-size:10px;color:var(--g400)">Not yet rated</span>'
        )
      )+
      '</div>'+
      // Supervisor rating
      '<div style="background:var(--blue-l);border-radius:var(--r);padding:10px 12px;border:1px solid var(--blue-b)">'+
      '<div style="font-size:9px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Supervisor Rating</div>'+
      (er.mgr_rating?compRatingBdg(er.mgr_rating)+

  return h;

function wireYearEndBtns(gs,windowOpen){
  // Load career aspiration
  xhr('GET','/api/goals/'+G.user.emp_no+'/career-aspiration',null,function(err,asp){
    if(asp){var ta=sel('ye-aspiration'),sl=sel('ye-timeline');if(ta)ta.value=asp.aspiration||'';if(sl)sl.value=asp.timeline_years||'';}
  });
  // Load existing competency ratings and build self-assessment UI
  xhr('GET','/api/goals/'+G.user.emp_no+'/competency-ratings',null,function(ce,ratings){
    var area=sel('comp-self-area');
    if(area)area.innerHTML=buildCompetencyDisplay(gs,ratings||[],'employee');
  });
  var sb=sel('ye-save-btn');
  if(sb){
    sb.disabled=!windowOpen;
    sb.title=windowOpen?'':'Year-end review window is not open';
    sb.onclick=function(){saveYearEnd(gs,'save');};
  }
  var sub=sel('ye-submit-btn');
  if(sub){
    sub.disabled=!windowOpen;
    sub.title=windowOpen?'':'Year-end review window is not open';
    sub.onclick=function(){
      if(!confirm('Submit your year-end review?\n\nOnce submitted your entries will be locked.'))return;
      sub.disabled=true;sub.textContent='Submitting\u2026';
      saveYearEnd(gs,'submit',function(err){
        if(err){sub.disabled=false;sub.textContent='Submit Year-End Review \u2192';}
        else{sub.disabled=true;sub.textContent='\u2713 Submitted';}
      });
    };
  }
}
function saveYearEnd(gs,action,cb){
  // Save KPI achievements
  saveAchs(gs,'end');
  // Save career aspiration
  var asp=(sel('ye-aspiration')||{}).value,tl=(sel('ye-timeline')||{}).value;
  if(asp)xhr('POST','/api/goals/'+G.user.emp_no+'/career-aspiration',{aspiration:asp,timeline_years:tl?parseInt(tl):null},function(){});
  // Save competency self-ratings
  var compRatings=[];
  COMPETENCIES.forEach(function(c){
    var s=sel('comp-self-'+c.id),cmt=sel('comp-self-cmt-'+c.id);
    if(s){
      compRatings.push({
        competency_id:c.id,
        self_rating:s.value?parseInt(s.value):null,
        self_comment:cmt?cmt.value||null:null
      });
    }
  });
  if(compRatings.length){
    xhr('POST','/api/goals/'+G.user.emp_no+'/competency-ratings',{ratings:compRatings,review_type:'year_end'},function(){});
  }
  if(action==='submit'){
    xhr('POST','/api/reviews/'+G.user.emp_no+'/submit-self-full',{
      review_type:'year_end',
      went_well:(sel('ye-well')||{}).value||'',
      improve:(sel('ye-impr')||{}).value||'',
      support:'',
      employee_comments:(sel('ye-comments')||{}).value||''
    },function(err){
      if(err){toast(err,'error');if(cb)cb(err);}
      else{toast('\u2713 Year-end review submitted!','ok');if(cb)cb(null);}
    });
  }else{
    toast('Saved \u2713','ok');
  }
}

    function wireRevTable(phase,list){
      list.forEach(function(e,i){

      });

    function renderReview(){
      var list=curScope==='direct'?direct:full;
      html('tr-body',buildRevTable(curPhase,list));
      wireRevTable(curPhase,list);
    }

    function renderMonthly(){
      var list=curScope==='direct'?direct:full;
      html('tr-body',buildMonthlyTable(list));
      list.forEach(function(e,i){
        var b=sel('tr-mp-'+i);
        if(b)b.onclick=(function(en,nm){return function(){openMonthlyProgressModal(en,nm);};})(e.emp_no,e.name);
      });

    var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0;flex-wrap:wrap;gap:8px">'+
      '<div class="tabs" style="margin-bottom:0">'+
      '<button class="tab on" id="tr-tab-mid">Mid-Year</button>'+
      '<button class="tab" id="tr-tab-end">Year-End</button>'+
      '<button class="tab" id="tr-tab-monthly">\ud83d\udcc8 Monthly</button>'+
      '</div>'+
      '<div style="display:flex;gap:4px;padding:0 0 8px">'+
      '<button class="btn btn-sm btn-blue" id="tr-scope-direct">Direct ('+direct.length+')</button>'+
      '<button class="btn btn-sm" id="tr-scope-full">Full Tree ('+full.length+')</button>'+
      '</div></div>'+
      '<div id="tr-body"></div>';
    setContent(h);

    // Phase tabs
    sel('tr-tab-mid').onclick=function(){
      curPhase='mid';
      sel('tr-tab-mid').classList.add('on');
      sel('tr-tab-end').classList.remove('on');
      sel('tr-tab-monthly').classList.remove('on');
      renderReview();
    };
    sel('tr-tab-end').onclick=function(){
      curPhase='end';
      sel('tr-tab-end').classList.add('on');
      sel('tr-tab-mid').classList.remove('on');
      sel('tr-tab-monthly').classList.remove('on');
      renderReview();
    };
    sel('tr-tab-monthly').onclick=function(){
      sel('tr-tab-monthly').classList.add('on');
      sel('tr-tab-mid').classList.remove('on');
      sel('tr-tab-end').classList.remove('on');
      renderMonthly();
    };

    // Scope toggle
    sel('tr-scope-direct').onclick=function(){
      curScope='direct';
      this.className='btn btn-sm btn-blue';
      sel('tr-scope-full').className='btn btn-sm';
      if(sel('tr-tab-monthly').classList.contains('on'))renderMonthly();else renderReview();
    };
    sel('tr-scope-full').onclick=function(){
      curScope='full';
      this.className='btn btn-sm btn-blue';
      sel('tr-scope-direct').className='btn btn-sm';
      if(sel('tr-tab-monthly').classList.contains('on'))renderMonthly();else renderReview();
    };

    renderReview();
  });
}
