// ── APPROVALS ─────────────────────────────────────────────────
function pgApprovals(){
  xhr('GET','/api/my/team',null,function(err,team){
    if(err){setContent('<div class="alert al-err">'+err+'</div>');return;}
    G.team=team||[];renderNav();
    var u=G.user;
    var pending=G.team.filter(function(e){return e.reports_to===u.emp_no&&e.goal_status==='submitted';});
    var done=G.team.filter(function(e){return e.reports_to===u.emp_no&&e.goal_status==='approved';});
    if(!pending.length){setContent('<div class="alert al-ok" style="margin-bottom:14px">\u2713 All caught up \u2014 no pending approvals.</div>'+buildApprList(done));wireApprList(done);return;}
    var loaded=0,parts=[];
    pending.forEach(function(e,idx){
      xhr('GET','/api/goals/'+e.emp_no,null,function(err2,gs){
        var wtOk=gs?(Math.abs((gs.kras||[]).reduce(function(s,k){return s+(k.kra_weight||0);},0)-100)<0.5):false;
        var part='<div class="card" style="border-left:3px solid var(--amber);margin-bottom:12px">'+
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">'+
          '<div class="nc">'+avEl(e)+'<div><div class="en">'+esc(e.name)+'</div><div class="es">'+esc(e.designation||'')+'</div></div></div>'+
          '<div style="display:flex;gap:6px">'+
          '<button class="btn btn-sm" id="appr-v-'+idx+'">View Goals</button>'+
          '<button class="btn btn-sm" style="color:var(--blue);border-color:var(--blue-b)" id="appr-am-'+idx+'">\u270f Amend Goals</button>'+
          '<button class="btn btn-red btn-sm" id="appr-r-'+idx+'">Return</button>'+
          '<button class="btn btn-green btn-sm" id="appr-ok-'+idx+'">\u2713 Approve</button></div></div>';
        if(gs){
          part+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:10px">';
          (gs.kras||[]).forEach(function(k){part+='<div style="padding:8px 10px;background:var(--g50);border-radius:var(--r);font-size:11px"><div style="font-weight:600">'+esc(k.kra_name)+'</div><div style="color:var(--g400);margin-top:2px">'+k.kra_weight+'% \u00b7 '+(k.kpis?k.kpis.length:0)+' KPIs</div></div>';});
          part+='</div><div style="font-size:11px;margin-bottom:10px;color:'+(wtOk?'var(--green)':'var(--red)')+'">KRA total: '+(gs.kras||[]).reduce(function(s,k){return s+(k.kra_weight||0);},0)+'%'+(wtOk?' \u2713':' \u26a0')+'</div>';
        }
        part+='<div class="fg" style="margin-bottom:0"><label class="fl">Comments (optional)</label>'+
          '<textarea class="fi" rows="2" id="appr-c-'+idx+'" placeholder="Feedback for the employee\u2026"></textarea></div></div>';
        parts[idx]=part; loaded++;
        if(loaded===pending.length){
          setContent(parts.join('')+buildApprList(done));
          pending.forEach(function(pe,pidx){
            var vb=sel('appr-v-'+pidx);if(vb)vb.onclick=(function(en){return function(){openGoalModal(en);};})(pe.emp_no);
            var amb=sel('appr-am-'+pidx);if(amb)amb.onclick=(function(en){return function(){openAmendGoalModal(en);};})(pe.emp_no);
            var rb=sel('appr-r-'+pidx);if(rb)rb.onclick=(function(en,ix){return function(){
              var c=sel('appr-c-'+ix);
              if(!c||!c.value.trim()){toast('Please add a comment explaining the reason','warn');return;}
              xhr('POST','/api/goals/'+en+'/reject',{comments:c.value},function(err3){if(err3){toast(err3,'error');return;}G.team=null;toast('Goals returned \u2713','info');pgApprovals();renderNav();});
            };})(pe.emp_no,pidx);
            var ab=sel('appr-ok-'+pidx);if(ab)ab.onclick=(function(en,ix){return function(){
              var c=sel('appr-c-'+ix);
              xhr('POST','/api/goals/'+en+'/approve',{comments:c?c.value:''},function(err3){if(err3){toast(err3,'error');return;}G.team=null;toast('Goals approved \u2713','ok');pgApprovals();renderNav();});
            };})(pe.emp_no,pidx);
          });
          wireApprList(done);
        }
      });
    });
  });
}
function buildApprList(done){
  if(!done.length)return'';
  var h='<div class="card"><div class="card-title">Approved ('+done.length+')</div>'+
    '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Employee</th><th>Status</th><th>Score</th><th></th></tr></thead><tbody>';
  done.forEach(function(e,i){h+='<tr><td><div class="nc">'+avEl(e,'sm')+'<div><div class="en">'+esc(e.name)+'</div></div></div></td><td>'+bdg('approved')+'</td><td>'+(e.overall_score!=null?e.overall_score+'%':'\u2014')+'</td><td><button class="btn btn-sm" id="appr-dv-'+i+'">View</button></td></tr>';});
  return h+'</tbody></table></div></div>';
}
function wireApprList(done){done.forEach(function(e,i){var b=sel('appr-dv-'+i);if(b)b.onclick=(function(en){return function(){openGoalModal(en);};})(e.emp_no);});}
function approveGoal(empNo){
  xhr('POST','/api/goals/'+empNo+'/approve',{comments:''},function(err){if(err){toast(err,'error');return;}G.team=null;toast('Goals approved \u2713','ok');pgApprovals();renderNav();});
}

function openAmendGoalModal(empNo){
  xhr('GET','/api/goals/'+empNo,null,function(err,gs){
    xhr('GET','/api/employees/'+empNo,null,function(e2,emp){
      if(!gs||!gs.kras){toast('No goal sheet found','error');return;}
      var amendKRAs=JSON.parse(JSON.stringify(gs.kras));
      var m=document.createElement('div');m.className='modal-bg';
      m.onclick=function(e){if(e.target===m)m.remove();};

      function buildAmendHTML(){
        var h='<div class="alert al-warn" style="margin-bottom:14px">\u270f You are amending the goals before approving. Only KRA/KPI names and weights can be changed. Changes will be saved and then you can approve.</div>';
        amendKRAs.forEach(function(kra,ki){
          var kpiTotal=(kra.kpis||[]).reduce(function(s,k){return s+(k.kpi_weight||0);},0);
          var kpiOk=Math.abs(kpiTotal-100)<0.5;
          h+='<div class="kra-block" style="margin-bottom:10px"><div class="kra-head" style="display:flex;align-items:center;gap:8px;padding:10px 14px">'+
            '<div class="kra-n">'+(ki+1)+'</div>'+
            '<input class="fi" id="am-kra-nm-'+ki+'" value="'+esc(kra.kra_name)+'" style="flex:1;font-weight:600;font-size:12px">'+
            '<span style="font-size:11px;color:var(--g500)">Weight:</span>'+
            '<input type="number" class="fi" id="am-kra-wt-'+ki+'" value="'+kra.kra_weight+'" min="0" max="100" style="width:56px;text-align:center;font-weight:600;color:var(--blue-d);background:var(--blue-l);border-color:var(--blue-b)">'+
            '<span style="font-size:11px;color:var(--g500)">%</span></div>'+
            '<div class="kra-body">'+
            '<div style="display:grid;grid-template-columns:1fr 66px;gap:6px;padding:6px 0 3px;border-bottom:1px solid var(--g200);margin-bottom:2px">'+
            '<div class="kpi-ch" style="text-align:left">KPI Description</div><div class="kpi-ch">Weight%</div></div>';
          (kra.kpis||[]).forEach(function(kpi,pi){
            h+='<div style="display:grid;grid-template-columns:1fr 66px;gap:6px;align-items:center;padding:7px 0;border-bottom:1px solid var(--g100)">'+
              '<input class="fi" id="am-kpi-desc-'+ki+'-'+pi+'" value="'+esc(kpi.desc)+'" style="font-size:11px">'+
              '<input type="number" class="fi kpi-inp" id="am-kpi-wt-'+ki+'-'+pi+'" value="'+kpi.kpi_weight+'" min="0" max="100" style="text-align:center">'+
              '</div>';
          });
          h+='<div style="font-size:11px;padding:6px 0;color:'+(kpiOk?'var(--green)':'var(--red)')+'">KPI weights: '+Math.round(kpiTotal*10)/10+'%'+(kpiOk?' \u2713':' \u26a0 must equal 100%')+'</div>'+
          '</div></div>';
        });
        return h;
      }

      m.innerHTML='<div class="modal modal-lg">'+
        '<div class="mhead"><div style="display:flex;align-items:center;gap:10px">'+
        (emp?'<div class="av" style="background:'+avc(emp.emp_no)[0]+';color:'+avc(emp.emp_no)[1]+'">'+initials(emp.name)+'</div>':'')+
        '<div><div class="mtitle">Amend Goals \u2014 '+(emp?esc(emp.name):'Emp '+empNo)+'</div>'+
        '<div style="font-size:11px;color:var(--g400)">Changes saved to DB. Employee will see updated goals after approval.</div></div></div>'+
        '<button class="mx" id="am-x">\u2715</button></div>'+
        '<div class="mbody" id="am-body">'+buildAmendHTML()+'</div>'+
        '<div class="mfoot">'+
        '<button class="btn" id="am-cls">Cancel</button>'+
        '<button class="btn btn-sm" id="am-save-only">Save Changes</button>'+
        '<button class="btn btn-green" id="am-save-appr">Save &amp; Approve \u2713</button>'+
        '</div></div>';
      document.body.appendChild(m);
      sel('am-x').onclick=sel('am-cls').onclick=function(){m.remove();};

      function collectAmends(){
        amendKRAs.forEach(function(kra,ki){
          var nm=sel('am-kra-nm-'+ki),wt=sel('am-kra-wt-'+ki);
          if(nm)kra.kra_name=nm.value;
          if(wt)kra.kra_weight=parseFloat(wt.value)||0;
          (kra.kpis||[]).forEach(function(kpi,pi){
            var d=sel('am-kpi-desc-'+ki+'-'+pi),w=sel('am-kpi-wt-'+ki+'-'+pi);
            if(d)kpi.desc=d.value;
            if(w)kpi.kpi_weight=parseFloat(w.value)||0;
          });
        });
      }

      function doSave(thenApprove){
        collectAmends();
        // Validate KRA weights
        var kraTotal=amendKRAs.reduce(function(s,k){return s+(k.kra_weight||0);},0);
        if(Math.abs(kraTotal-100)>0.5){toast('KRA weights must total 100% (currently '+Math.round(kraTotal*10)/10+'%)','error');return;}
        for(var i=0;i<amendKRAs.length;i++){
          var kt=(amendKRAs[i].kpis||[]).reduce(function(s,k){return s+(k.kpi_weight||0);},0);
          if(Math.abs(kt-100)>0.5){toast('KPI weights in "'+amendKRAs[i].kra_name+'" must total 100%','error');return;}
        }
        xhr('POST','/api/goals/'+empNo+'/amend',{kras:amendKRAs},function(err2){
          if(err2){toast(err2,'error');return;}
          toast('Changes saved \u2713','ok');
          if(thenApprove){
            xhr('POST','/api/goals/'+empNo+'/approve',{comments:'Approved after amendment'},function(err3){
              if(err3){toast(err3,'error');return;}
              m.remove();G.team=null;toast('Goals amended and approved \u2713','ok');pgApprovals();renderNav();
            });
          }
        });
      }

      sel('am-save-only').onclick=function(){doSave(false);};
      sel('am-save-appr').onclick=function(){doSave(true);};
    });
  });
}

function pgHRReviews(){
  xhr('GET','/admin/users?limit=500',null,function(err,users){
    if(err){setContent('<div class="alert al-err">'+err+'</div>');return;}
    G.hrRevUsers=users;
    var cos=[...new Set(users.map(function(u){return u.company;}))].sort();
    var h='<div class="alert al-info"><strong>HR Reviews</strong> \u2014 View and edit any employee\'s goal sheet, mid-year or year-end review. Changes are logged.</div>'+
      '<div class="filter-row">'+
      '<input placeholder="Search name or emp no\u2026" id="hrr-q">'+
      '<select id="hrr-co"><option value="">All companies</option>'+cos.map(function(c){return'<option>'+esc(c)+'</option>';}).join('')+'</select>'+
      '<span style="font-size:12px;color:var(--g400)" id="hrr-count">'+users.length+' employees</span></div>'+
      '<div class="card"><div id="hrr-table">'+buildHRRTable(users)+'</div></div>';
    setContent(h);
    sel('hrr-q').oninput=filterHRR;
    sel('hrr-co').onchange=filterHRR;
    wireHRRTable(users);
  });

function filterHRR(){
  if(!G.hrRevUsers)return;
  var q=(sel('hrr-q').value||'').toLowerCase(),co=sel('hrr-co').value;

  if(q)list=list.filter(function(u){return u.name.toLowerCase().includes(q)||String(u.emp_no).includes(q);});

    G.umData=users;

    var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
      '<div style="font-size:13px;font-weight:600">'+users.length+' employees</div>'+
      '<button class="btn btn-blue btn-sm" id="btn-add-user">\u002b Add Employee</button></div>'+
      '<div class="filter-row">'+
      '<input placeholder="Search name, emp no\u2026" id="um-q">'+
      '<select id="um-co"><option value="">All companies</option>'+cos.map(function(c){return'<option>'+esc(c)+'</option>';}).join('')+'</select>'+
      '<select id="um-st"><option value="">All statuses</option><option value="not_activated">Not Activated</option><option value="locked">Locked</option><option value="inactive">Inactive</option></select>'+
      '<span style="font-size:12px;color:var(--g400)" id="um-count">'+users.length+' employees</span></div>'+

    wireUMTable(users);
  });

function filterUM(){
  if(!G.umData)return;
  var q=(sel('um-q').value||'').toLowerCase(),co=sel('um-co').value,st=sel('um-st').value,now=Math.floor(Date.now()/1000);
  var list=G.umData;
  if(q)list=list.filter(function(u){return u.name.toLowerCase().includes(q)||String(u.emp_no).includes(q)||(u.designation||'').toLowerCase().includes(q);});
  if(co)list=list.filter(function(u){return u.company===co;});
  if(st==='not_activated')list=list.filter(function(u){return !u.activated;});
  else if(st==='locked')list=list.filter(function(u){return u.locked_until&&u.locked_until>now;});
  else if(st==='inactive')list=list.filter(function(u){return !u.is_active;});
  var cnt=sel('um-count');if(cnt)cnt.textContent=list.length+' employees';
  html('um-table',buildUMTable(list)); wireUMTable(list);
}
function buildUMTable(list){
  if(!list.length)return'<div class="empty">No employees found</div>';
  var now=Math.floor(Date.now()/1000);
  var h='<div class="tbl-wrap"><table class="tbl"><thead><tr>'+
    '<th>Employee</th><th>Company</th><th>Role</th><th>Status</th><th>Last Login</th><th>Actions</th>'+
    '</tr></thead><tbody>';
  list.slice(0,100).forEach(function(u,i){
    var locked=u.locked_until&&u.locked_until>now;
    var sTxt=!u.is_active?'\ud83d\udeab Inactive':locked?'\ud83d\udd12 Locked':!u.activated?'\u26a0 Not Activated':u.must_change_pw?'\u26a1 Must Change PW':'\u2713 Active';
    var sCol=!u.is_active||locked?'var(--red)':!u.activated?'var(--amber)':'var(--green)';
    h+='<tr><td><div class="nc">'+avEl(u,'sm')+'<div><div class="en">'+esc(u.name)+'</div>'+
      '<div class="es">'+esc(u.designation||'')+' \u00b7 Emp '+u.emp_no+'</div></div></div></td>'+
      '<td style="font-size:10px;color:var(--g400)">'+esc((u.company||'').replace(' (Pvt) Ltd','').replace(' (Private) Limited',''))+'</td>'+
      '<td><select class="fi" id="um-role-'+i+'" style="padding:3px 6px;font-size:10px;width:110px">'+
      Object.entries(RLB).map(function(kv){return'<option value="'+kv[0]+'"'+(u.role===kv[0]?' selected':'')+'>'+kv[1]+'</option>';}).join('')+'</select></td>'+
      '<td style="font-size:11px;color:'+sCol+';font-weight:500">'+sTxt+'</td>'+
      '<td style="font-size:10px;color:var(--g400)">'+(u.last_login?new Date(u.last_login*1000).toLocaleDateString('en-GB'):'Never')+'</td>'+
      '<td><div style="display:flex;gap:3px;flex-wrap:wrap">'+
      (!u.activated?'<button class="btn btn-blue btn-sm" id="um-act-'+i+'">Activate</button>':'')+
      '<button class="btn btn-sm" id="um-rst-'+i+'">Reset PW</button>'+
      (locked?'<button class="btn btn-green btn-sm" id="um-ulk-'+i+'">Unlock</button>':'')+
      '<button class="btn btn-sm" id="um-edt-'+i+'">\u270e Edit</button>'+
      '<button class="btn btn-amber btn-sm" id="um-rsg-'+i+'" title="Delete this employee\'s goal sheet so they can start fresh">Reset Goals</button>'+
      (u.is_active?'<button class="btn btn-red btn-sm" id="um-dis-'+i+'">Disable</button>':'<button class="btn btn-green btn-sm" id="um-ena-'+i+'">Enable</button>')+
      '<button class="btn btn-sm" id="um-del-'+i+'" style="padding:4px 7px" title="Delete permanently">\ud83d\uddd1</button>'+
      '</div></td></tr>';
  });
  return h+'</tbody></table></div>'+(list.length>100?'<div class="empty" style="padding:8px">Showing 100 of '+list.length+' \u2014 filter to see more</div>':'');
}
function wireUMTable(list){
  list.slice(0,100).forEach(function(u,i){
    var rs=sel('um-role-'+i);if(rs)rs.onchange=(function(en){return function(){xhr('PUT','/admin/users/'+en+'/role',{role:this.value},function(err){if(err)toast(err,'error');else toast('Role updated \u2713','ok');})};})(u.emp_no);
    var ab=sel('um-act-'+i);if(ab)ab.onclick=(function(en,nm){return function(){
      var pw=prompt('Set temp password for '+nm+' (min 6 chars):');if(!pw||pw.length<6){toast('Too short','error');return;}
      xhr('PUT','/admin/users/'+en+'/activate',{temp_password:pw},function(err,res){if(err){toast(err,'error');return;}
      alert('Activated: '+nm+'\nEmp No: '+en+'\nTemp PW: '+pw+'\n(They must change on first login)');toast('Activated \u2713','ok');pgUserMgmt();});};})(u.emp_no,u.name);
    var rb=sel('um-rst-'+i);if(rb)rb.onclick=(function(en,nm){return function(){
      xhr('POST','/admin/users/'+en+'/generate-reset-token',null,function(err,res){if(err){toast(err,'error');return;}
      alert('Reset token for '+nm+':\nEmp No: '+en+'\nToken: '+res.reset_token+'\nExpires: '+res.expires+'\n\nTell them to click "Forgot password?" on the login page.');});};})(u.emp_no,u.name);
    var ul=sel('um-ulk-'+i);if(ul)ul.onclick=(function(en){return function(){xhr('POST','/admin/users/'+en+'/unlock',null,function(err){if(err){toast(err,'error');return;}toast('Unlocked \u2713','ok');pgUserMgmt();});};})(u.emp_no);
    var ed=sel('um-edt-'+i);if(ed)ed.onclick=(function(en){return function(){openEditModal(en);};})(u.emp_no);
    var rsg=sel('um-rsg-'+i);if(rsg)rsg.onclick=(function(en,nm){return function(){
      if(!confirm('Reset goals for '+nm+'?\n\nThis will DELETE their current goal sheet so they can start fresh.\nThis cannot be undone.'))return;
      xhr('POST','/api/goals/'+en+'/reset',null,function(err){
        if(err){toast(err,'error');return;}
        toast('Goals reset for '+nm+' \u2713','ok');
        G.umData=null;pgUserMgmt();
      });
    };})(u.emp_no,u.name);
    var db2=sel('um-dis-'+i);if(db2)db2.onclick=(function(en){return function(){if(!confirm('Disable this account?'))return;xhr('POST','/admin/users/'+en+'/deactivate',null,function(err){if(err){toast(err,'error');return;}toast('Disabled','info');pgUserMgmt();});};})(u.emp_no);
    var eb=sel('um-ena-'+i);if(eb)eb.onclick=(function(en){return function(){xhr('POST','/admin/users/'+en+'/reactivate',null,function(err){if(err){toast(err,'error');return;}toast('Enabled \u2713','ok');pgUserMgmt();});};})(u.emp_no);
    var dlb=sel('um-del-'+i);if(dlb)dlb.onclick=(function(en,nm){return function(){
      if(!confirm('PERMANENTLY DELETE '+nm+' (Emp '+en+')?\n\nThis removes their account, goals and reviews.\nThis CANNOT be undone.'))return;
      var t=prompt('Type name to confirm deletion:\n'+nm);if(t!==nm){toast('Cancelled','warn');return;}
      xhr('DELETE','/admin/users/'+en,null,function(err,res){if(err){toast(err,'error');return;}toast('\u2713 '+res.message,'ok');G.umData=null;pgUserMgmt();});
    };})(u.emp_no,u.name);
  });
}

// ── CALIBRATION ───────────────────────────────────────────────
function pgCalib(){
  xhr('GET','/api/calibration',null,function(err,data){
    if(err){setContent('<div class="alert al-err">'+err+'</div>');return;}
    G.calibData=data;
    var dist={A:0,B:0,C:0,D:0,E:0};
    data.filter(function(e){return e.system_rating;}).forEach(function(e){dist[e.system_rating]++;});
    var cos=[...new Set(data.map(function(e){return e.company;}))].sort();
    var h='<div class="alert '+(G.calibLocked?'al-warn':'al-ok')+'">'+
      (G.calibLocked?'\ud83d\udd12':'\ud83d\udd13')+' Calibration is <strong>'+(G.calibLocked?'LOCKED \u2014 ratings hidden from employees':'PUBLISHED \u2014 employees can see their final rating')+'</strong></div>';
    h+=ratingKey();
    h+='<div class="stats s5" style="margin-bottom:16px">';
    RATINGS.forEach(function(r){h+=sCard(dist[r.r]||0,r.r+' \u2014 '+r.lbl,(r.r==='A'?'>125%':r.r==='B'?'101\u2013125%':r.r==='C'?'85\u2013100%':r.r==='D'?'60\u201384%':'<60%'),r.col);});
    h+='</div>'+
      '<div class="card"><div class="card-title">Individual Calibration <span class="card-sub">Override system ratings if needed</span></div>'+
      '<div class="filter-row"><select id="cal-co"><option value="">All companies</option>'+
      cos.map(function(c){return'<option>'+esc(c)+'</option>';}).join('')+'</select></div>'+
      '<div id="cal-table">'+buildCalibTable(data)+'</div></div>'+
      '<div style="display:flex;justify-content:flex-end;gap:8px">'+
      '<button class="btn" id="calib-save-exit-btn">Save &amp; Exit</button>'+
      '<button class="btn '+(G.calibLocked?'btn-blue':'btn-red')+'" id="calib-pub-btn">'+(G.calibLocked?'\ud83d\udd13 Publish Ratings to Employees':'\ud83d\udd12 Re-Lock / Re-Calibrate')+'</button></div>';
    setContent(h);
    var co=sel('cal-co');if(co)co.onchange=filterCalib;
    var se=sel('calib-save-exit-btn');if(se)se.onclick=function(){toast('Calibration saved ✓','ok');setTimeout(function(){go('hrDashboard');},800);};
    var pb=sel('calib-pub-btn');if(pb)pb.onclick=function(){
      G.calibLocked=!G.calibLocked;
      xhr('POST','/api/calibration/publish',{published:!G.calibLocked},function(){});
      toast(G.calibLocked?'Ratings locked \ud83d\udd12':'Ratings published to employees \ud83d\udd13',G.calibLocked?'info':'ok');
      pgCalib();
    };
    wireCalibTable(data);
  });
}
function filterCalib(){
  if(!G.calibData)return;

      '<td><strong>'+e.overall_score+'%</strong></td>'+

      '<td><select class="fi" id="cal-ovr-'+i+'" style="padding:3px 6px;font-size:11px;width:130px">'+

function wireCalibTable(list){

function pgReports(){
  setContent('<div class="empty">Loading reports\u2026</div>');
  xhr('GET','/api/reports/stats',null,function(err,s){
    if(err){setContent('<div class="alert al-err">'+err+'</div>');return;}
    xhr('GET','/api/reports/grading-data',null,function(e2,gd){
      gd=gd||null; // e2 error is non-fatal — page renders with s.by_company fallback
      try{
      var gs={}; (s.goal_stats||[]).forEach(function(g){gs[g.status]=g.n;});

      // ── Summary KPI cards ──────────────────────────────────
      var midTotal=(gd&&gd.distribution&&gd.distribution.mid_year)?gd.distribution.mid_year.total:0;
      var yeTotal =(gd&&gd.distribution&&gd.distribution.year_end) ?gd.distribution.year_end.total:0;
      var approvalPct=Math.round(((gs.approved||0)/Math.max(s.total_users||1,1))*100);
      var h='<div class="stats s4" style="margin-bottom:16px">'+
        sCard(s.total_users||0,'Total Headcount','Across all companies',null)+
        sCard(approvalPct+'%','Goal Approval Rate',(gs.approved||0)+' of '+(s.total_users||0)+' approved',null)+
        sCard(midTotal,'Mid-Year Reviews','Scores submitted',null)+
        sCard(yeTotal,'Year-End Reviews','Scores submitted',null)+
        '</div>';

      // ── Rating Distribution — tabbed Mid / Year-End ────────
      h+='<div class="card" style="margin-bottom:14px">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'+
        '<div class="card-title" style="margin:0">Rating Distribution</div>'+
        '<div style="display:flex;gap:4px">'+
        '<button class="btn btn-sm btn-blue" id="rpt-tab-mid" onclick="rptTab(\'mid\')">Mid-Year</button>'+
        '<button class="btn btn-sm" id="rpt-tab-ye" onclick="rptTab(\'ye\')">Year-End</button>'+
        '</div></div>'+
        '<div id="rpt-dist-mid">'+buildDistBars(gd,'mid_year')+'</div>'+
        '<div id="rpt-dist-ye" style="display:none">'+buildDistBars(gd,'year_end')+'</div>'+
        '</div>';

      // ── Goal Status by Company ─────────────────────────────
      h+='<div class="card" style="margin-bottom:14px">'+
        '<div class="card-title">Goal Status by Company</div>'+
        '<div class="tbl-wrap"><table class="tbl"><thead><tr>'+
        '<th>Company</th><th>Staff</th><th style="color:var(--green)">Approved</th>'+
        '<th style="color:var(--amber)">Pending</th><th style="color:var(--g400)">Draft</th>'+
        '<th style="color:var(--red)">Not Started</th><th>Approval %</th>'+
        '</tr></thead><tbody>';
      (s.by_company||[]).forEach(function(co){
        var notStarted=co.n-(co.approved_n||0)-(co.submitted_n||0)-(co.draft_n||0);
        var pct=co.n>0?Math.round((co.approved_n||0)/co.n*100):0;
        var coName=esc((co.company||'').replace(' (Pvt) Ltd','').replace(' (Private) Limited','').replace(' (Private) Ltd',''));
        h+='<tr data-goalco="'+esc(co.company||'')+'" style="cursor:pointer">'+
          '<td style="font-size:11px;font-weight:500">'+coName+' <span style="font-size:9px;color:var(--blue)">&#x25ba;</span></td>'+
          '<td>'+co.n+'</td>'+
          '<td><span style="color:var(--green);font-weight:500">'+(co.approved_n||0)+'</span></td>'+
          '<td><span style="color:var(--amber);font-weight:500">'+(co.submitted_n||0)+'</span></td>'+
          '<td><span style="color:var(--g400);font-weight:500">'+(co.draft_n||0)+'</span></td>'+
          '<td><span style="color:var(--red);font-weight:500">'+Math.max(0,notStarted)+'</span></td>'+
          '<td>'+pb(pct,pct>=80?'#16A34A':pct>=50?'#D97706':'#DC2626')+'</td>'+
          '</tr>';
      });
      h+='</tbody></table></div></div>';

      // ── Appraisal Tracker by Company ──────────────────────
      h+='<div class="card" style="margin-bottom:14px">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'+
        '<div class="card-title" style="margin:0">Appraisal Tracker by Company</div>'+
        '<div style="display:flex;gap:4px">'+
        '<button class="btn btn-sm btn-blue" id="cg-tab-mid" onclick="cgTab(\'mid\')">Mid-Year</button>'+
        '<button class="btn btn-sm" id="cg-tab-ye" onclick="cgTab(\'ye\')">Year-End</button>'+
        '</div></div>'+
        '<div style="font-size:11px;color:var(--g400);margin-bottom:12px">'+
        'Tracks submission progress live \u2014 rating columns appear once scores are submitted.</div>'+
        '<div id="cg-mid">'+buildGradingTable(gd,'mid_year',s)+'</div>'+
        '<div id="cg-ye" style="display:none">'+buildGradingTable(gd,'year_end',s)+'</div>'+
        '</div>';

      // ── Download Reports ───────────────────────────────────
      h+='<div class="card">'+
        '<div class="card-title">Download Reports <span class="card-sub">CSV exports \u2014 open directly in Excel</span></div>'+
        '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px" id="rpt-grid"></div>'+
        '</div>';

      setContent(h);
      buildReportGrid();
      wireDrillDown('mid_year');
      // Wire goal status drill-down
      document.querySelectorAll('tr[data-goalco]').forEach(function(row){
        row.onmouseenter=function(){this.style.background='var(--g50)';};
        row.onmouseleave=function(){this.style.background='';};
        row.onclick=function(){openGoalDrill(this.getAttribute('data-goalco'));};
      });
      }catch(ex){setContent('<div class="alert al-err">Reports failed to render: '+ex.message+'</div>');console.error(ex);}
    });
  });
}

function buildDistBars(gd,phase){
  var d=(gd&&gd.distribution&&gd.distribution[phase])||{total:0,byRating:{}};
  if(!d.total)return '<div class="empty" style="padding:16px 0">No scores submitted yet</div>';
  var h='';
  RATINGS.forEach(function(r){
    var cnt=d.byRating[r.r]||0,pct=d.total?Math.round(cnt/d.total*100):0;
    h+='<div style="margin-bottom:12px">'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:4px">'+
      '<span style="font-size:11px;font-weight:600;color:'+r.col+'">'+r.r+' \u2014 '+r.lbl+'</span>'+
      '<span style="font-size:11px;color:var(--g400)">'+cnt+' ('+pct+'%)</span></div>'+
      pb(pct,r.col)+'</div>';
  });
  h+='<div style="font-size:10px;color:var(--g400);margin-top:6px">Total: '+d.total+' employees with scores</div>';
  return h;
}

function buildGradingTable(gd,phase,s){
  // Merge submission status (from grading-data route) with rating data
  var statusRows=(gd&&gd.reviewStatus&&gd.reviewStatus[phase])||[];
  var ratingRows=(gd&&gd.byCompany&&gd.byCompany[phase])||[];
  // Build rating lookup keyed by company
  var rMap={};
  ratingRows.forEach(function(r){rMap[r.company]=r;});

  // If grading-data route hasn't loaded yet, fall back to s.by_company for headcount
  // so the table always shows all companies
  if(!statusRows.length && s&&s.by_company&&s.by_company.length){
    statusRows=(s.by_company||[]).map(function(c){
      return {company:c.company,headcount:c.n,mgr_submitted:0,self_only:0,in_progress:0,
              not_started_goals:0,no_goals:c.n};
    });
  }
  if(!statusRows.length){
    return '<div class="empty" style="padding:16px 0">No data available</div>';
  }

  // Build headcount lookup
  var hcMap={};
  (s.by_company||[]).forEach(function(c){hcMap[c.company]=c.n;});

  var hasRatings=ratingRows.length>0;

  var h='<div class="tbl-wrap"><table class="tbl"><thead><tr>'+
    '<th>Company</th>'+
    '<th title="Total active employees">HC</th>'+
    '<th style="color:var(--green)" title="Manager submitted — fully complete">✓ Complete</th>'+
    '<th style="color:var(--blue)" title="Self submitted, awaiting manager">Self Done</th>'+
    '<th style="color:var(--amber)" title="Review started but self not yet submitted">In Progress</th>'+
    '<th style="color:var(--red)" title="Goal approved but review not started">Not Started</th>'+
    '<th>Submit %</th>'+
    (hasRatings?
      '<th style="color:#14532d">A</th><th style="color:#1e3a8a">B</th>'+
      '<th style="color:#4c1d95">C</th><th style="color:#78350f">D</th>'+
      '<th style="color:#7f1d1d">E</th><th>A+B%</th>':'')+
    '</tr></thead><tbody>';

  statusRows.forEach(function(co){
    var coName=esc((co.company||'').replace(' (Pvt) Ltd','').replace(' (Private) Limited','').replace(' (Private) Ltd',''));
    var hc=co.headcount||0;
    var complete=co.mgr_submitted||0;
    var selfOnly=co.self_only||0;
    var inProg=co.in_progress||0;
    var notStarted=(co.not_started_goals||0);
    var noGoals=co.no_goals||0;
    var submitPct=hc>0?Math.round(complete/hc*100):0;
    var submitCol=submitPct>=80?'var(--green)':submitPct>=40?'var(--amber)':'var(--red)';
    var rd=rMap[co.company]||{};
    var rTotal=rd.total||0;
    var abPct=rTotal>0?Math.round(((rd.rA||0)+(rd.rB||0))/rTotal*100):0;
    var abCol=abPct>=50?'var(--green)':abPct>=25?'var(--amber)':'var(--red)';
    h+='<tr data-company="'+esc(co.company||'')+'" style="cursor:pointer">'+
      '<td style="font-size:11px;font-weight:500">'+coName+' <span style="font-size:9px;color:var(--blue)">&#x25ba;</span></td>'+
      '<td>'+hc+'</td>'+
      '<td><span style="color:var(--green);font-weight:600">'+complete+'</span></td>'+
      '<td><span style="color:var(--blue);font-weight:600">'+selfOnly+'</span></td>'+
      '<td><span style="color:var(--amber);font-weight:600">'+inProg+'</span></td>'+
      '<td><span style="color:var(--red);font-weight:600">'+notStarted+'</span>'+
        (noGoals>0?'<span style="font-size:9px;color:var(--g300)"> +'+noGoals+'no goals</span>':'')+
      '</td>'+
      '<td>'+pb(submitPct,submitCol)+'</td>'+
      (hasRatings?
        '<td><span style="color:#14532d;font-weight:600">'+(rd.rA||0)+'</span></td>'+
        '<td><span style="color:#1e3a8a;font-weight:600">'+(rd.rB||0)+'</span></td>'+
        '<td><span style="color:#4c1d95;font-weight:600">'+(rd.rC||0)+'</span></td>'+
        '<td><span style="color:#78350f;font-weight:600">'+(rd.rD||0)+'</span></td>'+
        '<td><span style="color:#7f1d1d;font-weight:600">'+(rd.rE||0)+'</span></td>'+
        '<td><strong style="color:'+abCol+'">'+abPct+'%</strong></td>':'') +
      '</tr>';
  });
  // Totals row
  var totHC=statusRows.reduce(function(a,r){return a+(r.headcount||0);},0);
  var totComplete=statusRows.reduce(function(a,r){return a+(r.mgr_submitted||0);},0);
  var totSelf=statusRows.reduce(function(a,r){return a+(r.self_only||0);},0);
  var totInProg=statusRows.reduce(function(a,r){return a+(r.in_progress||0);},0);
  var totNS=statusRows.reduce(function(a,r){return a+(r.not_started_goals||0);},0);
  var totSubmitPct=totHC>0?Math.round(totComplete/totHC*100):0;
  var totSubmitCol=totSubmitPct>=80?'var(--green)':totSubmitPct>=40?'var(--amber)':'var(--red)';
  var totA=ratingRows.reduce(function(a,r){return a+(r.rA||0);},0);
  var totB=ratingRows.reduce(function(a,r){return a+(r.rB||0);},0);
  var totC=ratingRows.reduce(function(a,r){return a+(r.rC||0);},0);
  var totD=ratingRows.reduce(function(a,r){return a+(r.rD||0);},0);
  var totE=ratingRows.reduce(function(a,r){return a+(r.rE||0);},0);
  var totRated=ratingRows.reduce(function(a,r){return a+(r.total||0);},0);
  var totAB=totRated>0?Math.round((totA+totB)/totRated*100):0;
  var totAbCol=totAB>=50?'var(--green)':totAB>=25?'var(--amber)':'var(--red)';
  h+='<tr style="background:var(--g50);font-weight:600;border-top:2px solid var(--g300)">'+
    '<td>All Companies</td>'+
    '<td>'+totHC+'</td>'+
    '<td style="color:var(--green)">'+totComplete+'</td>'+
    '<td style="color:var(--blue)">'+totSelf+'</td>'+
    '<td style="color:var(--amber)">'+totInProg+'</td>'+
    '<td style="color:var(--red)">'+totNS+'</td>'+
    '<td>'+pb(totSubmitPct,totSubmitCol)+'</td>'+
    (hasRatings?
      '<td style="color:#14532d">'+totA+'</td>'+
      '<td style="color:#1e3a8a">'+totB+'</td>'+
      '<td style="color:#4c1d95">'+totC+'</td>'+
      '<td style="color:#78350f">'+totD+'</td>'+
      '<td style="color:#7f1d1d">'+totE+'</td>'+
      '<td style="color:'+totAbCol+'">'+totAB+'%</td>':'') +
    '</tr>';
  h+='</tbody></table></div>';
  return h;
}

function buildReportGrid(){
  var grid=sel('rpt-grid');
  if(!grid)return;
  REPORT_DEFS.forEach(function(rpt){
    var card=document.createElement('div');
    card.style.cssText='border:1px solid var(--g200);border-radius:var(--r-lg);padding:14px 16px;background:var(--color-background-primary,#fff);transition:all .15s';
    card.innerHTML='<div style="font-size:20px;margin-bottom:8px">'+rpt.icon+'</div>'+
      '<div style="font-size:12px;font-weight:600;margin-bottom:4px">'+esc(rpt.name)+'</div>'+
      '<div style="font-size:11px;color:var(--g500);margin-bottom:12px;line-height:1.4">'+esc(rpt.desc)+'</div>'+
      '<button class="btn btn-sm btn-blue" style="width:100%" data-slug="'+rpt.slug+'">'+
      '\u2b07 Download CSV</button>';
    card.onmouseenter=function(){this.style.boxShadow='var(--sh-md)';};
    card.onmouseleave=function(){this.style.boxShadow='';};
    card.querySelector('button').onclick=function(){
      exportReport(this.getAttribute('data-slug'),rpt.name);
    };
    grid.appendChild(card);
  });
}

// Goal Status drill-down — shows all employees in a company with goal status
function openGoalDrill(company){
  var coShort=(company||'').replace(' (Private) Limited','').replace(' (Pvt) Ltd','');
  var m=document.createElement('div');m.className='modal-bg';
  m.onclick=function(e){if(e.target===m)m.remove();};
  m.innerHTML='<div class="modal" style="max-width:860px;width:95%">'+
    '<div class="modal-hd"><span>'+esc(coShort)+' — Goal Status</span>'+
    '<button class="modal-x" id="gdrill-close">×</button></div>'+
    '<div class="modal-bd" id="gdrill-body"><div class="empty">Loading…</div></div></div>';
  document.body.appendChild(m);
  sel('gdrill-close').onclick=function(){m.remove();};
  xhr('GET','/api/reports/goal-drill?company='+encodeURIComponent(company),null,function(err,rows){
    if(err){html('gdrill-body','<div class="alert al-err">'+err+'</div>');return;}
    var approved=(rows||[]).filter(function(r){return r.goal_status==='approved';}).length;
    var submitted=(rows||[]).filter(function(r){return r.goal_status==='submitted';}).length;
    var draft=(rows||[]).filter(function(r){return r.goal_status==='draft';}).length;
    var none=(rows||[]).filter(function(r){return !r.goal_status;}).length;
    var summary='<div style="display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap">'+
      '<span style="font-size:12px"><strong>'+(rows||[]).length+'</strong> employees</span>'+
      '<span style="font-size:12px;color:var(--green)"><strong>'+approved+'</strong> approved</span>'+
      '<span style="font-size:12px;color:var(--amber)"><strong>'+submitted+'</strong> pending</span>'+
      '<span style="font-size:12px;color:var(--g400)"><strong>'+draft+'</strong> draft</span>'+
      '<span style="font-size:12px;color:var(--red)"><strong>'+none+'</strong> not started</span>'+
      '</div>';
    var h='<div class="tbl-wrap"><table class="tbl"><thead><tr>'+
      '<th>Employee</th><th>Designation</th><th>Grade</th><th>Manager</th>'+
      '<th>Status</th><th>Submitted</th><th>Approved</th>'+
      '</tr></thead><tbody>';
    (rows||[]).forEach(function(r){
      h+='<tr>'+
        '<td style="font-weight:500">'+esc(r.name)+'</td>'+
        '<td style="font-size:11px;color:var(--g500)">'+esc(r.designation||'')+'</td>'+
        '<td>'+esc(r.grade||'')+'</td>'+
        '<td style="font-size:11px">'+esc(r.manager||'—')+'</td>'+
        '<td>'+bdg(r.goal_status||'not_started')+'</td>'+
        '<td style="font-size:11px;color:var(--g500)">'+(r.submitted_at?new Date(r.submitted_at*1000).toLocaleDateString():'—')+'</td>'+
        '<td style="font-size:11px;color:var(--g500)">'+(r.approved_at?new Date(r.approved_at*1000).toLocaleDateString():'—')+'</td>'+
        '</tr>';
    });
    h+='</tbody></table></div>';
    html('gdrill-body',summary+h);
  });
}

// Wire company rows for drill-down in appraisal tracker
function wireDrillDown(phase){
  var tbl=sel('cg-'+(phase==='mid_year'?'mid':'ye'));
  if(!tbl)return;
  tbl.querySelectorAll('tr[data-company]').forEach(function(row){
    row.style.cursor='pointer';
    row.onmouseenter=function(){this.style.background='var(--g50)';};
    row.onmouseleave=function(){this.style.background='';};
    row.onclick=function(){openCompanyDrill(this.getAttribute('data-company'),phase);};
  });
}
function openCompanyDrill(company,phase){
  var phaseLbl=phase==='mid_year'?'Mid-Year':'Year-End';
  var coShort=(company||'').replace(' (Private) Limited','').replace(' (Pvt) Ltd','');
  var m=document.createElement('div');m.className='modal-bg';
  m.onclick=function(e){if(e.target===m)m.remove();};
  m.innerHTML='<div class="modal" style="max-width:820px;width:95%">'+
    '<div class="modal-hd"><span>'+esc(coShort)+' — '+phaseLbl+' Appraisal Status</span>'+
    '<button class="modal-x" id="drill-close">×</button></div>'+
    '<div class="modal-bd" id="drill-body"><div class="empty">Loading…</div></div></div>';
  document.body.appendChild(m);
  sel('drill-close').onclick=function(){m.remove();};
  xhr('GET','/api/reports/company-drill?company='+encodeURIComponent(company)+'&phase='+phase,null,function(err,rows){
    if(err){html('drill-body','<div class="alert al-err">'+err+'</div>');return;}
    var h='<div class="tbl-wrap"><table class="tbl"><thead><tr>'+
      '<th>Employee</th><th>Designation</th><th>Grade</th><th>Manager</th>'+
      '<th>Goals</th><th>Self Assessment</th><th>Supervisor Review</th>'+
      '<th>Score</th><th>Rating</th>'+
      '</tr></thead><tbody>';
    (rows||[]).forEach(function(r){
      var selfDone=!!r.self_submitted_at;
      var mgrDone=!!r.mgr_submitted_at;
      var rt=r.final_rating||r.system_rating||'';
      h+='<tr>'+
        '<td style="font-weight:500">'+esc(r.name)+'</td>'+
        '<td style="font-size:11px;color:var(--g500)">'+esc(r.designation||'')+'</td>'+
        '<td>'+esc(r.grade||'')+'</td>'+
        '<td style="font-size:11px">'+esc(r.manager||'—')+'</td>'+
        '<td>'+bdg(r.goal_status||'not_started')+'</td>'+
        '<td><span class="badge '+(selfDone?'ba':'bd')+'">'+(selfDone?'✓ Done':'• Pending')+'</span></td>'+
        '<td><span class="badge '+(mgrDone?'ba':'bd')+'">'+(mgrDone?'✓ Done':'• Pending')+'</span></td>'+
        '<td>'+(r.overall_score!=null?r.overall_score+'%':'—')+'</td>'+
        '<td>'+(rt?rBdg(rt):'—')+'</td>'+
        '</tr>';
    });
    h+='</tbody></table></div>';
    // Summary counts
    var total=rows.length;
    var selfCount=(rows||[]).filter(function(r){return !!r.self_submitted_at;}).length;
    var mgrCount=(rows||[]).filter(function(r){return !!r.mgr_submitted_at;}).length;
    var summary='<div style="display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap">'+
      '<span style="font-size:12px"><strong>'+total+'</strong> employees</span>'+
      '<span style="font-size:12px;color:var(--blue)"><strong>'+selfCount+'</strong> self done</span>'+
      '<span style="font-size:12px;color:var(--green)"><strong>'+mgrCount+'</strong> supervisor done</span>'+
      '<span style="font-size:12px;color:var(--red)"><strong>'+(total-mgrCount)+'</strong> pending supervisor</span>'+
      '</div>';
    html('drill-body',summary+h);
  });
}

function rptTab(which){
  var midD=sel('rpt-dist-mid'),yeD=sel('rpt-dist-ye');
  var midB=sel('rpt-tab-mid'),yeB=sel('rpt-tab-ye');
  if(!midD)return;
  if(which==='mid'){
    midD.style.display='';yeD.style.display='none';
    midB.className='btn btn-sm btn-blue';yeB.className='btn btn-sm';
  } else {
    midD.style.display='none';yeD.style.display='';
    midB.className='btn btn-sm';yeB.className='btn btn-sm btn-blue';
  }
}

function cgTab(which){
  var midD=sel('cg-mid'),yeD=sel('cg-ye');
  var midB=sel('cg-tab-mid'),yeB=sel('cg-tab-ye');
  if(!midD)return;
  if(which==='mid'){
    midD.style.display='';yeD.style.display='none';
    midB.className='btn btn-sm btn-blue';yeB.className='btn btn-sm';
    wireDrillDown('mid_year');
  } else {
    midD.style.display='none';yeD.style.display='';
    midB.className='btn btn-sm';yeB.className='btn btn-sm btn-blue';
    wireDrillDown('year_end');
  }
}

function exportReport(slug,name){
  var url='/api/export/'+slug;
  var fname=(name||slug).replace(/[^a-zA-Z0-9 \-]/g,'')+'.csv';
  toast('Preparing: '+name+'\u2026','info');
  var a=document.createElement('a');
  a.href=url; a.download=fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){toast('Download started \u2713','ok');},400);
}

// ── EMPLOYEES ───────────────────────────────────────────────────
function pgEmployees(){
  xhr('GET','/api/employees',null,function(err,emps){
    if(err){setContent('<div class="alert al-err">'+err+'</div>');return;}
    G.empData=emps;
    var clusters=[...new Set(emps.filter(function(e){return e.cluster;}).map(function(e){return e.cluster;}))].sort();
    var fStyle='padding:6px 10px;border:1px solid var(--g300);border-radius:var(--r);font-size:12px;font-family:var(--font);outline:none';
    var h='<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">'+
      '<input placeholder="Search name, designation\u2026" id="ed-q" style="'+fStyle+';width:200px">'+
      '<select id="ed-cluster" style="'+fStyle+';min-width:150px">'+
      '<option value="">All Clusters (L2)</option>'+
      clusters.map(function(c){return'<option>'+esc(c)+'</option>';}).join('')+'</select>'+
      '<select id="ed-co" style="'+fStyle+';min-width:200px">'+
      '<option value="">All Companies (L3)</option></select>'+
      '<select id="ed-dept" style="'+fStyle+';min-width:180px">'+
      '<option value="">All Departments (L4)</option></select>'+
      '<span style="font-size:12px;color:var(--g400)" id="ed-cnt">'+emps.length+' employees</span>'+
      '</div>'+
      '<div class="card" style="padding:0;overflow:hidden"><div id="ed-table">'+buildEmpTable(emps)+'</div></div>';
    setContent(h);
    sel('ed-q').oninput=filterEmps;
    sel('ed-cluster').onchange=function(){updateEmpCo();filterEmps();};
    sel('ed-co').onchange=function(){updateEmpDept();filterEmps();};
    sel('ed-dept').onchange=filterEmps;
  });
}
function updateEmpCo(){
  if(!G.empData)return;
  var cl=sel('ed-cluster').value;
  var cos=[...new Set(G.empData.filter(function(e){return !cl||e.cluster===cl;}).filter(function(e){return e.company;}).map(function(e){return e.company;}))].sort();
  sel('ed-co').innerHTML='<option value="">All Companies (L3)</option>'+cos.map(function(c){return'<option>'+esc(c)+'</option>';}).join('');
  updateEmpDept();
}
function updateEmpDept(){
  if(!G.empData)return;
  var cl=sel('ed-cluster').value,co=sel('ed-co').value;
  var depts=[...new Set(G.empData.filter(function(e){
    return (!cl||e.cluster===cl)&&(!co||e.company===co)&&e.dept;
  }).map(function(e){return e.dept;}))].sort();
  sel('ed-dept').innerHTML='<option value="">All Departments (L4)</option>'+depts.map(function(d){return'<option>'+esc(d)+'</option>';}).join('');
}
function filterEmps(){
  if(!G.empData)return;
  var q=(sel('ed-q').value||'').toLowerCase();
  var cl=sel('ed-cluster').value,co=sel('ed-co').value,dept=sel('ed-dept').value;
  var list=G.empData;
  if(q)list=list.filter(function(e){return e.name.toLowerCase().includes(q)||(e.designation||'').toLowerCase().includes(q)||(e.dept||'').toLowerCase().includes(q)||String(e.emp_no).includes(q);});
  if(cl)list=list.filter(function(e){return e.cluster===cl;});
  if(co)list=list.filter(function(e){return e.company===co;});
  if(dept)list=list.filter(function(e){return e.dept===dept;});
  var cnt=sel('ed-cnt');if(cnt)cnt.textContent=list.length+' employees';
  html('ed-table',buildEmpTable(list));
}
function buildEmpTable(list){
  if(!list.length)return'<div class="empty">No employees found</div>';
  var h='<div class="tbl-wrap"><table class="tbl"><thead><tr>'+
    '<th>Employee</th>'+
    '<th>Cluster <span style="font-weight:400;opacity:.7">(L2)</span></th>'+
    '<th>Company <span style="font-weight:400;opacity:.7">(L3)</span></th>'+
    '<th>Department <span style="font-weight:400;opacity:.7">(L4)</span></th>'+
    '<th>Reports To</th><th>Grade</th><th>Goal Status</th>'+
    '</tr></thead><tbody>';
  list.slice(0,120).forEach(function(e){
    var shortCo=(e.company||'').replace(' (Private) Limited','').replace(' (Pvt) Ltd','').replace(' (Private) Ltd','');
    h+='<tr>'+
      '<td><div class="nc">'+avEl(e,'sm')+'<div><div class="en">'+esc(e.name)+'</div><div class="es">'+esc(e.designation||'')+'</div></div></div></td>'+
      '<td><span class="chip" style="background:var(--blue-l);color:var(--blue-d);border-color:var(--blue-b)">'+esc(e.cluster||'—')+'</span></td>'+
      '<td style="font-size:11px;font-weight:500;color:var(--g800)">'+esc(shortCo||'—')+'</td>'+
      '<td style="font-size:11px;color:var(--g500)">'+esc(e.dept||'—')+'</td>'+
      '<td style="font-size:11px;color:var(--g400)">'+esc(e.manager_name||'—')+'</td>'+
      '<td><span class="chip">'+esc(e.grade||'—')+'</span></td>'+
      '<td>'+bdg(e.goal_status||'not_started')+'</td></tr>';
  });
  return h+'</tbody></table></div>'+(list.length>120?'<div class="empty" style="padding:8px">Showing 120 of '+list.length+' — use filters to narrow</div>':'');
}

// ── GOAL MODAL (read-only view for supervisors/HR) ─────────────
function openGoalModal(empNo){
  xhr('GET','/api/goals/'+empNo,null,function(err,gs){
    xhr('GET','/api/employees/'+empNo,null,function(e2,emp){
      var sc=gs?calcScore(gs.kras,'mid'):null,rt=sc!=null?getRating(sc):null;
      var c=emp?avc(emp.emp_no):AVC[0];
      var isExt=emp?isExtCo(emp.company||''):false;
      var grid=isExt?'grid-template-columns:1fr 72px 72px 66px 82px 98px':'grid-template-columns:1fr 66px 82px 98px';
      var krasHTML='';
      if(gs&&gs.kras){
        gs.kras.forEach(function(kra,ki){
          var kraAch=calcKraAch(kra,'mid');
          krasHTML+='<div class="kra-block"><div class="kra-head" style="cursor:default">'+
            '<div class="kra-n">'+(ki+1)+'</div><div class="kra-name">'+esc(kra.kra_name)+'</div>'+
            '<span class="kra-wt">'+kra.kra_weight+'%</span>';
          if(kraAch!=null){var sb=kraAch>=85?'#F0FDF4':kraAch>=60?'#FFFBEB':'#FEF2F2',s2=kraAch>=85?'#14532D':kraAch>=60?'#78350F':'#7F1D1D';krasHTML+='<span class="kra-sc" style="background:'+sb+';color:'+s2+'">'+kraAch+'%</span>';}
          krasHTML+='</div><div class="kra-body">'+
            '<div style="display:grid;'+grid+';gap:6px;padding:7px 0 3px;border-bottom:1px solid var(--g200);margin-bottom:2px">'+
            '<div class="kpi-ch" style="text-align:left">KPI</div>'+
            (isExt?'<div class="kpi-ch">Track</div><div class="kpi-ch">Assess</div>':'')+
            '<div class="kpi-ch">Weight</div><div class="kpi-ch">Mid Ach</div><div class="kpi-ch">Indicative</div></div>';
          (kra.kpis||[]).forEach(function(kpi){
            var aRt=getMidIndicativeRating(kpi.mid_ach);
            krasHTML+='<div style="display:grid;'+grid+';gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid var(--g100)">'+
              '<div class="kpi-txt">'+esc(kpi.desc)+'</div>'+
              (isExt?'<div class="kpi-c">'+esc(kpi.track_freq)+'</div><div class="kpi-c">'+esc(kpi.assess_freq)+'</div>':'')+
              '<div class="kpi-c">'+kpi.kpi_weight+'%</div>'+
              '<div class="kpi-c" style="font-weight:600;color:'+(kpi.mid_ach!=null?'var(--g700)':'var(--g400)')+'">'+
              (kpi.mid_ach!=null?kpi.mid_ach+'%':'\u2014')+'</div>'+
              '<div class="kpi-c">'+(aRt?rBdg(aRt.r):'\u2014')+'</div></div>';
          });
          krasHTML+='</div></div>';
        });
        // Dev goals
        xhr('GET','/api/goals/'+empNo+'/dev-goals',null,function(de,dg){
          if(dg&&dg.length){
            var dga=sel('gm-dev-area');
            if(dga){
              var dh='';
              dg.forEach(function(g,i){dh+='<div class="dev-goal-row"><div class="dev-num">'+(i+1)+'</div><span style="flex:1;font-size:12px">'+esc(g.goal_text||'\u2014')+'</span>'+(g.target_date?'<span class="chip">'+esc(g.target_date)+'</span>':'')+'</div>';});
              dga.innerHTML=dh;
            }
          }
        });
      }else{krasHTML='<div class="empty">No goal sheet found</div>';}

      var m=document.createElement('div');m.className='modal-bg';
      m.onclick=function(e){if(e.target===m)m.remove();};
      m.innerHTML='<div class="modal modal-lg">'+
        '<div class="mhead">'+
        '<div style="display:flex;align-items:center;gap:12px">'+
        (emp?'<div class="av av-lg" style="background:'+c[0]+';color:'+c[1]+'">'+initials(emp.name)+'</div>':'')+
        '<div><div class="mtitle">'+(emp?esc(emp.name):'Emp '+empNo)+'</div>'+
        '<div style="font-size:11px;color:var(--g400)">'+(emp?esc(emp.designation||'')+' \u00b7 '+esc(emp.company||'')+' \u00b7 Emp '+empNo:'')+'</div></div>'+
        bdg(gs?gs.status:'not_started')+'</div>'+
        '<button class="mx" id="gm-x">\u2715</button></div>'+
        '<div class="mbody">'+
        (sc!=null?'<div class="stats s3" style="margin-bottom:14px">'+
          sCard(sc+'%','Mid-Year Score','',rt?rt.col:null)+
          sCard(rt?rt.r:'\u2014','Rating',rt?rt.lbl+' \u2014 '+rt.desc.substring(0,50)+'...':'',rt?rt.col:null)+
          sCard(gs?gs.kras.length:0,'KRAs',gs?gs.kras.reduce(function(s,k){return s+(k.kpis?k.kpis.length:0);},0)+' KPIs':'','')+'</div>':'')+
        krasHTML+
        '<div class="card" style="margin-top:14px"><div class="card-title">Development Goals</div><div id="gm-dev-area"><div class="empty" style="padding:10px 0">Loading\u2026</div></div></div>'+
        '</div>'+
        '<div class="mfoot"><button class="btn" id="gm-cls">Close</button>'+
        (emp&&emp.reports_to===G.user.emp_no&&gs&&gs.status==='submitted'?'<button class="btn btn-green" id="gm-appr">\u2713 Approve Goals</button>':'')+
        '</div></div>';
      document.body.appendChild(m);
      sel('gm-x').onclick=sel('gm-cls').onclick=function(){m.remove();};
      var ab=sel('gm-appr');if(ab)ab.onclick=function(){approveGoal(empNo);m.remove();};
    });
  });
}

// ── SUPERVISOR REVIEW MODAL ────────────────────────────────────
function openSupervisorReviewModal(empNo,phase){
  xhr('GET','/api/goals/'+empNo,null,function(err,gs){
    xhr('GET','/api/employees/'+empNo,null,function(e2,emp){
      var sc=gs?calcScore(gs.kras,phase==='end'?'end':'mid'):null;
      var mgrSc=gs?calcMgrScore(gs.kras,phase==='end'?'end':'mid'):null;
      var rt=sc!=null?getRating(sc):null;
      var mgrRt=mgrSc!=null?getRating(mgrSc):null;
      var revType=phase==='end'?'year_end':'mid_year';
      var phaseLbl=phase==='end'?'Year-End':'Mid-Year';
      var isExt=emp?isExtCo(emp.company||''):false;
      var grid=isExt?'grid-template-columns:1fr 72px 72px 66px 82px 82px 82px':'grid-template-columns:1fr 66px 82px 82px 82px';

      // Employee comments from existing review
      var empRev=gs&&gs.reviews?gs.reviews.find(function(r){return r.review_type===revType;}):null;

      var m=document.createElement('div');m.className='modal-bg';
      m.onclick=function(e){if(e.target===m)m.remove();};

      var krasHTML='';
      if(gs&&gs.kras){
        // For mid-year: grid is read-only (emp ach + indicative rating, no mgr input)
        var midGrid=isExt?'grid-template-columns:1fr 72px 72px 66px 98px 82px':'grid-template-columns:1fr 66px 98px 82px';
        gs.kras.forEach(function(kra,ki){
          var empKraAch=calcKraAch(kra,phase==='end'?'end':'mid');
          var mgrKraAch=calcMgrKraAch(kra,phase==='end'?'end':'mid');

          krasHTML+='<div class="kra-block"><div class="kra-head" style="cursor:default">'+
            '<div class="kra-n">'+(ki+1)+'</div><div class="kra-name">'+esc(kra.kra_name)+'</div>'+
            '<span class="kra-wt">'+kra.kra_weight+'%</span>';
          if(empKraAch!=null){
            var sb=empKraAch>=85?'#F0FDF4':empKraAch>=60?'#FFFBEB':'#FEF2F2',
                s2=empKraAch>=85?'#14532D':empKraAch>=60?'#78350F':'#7F1D1D';
            krasHTML+='<span class="kra-sc" style="background:'+sb+';color:'+s2+'">\u25cf Emp: '+empKraAch+'%</span>';
          }
          if(phase==='end'&&mgrKraAch!=null){
            var sb2=mgrKraAch>=85?'#EFF6FF':mgrKraAch>=60?'#FFFBEB':'#FEF2F2',
                s3=mgrKraAch>=85?'#1E3A8A':mgrKraAch>=60?'#78350F':'#7F1D1D';
            krasHTML+='<span class="kra-sc" style="background:'+sb2+';color:'+s3+'">\u25cb Mgr: '+mgrKraAch+'%</span>';
          }

          if(phase==='mid'){
            // Mid-year: read-only view of employee achievements
            krasHTML+='</div><div class="kra-body">'+
              '<div style="display:grid;'+midGrid+';gap:6px;padding:7px 0 3px;border-bottom:1px solid var(--g200);margin-bottom:2px">'+
              '<div class="kpi-ch" style="text-align:left">KPI</div>'+
              (isExt?'<div class="kpi-ch">Track</div><div class="kpi-ch">Assess</div>':'')+
              '<div class="kpi-ch">Weight</div>'+
              '<div class="kpi-ch" style="color:var(--blue)">Employee Ach%</div>'+
              '<div class="kpi-ch">Indicative</div></div>';
            (kra.kpis||[]).forEach(function(kpi){
              var empAch=kpi.mid_ach;
              var indRt=getMidIndicativeRating(empAch);
              var st=kpi.mid_status||'on_track';
              var stColors={'on_track':'var(--green)','at_risk':'var(--amber)','completed':'var(--blue)'};
              krasHTML+='<div style="display:grid;'+midGrid+';gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid var(--g100)">'+
                '<div class="kpi-txt">'+esc(kpi.desc)+
                '<span style="font-size:9px;font-weight:600;color:'+(stColors[st]||'var(--g400)')+';margin-left:6px">'+cap((st||'').replace('_',' '))+'</span></div>'+
                (isExt?'<div class="kpi-c">'+esc(kpi.track_freq)+'</div><div class="kpi-c">'+esc(kpi.assess_freq)+'</div>':'')+
                '<div class="kpi-c">'+kpi.kpi_weight+'%</div>'+
                '<div class="kpi-c" style="font-weight:600;color:'+(empAch!=null?'var(--g700)':'var(--g400)')+'">'+
                (empAch!=null?empAch+'%':'\u2014')+'</div>'+
                '<div class="kpi-c">'+(indRt?rBdg(indRt.r):'<span style="color:var(--g400)">\u2014</span>')+'</div></div>';
            });
          } else {
            // Year-end: supervisor enters their rating %
            krasHTML+='</div><div class="kra-body">'+
              '<div style="display:grid;'+grid+';gap:6px;padding:7px 0 3px;border-bottom:1px solid var(--g200);margin-bottom:2px">'+
              '<div class="kpi-ch" style="text-align:left">KPI</div>'+
              (isExt?'<div class="kpi-ch">Track</div><div class="kpi-ch">Assess</div>':'')+
              '<div class="kpi-ch">Weight</div>'+
              '<div class="kpi-ch" style="color:var(--blue)">Emp Ach%</div>'+
              '<div class="kpi-ch" style="color:var(--green)">Your Rating%</div>'+
              '<div class="kpi-ch">Rating</div></div>';
            (kra.kpis||[]).forEach(function(kpi){
              var empAch=kpi.end_ach!=null?kpi.end_ach:kpi.mid_ach;
              var mgrAch=kpi.mgr_end_ach;
              krasHTML+='<div style="display:grid;'+grid+';gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid var(--g100)">'+
                '<div class="kpi-txt">'+esc(kpi.desc)+'</div>'+
                (isExt?'<div class="kpi-c">'+esc(kpi.track_freq)+'</div><div class="kpi-c">'+esc(kpi.assess_freq)+'</div>':'')+
                '<div class="kpi-c">'+kpi.kpi_weight+'%</div>'+
                '<div class="kpi-c" style="font-weight:600;color:'+(empAch!=null?(empAch>=85?'var(--green)':empAch>=60?'var(--amber)':'var(--red)'):'var(--g400)')+'">'+
                (empAch!=null?empAch+'%':'\u2014')+'</div>'+
                '<div class="kpi-c"><input class="kpi-inp mgr" type="number" min="0" max="200" step="any" id="sup-kpi-'+kpi.id+'" value="'+(mgrAch!=null?mgrAch:'')+'" placeholder="Enter%" data-kpi-id="'+kpi.id+'" data-field="mgr_end_ach"></div>'+
                '<div class="kpi-c" id="sup-kpi-rt-'+kpi.id+'">'+(mgrAch!=null?rBdg(getRating(mgrAch).r):'\u2014')+'</div></div>';
            });
          }
          krasHTML+='</div></div>';
        });
      }

      m.innerHTML='<div class="modal modal-lg">'+
        '<div class="mhead">'+
        '<div style="display:flex;align-items:center;gap:10px">'+
        (emp?'<div class="av" style="background:'+avc(emp.emp_no)[0]+';color:'+avc(emp.emp_no)[1]+'">'+initials(emp.name)+'</div>':'')+
        '<div><div class="mtitle">'+phaseLbl+' Review \u2014 '+(emp?esc(emp.name):'Emp '+empNo)+'</div>'+
        '<div style="font-size:11px;color:var(--g400)">'+(emp?esc(emp.designation||''):'')+'</div></div>'+
        '<span class="rev-type-pill '+(phase==='end'?'rt-annual':'rt-mid')+'">'+phaseLbl+'</span>'+
        '</div><button class="mx" id="rm-x">\u2715</button></div>'+
        '<div class="mbody">'+
        // Score summary - mid-year: just employee indicative; year-end: full scores
        (phase==='mid'?
          (sc!=null?
            '<div class="stats s2" style="margin-bottom:14px">'+
            sCard(sc+'%','Employee Mid-Year Achievement','vs 50% expected at mid-year',rt?rt.col:null)+
            (function(){var ip=Math.round((sc/50)*100*10)/10;var ir=getRating(ip);return sCard(ir.r+' \u2014 '+ir.lbl,'Indicative Rating','Based on 50% mid-year target',ir.col);})()+
            '</div>':
            '<div class="alert al-warn" style="margin-bottom:14px">Employee has not yet entered KPI achievements.</div>'):
          (sc!=null||mgrSc!=null?
            '<div class="stats s3" style="margin-bottom:14px">'+
            (sc!=null?sCard(sc+'%','Employee Score',rt?rt.r+' \u2014 '+rt.lbl:'',rt?rt.col:null):'<div class="stat"><div class="stat-val" style="color:var(--g400)">\u2014</div><div class="stat-lbl">Employee Score</div></div>')+
            (mgrSc!=null?sCard(mgrSc+'%','Your Assessment',mgrRt?mgrRt.r+' \u2014 '+mgrRt.lbl:'',mgrRt?mgrRt.col:null):'<div class="stat"><div class="stat-val" style="color:var(--g400)">\u2014</div><div class="stat-lbl">Your Assessment</div><div class="stat-sub">Enter KPI ratings below</div></div>')+
            sCard((G.calibLocked?'\ud83d\udd12':'\ud83d\udd13')+(mgrRt?' '+mgrRt.r:' Pending'),'Final Rating',G.calibLocked?'Locked until calibration':'Published',mgrRt?mgrRt.col:null)+
            '</div>':
            '<div class="alert al-warn" style="margin-bottom:14px">No KPI achievements entered by employee yet. You can still enter your own rating below.</div>'))+
        // Employee comments
        (empRev&&empRev.employee_comments?
          '<div class="alert al-info" style="margin-bottom:14px">'+
          '<div><strong>\ud83d\udcac Employee Comments:</strong><br><span style="opacity:.9">'+esc(empRev.employee_comments)+'</span></div></div>':'')+
        // KRA/KPI display
        '<div class="card"><div class="card-title">KPI Achievement Review <span class="card-sub">'+(phase==='mid'?'Employee mid-year achievements':'Enter your rating % for each KPI')+'</span></div>'+
        (phase==='mid'?
          '<div class="alert al-info" style="margin-bottom:12px">\ud83d\udd35 Review the employee\'s mid-year KPI achievements and indicative ratings. Provide your written feedback below.</div>':
          '<div class="alert al-info" style="margin-bottom:12px">\ud83d\udd35 Blue = Employee achievement \u00b7 \ud83d\udfe2 Green = Your rating. The system will auto-calculate your overall score.</div>')+
        krasHTML+'</div>'+

        // Supervisor comments
        '<div class="card"><div class="card-title">Supervisor Assessment</div>'+
        '<div class="fg"><label class="fl">Overall performance comments</label>'+
        '<textarea class="fi" rows="3" id="sup-comments" placeholder="Overall assessment of the employee this period\u2026">'+(empRev&&empRev.mgr_comments?esc(empRev.mgr_comments):'')+'</textarea></div>'+
        '<div class="fr2">'+
        '<div class="fg"><label class="fl">Key strengths observed</label>'+
        '<textarea class="fi" rows="2" id="sup-strengths" placeholder="Key strengths\u2026">'+(empRev&&empRev.mgr_strengths?esc(empRev.mgr_strengths):'')+'</textarea></div>'+
        '<div class="fg"><label class="fl">Development areas for next cycle</label>'+
        '<textarea class="fi" rows="2" id="sup-develop" placeholder="Focus areas\u2026">'+(empRev&&empRev.mgr_develop?esc(empRev.mgr_develop):'')+'</textarea></div></div>'+
        '<div class="fg">'+
        '<label class="fl">Do you agree with the employee\'s self-assessment on their KPI achievements?</label>'+
        '<select class="fi" id="sup-agrees" style="width:300px">'+
        '<option value="1">Yes \u2014 I agree with the employee\'s self-rating</option>'+
        '<option value="0">No \u2014 My ratings differ (explain below)</option></select></div>'+
        '<div class="fg" id="sup-disagree-section" style="display:none">'+
        '<label class="fl">Your comments on the rating difference</label>'+
        '<textarea class="fi" rows="2" id="sup-disagree-cmt" placeholder="Explain where your assessment differs and why\u2026"></textarea></div>'+
        '</div>'+

        // Year-end: competency ratings
        (phase==='end'?
          '<div class="card"><div class="card-title">Competency Ratings \u2014 Supervisor <span class="card-sub">Rate employee 1\u20135 on each competency</span></div>'+
          '<div class="alert al-info" style="margin-bottom:14px">\u2139 Rate the employee independently on each competency using the 1\u20135 scale. Add a comment to support each rating.</div>'+

              }
            });
          });
        }

          // Save competency ratings (year-end)
          if(phase==='end'){
            var mgrRatings=Object.values(G.mgrCompRatings||{});

          var agrees=sel('sup-agrees'),agreeVal=agrees?parseInt(agrees.value):1;
          var body={
            review_type:revType,
            comments:(sel('sup-comments')||{}).value||'',
            strengths:(sel('sup-strengths')||{}).value||'',
            develop:(sel('sup-develop')||{}).value||'',
            supervisor_agrees:agreeVal,

          };

          xhr('POST','/api/reviews/'+empNo+'/manager-save',body,function(err3){
            if(saveBtn){saveBtn.disabled=false;saveBtn.textContent=(phase==='mid'?'Save':'Save Review \u2192');}
            if(err3){toast(err3,'error');return;}
            toast('Saved \u2713','ok');
          });
        };
        if(kpis.length){
          xhr('PUT','/api/goals/'+empNo+'/kpis',{kpis:kpis,review_type:revType,is_manager:true},function(err2){
            if(err2){toast(err2,'error');if(saveBtn){saveBtn.disabled=false;saveBtn.textContent=(phase==='mid'?'Save':'Save Review \u2192');}return;}
            doSave();
          });
        } else {doSave();}
      };
    });
  });
}

function updateSupScore(gs){
  if(!gs||!gs.kras)return;
  var W=0,T=0;
  gs.kras.forEach(function(k){
    var ks=0,kw=0;
    (k.kpis||[]).forEach(function(p){
      var inp=sel('sup-kpi-'+p.id);
      var v=inp&&inp.value!==''?parseFloat(inp.value):null;
      if(v!=null){ks+=v*(p.kpi_weight/100);kw+=p.kpi_weight;}
    });
    if(kw>0){W+=(ks/kw)*100*k.kra_weight;T+=k.kra_weight;}
  });
  var score=T>0?Math.round((W/T)*10)/10:null;
  var rt=score!=null?getRating(score):null;
  toast(score!=null?'Your assessment: '+score+'% \u2014 '+rt.r+' '+rt.lbl:'Enter KPI ratings to calculate score','info');
}

function buildPhaseCard(key,label,isOpen,sd,ed,note){
  var oc=isOpen?' open':'',dc=isOpen?'open':'closed';
  var st=isOpen?'Open':'Closed',tc=isOpen?'on':'off';
  var icons={gs:'&#127919;',mid:'&#128197;',ye:'&#127941;'};
  var icon=icons[key]||'&#127922;';
  var sdFmt=sd?sd.replace(/(\d{4})-(\d{2})-(\d{2})/,'$3/$2/$1'):'\u2014';
  var edFmt=ed?ed.replace(/(\d{4})-(\d{2})-(\d{2})/,'$3/$2/$1'):'\u2014';
  // Use data-key attributes - wire events after DOM insertion with wirePhaseCards()
  return '<div class="phase-tile'+oc+'" id="pc-'+key+'">'
    +'<div class="phase-tile-top" id="ph-'+key+'">'
    +'<div class="phase-tile-icon">'+icon+'</div>'
    +'<div class="phase-tile-name">'+label+'</div>'
    +'<div class="phase-tile-date-row">'
    +'<span class="dv" id="pdates-start-'+key+'">'+sdFmt+'</span>'
    +'<span class="darr">\u2192</span>'
    +'<span class="dv" id="pdates-end-'+key+'">'+edFmt+'</span>'
    +'</div>'
    +'<div class="phase-tile-status '+dc+'" id="pstatus-'+key+'">'
    +'<span class="sd"></span>'+st
    +'</div>'
    +'</div>'
    +'<div class="phase-tile-body">'
    +'<div class="ext-info">\u2139 <span>To <strong>extend</strong> a phase, just update the close date and click Save &amp; Apply. The system auto-opens/closes based on today vs the window.</span></div>'
    +'<div class="ptb-row">'
    +'<div><div class="ptb-label">Opens on</div><input type="date" class="ptb-input" id="'+key+'-start" value="'+sd+'"></div>'
    +'<div><div class="ptb-label">Closes on</div><input type="date" class="ptb-input" id="'+key+'-end" value="'+ed+'"></div>'
    +'</div>'
    +'<div class="ptb-full">'
    +'<div class="ptb-label">Extension reason (optional)</div>'
    +'<input type="text" class="ptb-input" id="'+key+'-note" placeholder="e.g. Extended by 1 week to include remaining staff" value="'+esc(note)+'">'
    +'</div>'
    +'<div class="phase-tile-actions">'
    +'<div class="phase-toggle-wrap">'
    +'<button class="toggle-pill '+tc+'" id="tog-'+key+'" data-key="'+key+'"></button>'
    +'<span class="phase-toggle-lbl" id="togl-'+key+'">'+(isOpen?'Open':'Closed')+'</span>'
    +'</div>'
    +'<button class="btn btn-blue btn-sm" id="save-'+key+'" data-key="'+key+'">Save &amp; Apply</button>'
    +'</div>'
    +'</div></div>';
}

function wirePhaseCards(){
  ['gs','mid','ye'].forEach(function(key){
    var tog=sel('tog-'+key);
    if(tog)tog.onclick=function(){manualTogglePhase(key);};
    var sav=sel('save-'+key);
    if(sav)sav.onclick=function(){savePhase(key);};
    var hdr=sel('ph-'+key);
    if(hdr)hdr.onclick=function(e){
      if(e.target.tagName==='INPUT'||e.target.tagName==='BUTTON')return;
      togglePhaseBody(key);
    };
  });
}
function togglePhaseBody(key){
  var b=sel('pb-'+key),a=sel('parr-'+key);if(!b)return;
  var o=b.classList.contains('show');
  b.classList.toggle('show',!o);
  if(a)a.textContent=o?'\u25BE':'\u25B4';
}
function manualTogglePhase(key){
  var tog=sel('tog-'+key);if(!tog)return;
  var nv=!tog.classList.contains('on');
  tog.className='toggle-pill '+(nv?'on':'off');
  var lbl=sel('togl-'+key);if(lbl)lbl.textContent=nv?'\u{1F7E2} Currently Open \u2014 active':'\u26AA Currently Closed';
  var pc=sel('pc-'+key);if(pc)pc.classList.toggle('open',nv);
  var dot=sel('pdot-'+key);if(dot)dot.className='phase-dot '+(nv?'open':'closed');
  var st=sel('pstatus-'+key);if(st){st.className='phase-status '+(nv?'open':'closed');st.textContent=nv?'\u{1F7E2} Open':'\u26AA Closed';}
  var p={goal_setting_open:G.cycle.goal_setting_open?1:0,mid_year_open:G.cycle.mid_year_open?1:0,year_end_open:G.cycle.year_end_open?1:0};
  if(key==='gs'){p.goal_setting_open=nv?1:0;G.cycle.goal_setting_open=nv?1:0;}
  if(key==='mid'){p.mid_year_open=nv?1:0;G.cycle.mid_year_open=nv?1:0;}
  if(key==='ye'){p.year_end_open=nv?1:0;G.cycle.year_end_open=nv?1:0;}
  xhr('PUT','/api/cycle',p,function(err){
    if(err)toast(err,'error');
    else{updateCyclePill();toast((nv?'Opened':'Closed')+': '+({'gs':'Goal Setting','mid':'Mid-Year Review','ye':'Year-End Review'}[key]||key)+(nv?' \u2713':''),'ok');}
  });
}
function savePhase(key){
  var sd=(sel(key+'-start')||{}).value,ed=(sel(key+'-end')||{}).value,nt=(sel(key+'-note')||{}).value||'';
  if(!sd||!ed){toast('Please set both open and close dates','error');return;}
  if(sd>ed){toast('Open date must be before close date','error');return;}
  // Keep current open/closed state — don't auto-override based on dates
  // The toggle button controls open/closed separately
  var p={goal_setting_open:G.cycle.goal_setting_open?1:0,mid_year_open:G.cycle.mid_year_open?1:0,year_end_open:G.cycle.year_end_open?1:0};
  if(key==='gs'){p.gs_start=sd;p.gs_end=ed;p.gs_note=nt;G.cycle.gs_start=sd;G.cycle.gs_end=ed;}
  if(key==='mid'){p.mid_start=sd;p.mid_end=ed;p.mid_note=nt;G.cycle.mid_start=sd;G.cycle.mid_end=ed;}
  if(key==='ye'){p.ye_start=sd;p.ye_end=ed;p.ye_note=nt;G.cycle.ye_start=sd;G.cycle.ye_end=ed;}
  xhr('PUT','/api/cycle',p,function(err){
    if(err){toast(err,'error');return;}
    var de=sel('pdates-'+key);if(de)de.textContent=sd+' \u2192 '+ed;
    var sd2=sel('pdates-start-'+key),ed2=sel('pdates-end-'+key);
    if(sd2)sd2.textContent=sd.replace(/(\d{4})-(\d{2})-(\d{2})/,'$3/$2/$1');
    if(ed2)ed2.textContent=ed.replace(/(\d{4})-(\d{2})-(\d{2})/,'$3/$2/$1');
    updateCyclePill();
    toast('Dates saved \u2713'+(nt?' \u00B7 Note saved':''),'ok');
  });
}
</script>
