        allChangeReqs.forEach(function(cr,cri){
          crSection+='<div style="padding:10px 0;border-bottom:1px solid var(--g100);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">'+
            '<div style="flex:1">'+
            '<div style="font-size:12px;font-weight:600;color:var(--g800)">'+esc(cr.emp_name)+
            (cr.is_post_midyear?'<span style="margin-left:6px;font-size:9px;background:#FEF3C7;color:#92400E;padding:2px 6px;border-radius:10px;font-weight:700">\u26a0 POST MID-YEAR</span>':'')+
            '</div>'+
            '<div style="font-size:11px;color:var(--g600);margin-top:3px">'+esc(cr.reason)+'</div>'+
            '<div style="font-size:10px;color:var(--g400);margin-top:2px">Submitted '+fmtD(cr.requested_at)+'</div>'+
            '<div class="fg" style="margin-top:8px;margin-bottom:0"><textarea class="fi" rows="2" id="cr-cmt-'+cri+'" placeholder="Comments (required for rejection)\u2026" style="font-size:11px"></textarea></div>'+
            '</div>'+
            '<div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">'+
            '<button class="btn btn-sm btn-green" id="cr-app-'+cri+'">\u2713 Approve</button>'+
            '<button class="btn btn-sm btn-red" id="cr-rej-'+cri+'">\u2717 Reject</button>'+
            '</div></div>';
        });
        crSection+='</div>';
      }

      if(!pending.length){
        setContent(crSection+'<div class="alert al-ok" style="margin-bottom:14px">\u2713 All caught up \u2014 no pending goal approvals.</div>'+buildApprList(done));
        wireChangeReqBtns(allChangeReqs);
        wireApprList(done);
        return;
      }

      var loaded=0,parts=[];
      pending.forEach(function(e,idx){
        xhr('GET','/api/goals/'+e.emp_no,null,function(err2,gs){
          var wtOk=gs?(Math.abs((gs.kras||[]).reduce(function(s,k){return s+(k.kra_weight||0);},0)-100)<0.5):false;
          var part='<div class="card" style="border-left:3px solid var(--amber);margin-bottom:12px">'+
            '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">'+
            '<div class="nc">'+avEl(e)+'<div><div class="en">'+esc(e.name)+'</div><div class="es">'+esc(e.designation||'')+'</div></div></div>'+
            '<div style="display:flex;gap:6px">'+
            '<button class="btn btn-sm" id="appr-v-'+idx+'">View Goals</button>'+
            '<button class="btn btn-sm" style="color:var(--blue);border-color:var(--blue-b)" id="appr-am-'+idx+'">\u270f Amend Goals</button>'+
            '<button class="btn btn-red btn-sm" id="appr-r-'+idx+'">Return</button>'+
            '<button class="btn btn-green btn-sm" id="appr-ok-'+idx+'">\u2713 Approve</button></div></div>';
          if(gs){
            part+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:10px">';
            (gs.kras||[]).forEach(function(k){part+='<div style="padding:8px 10px;background:var(--g50);border-radius:var(--r);font-size:11px"><div style="font-weight:600">'+esc(k.kra_name)+'</div><div style="color:var(--g400);margin-top:2px">'+k.kra_weight+'% \u00b7 '+(k.kpis?k.kpis.length:0)+' KPIs</div></div>';});
            part+='</div><div style="font-size:11px;margin-bottom:10px;color:'+(wtOk?'var(--green)':'var(--red)')+'">KRA total: '+(gs.kras||[]).reduce(function(s,k){return s+(k.kra_weight||0);},0)+'%'+(wtOk?' \u2713':' \u26a0')+'</div>';
          }
          part+='<div class="fg" style="margin-bottom:0"><label class="fl">Comments (optional)</label>'+
            '<textarea class="fi" rows="2" id="appr-c-'+idx+'" placeholder="Feedback for the employee\u2026"></textarea></div></div>';
          parts[idx]=part; loaded++;
          if(loaded===pending.length){
            setContent(crSection+parts.join('')+buildApprList(done));
            wireChangeReqBtns(allChangeReqs);
            pending.forEach(function(pe,pidx){
              var vb=sel('appr-v-'+pidx);if(vb)vb.onclick=(function(en){return function(){openGoalModal(en);};})(pe.emp_no);
              var amb=sel('appr-am-'+pidx);if(amb)amb.onclick=(function(en){return function(){openAmendGoalModal(en);};})(pe.emp_no);
              var rb=sel('appr-r-'+pidx);if(rb)rb.onclick=(function(en,nm){return function(){
                openReturnGoalModal(en,nm);
              };})(pe.emp_no,pe.name);
              var ab=sel('appr-ok-'+pidx);if(ab)ab.onclick=(function(en,ix){return function(){
                var c=sel('appr-c-'+ix);
                xhr('POST','/api/goals/'+en+'/approve',{comments:c?c.value:''},function(err3){if(err3){toast(err3,'error');return;}G.team=null;toast('Goals approved \u2713','ok');pgApprovals();renderNav();});
              };})(pe.emp_no,pidx);
            });
            wireApprList(done);
          }
        });
      });
    }

    // Load change requests for direct reports
    if(direct.length===0){renderAll();return;}
    var crLoaded=0;
    direct.forEach(function(e){
      xhr('GET','/api/goals/'+e.emp_no+'/change-requests',null,function(err2,reqs){
        (reqs||[]).filter(function(r){return r.status==='pending';}).forEach(function(r){
          allChangeReqs.push(Object.assign({},r,{emp_name:e.name,emp_no:e.emp_no}));
        });
        crLoaded++;
        if(crLoaded===direct.length)renderAll();
      });
    });
  });
}

function wireChangeReqBtns(reqs){
  reqs.forEach(function(cr,cri){
    var appBtn=sel('cr-app-'+cri);
    if(appBtn)appBtn.onclick=(function(en,rid){return function(){
      var cmt=(sel('cr-cmt-'+cri)||{}).value||'';
      xhr('POST','/api/goals/'+en+'/change-requests/'+rid+'/approve',{comments:cmt},function(err,res){
        if(err){toast(err,'error');return;}
        if(res&&res.pending_hr){
          toast('\u2713 Supervisor approved. Post mid-year change \u2014 awaiting HR sign-off.','info');
        } else {
          toast('\u2713 Approved. Employee can now edit their goals.','ok');
        }
        pgApprovals();
      });
    };})(cr.emp_no,cr.id);
    var rejBtn=sel('cr-rej-'+cri);
    if(rejBtn)rejBtn.onclick=(function(en,rid,cri2){return function(){
      var cmt=(sel('cr-cmt-'+cri2)||{}).value||'';
      if(!cmt.trim()){toast('Please provide a reason for rejecting','error');return;}
      xhr('POST','/api/goals/'+en+'/change-requests/'+rid+'/reject',{comments:cmt},function(err){
        if(err){toast(err,'error');return;}
        toast('Change request rejected','info');pgApprovals();
      });
    };})(cr.emp_no,cr.id,cri);
  });
}
function openReturnGoalModal(empNo, empName){
  var m=document.createElement('div');m.className='modal-bg';
  m.onclick=function(e){if(e.target===m)m.remove();};
  m.innerHTML='<div class="modal" style="max-width:460px">'+
    '<div class="mhead"><div class="mtitle">\u21a9 Return Goals \u2014 '+esc(empName)+'</div>'+
    '<button class="mx" id="rgm-x">\u2715</button></div>'+
    '<div class="mbody">'+
    '<div class="alert al-warn">\u26a0 The employee will be notified and asked to revise their goals.</div>'+
    '<div class="fg"><label class="fl">Reason for returning <span style="color:var(--red)">*</span></label>'+
    '<textarea class="fi" id="rgm-reason" rows="3" placeholder="Explain what needs to be changed or corrected\u2026"></textarea></div>'+
    '</div>'+
    '<div class="mfoot">'+
    '<button class="btn" id="rgm-cancel">Cancel</button>'+
    '<button class="btn btn-red" id="rgm-confirm">\u21a9 Return to Employee</button>'+
    '</div></div>';
  document.body.appendChild(m);
  sel('rgm-x').onclick=sel('rgm-cancel').onclick=function(){m.remove();};
  sel('rgm-confirm').onclick=function(){
    var reason=(sel('rgm-reason')||{}).value||'';
    if(!reason.trim()){toast('Please provide a reason for returning','error');return;}
    var btn=sel('rgm-confirm');btn.disabled=true;btn.textContent='Returning\u2026';
    xhr('POST','/api/goals/'+empNo+'/reject',{comments:reason.trim()},function(err){
      if(err){toast(err,'error');btn.disabled=false;btn.textContent='\u21a9 Return to Employee';return;}
      m.remove();G.team=null;toast('Goals returned to '+empName+' \u2713','info');pgApprovals();renderNav();
    });
  };
}

function buildApprList(done){
  if(!done.length)return'';
  var h='<div class="card"><div class="card-title">Approved ('+done.length+') <span class="card-sub">Supervisor can amend or return approved goals</span></div>'+
    '<div class="tbl-wrap"><table class="tbl"><thead><tr>'+
    '<th>Employee</th><th>Status</th><th>Score</th><th>Actions</th>'+
    '</tr></thead><tbody>';
  done.forEach(function(e,i){
    h+='<tr>'+
      '<td><div class="nc">'+avEl(e,'sm')+'<div><div class="en">'+esc(e.name)+'</div>'+
      '<div class="es">'+esc(e.designation||'')+'</div></div></div></td>'+
      '<td>'+bdg('approved')+'</td>'+
      '<td>'+(e.overall_score!=null?e.overall_score+'%':'\u2014')+'</td>'+
      '<td><div style="display:flex;gap:4px;flex-wrap:wrap">'+
      '<button class="btn btn-sm" id="appr-dv-'+i+'">View</button>'+
      '<button class="btn btn-sm" style="color:var(--blue);border-color:var(--blue-b)" id="appr-dv-am-'+i+'">\u270f Amend</button>'+
      '<button class="btn btn-sm btn-red" id="appr-dv-ret-'+i+'">Return</button>'+
      '</div></td></tr>';
  });
  return h+'</tbody></table></div></div>';
}
function wireApprList(done){
  done.forEach(function(e,i){
    var vb=sel('appr-dv-'+i);
    if(vb)vb.onclick=(function(en){return function(){openGoalModal(en);};})(e.emp_no);
    var amb=sel('appr-dv-am-'+i);
    if(amb)amb.onclick=(function(en){return function(){openAmendGoalModal(en);};})(e.emp_no);
    var retb=sel('appr-dv-ret-'+i);
    if(retb)retb.onclick=(function(en,nm){return function(){
      openReturnGoalModal(en,nm);
    };})(e.emp_no, e.name);
  });
}
function approveGoal(empNo){
  xhr('POST','/api/goals/'+empNo+'/approve',{comments:''},function(err){if(err){toast(err,'error');return;}G.team=null;toast('Goals approved \u2713','ok');pgApprovals();renderNav();});
}

function openAmendGoalModal(empNo){
  xhr('GET','/api/goals/'+empNo,null,function(err,gs){
    xhr('GET','/api/employees/'+empNo,null,function(e2,emp){
      if(!gs||!gs.kras){toast('No goal sheet found','error');return;}
      var amendKRAs=JSON.parse(JSON.stringify(gs.kras));
      var m=document.createElement('div');m.className='modal-bg';
      m.onclick=function(e){if(e.target===m)m.remove();};

      function buildAmendHTML(){
        var h='<div class="alert al-warn" style="margin-bottom:14px">\u270f You are amending the goals before approving. Only KRA/KPI names and weights can be changed. Changes will be saved and then you can approve.</div>';
        amendKRAs.forEach(function(kra,ki){
          var kpiTotal=(kra.kpis||[]).reduce(function(s,k){return s+(k.kpi_weight||0);},0);
          var kpiOk=Math.abs(kpiTotal-100)<0.5;
          h+='<div class="kra-block" style="margin-bottom:10px"><div class="kra-head" style="display:flex;align-items:center;gap:8px;padding:10px 14px">'+
            '<div class="kra-n">'+(ki+1)+'</div>'+
            '<input class="fi" id="am-kra-nm-'+ki+'" value="'+esc(kra.kra_name)+'" style="flex:1;font-weight:600;font-size:12px">'+
            '<span style="font-size:11px;color:var(--g500)">Weight:</span>'+
            '<input type="number" class="fi" id="am-kra-wt-'+ki+'" value="'+kra.kra_weight+'" min="0" max="100" style="width:56px;text-align:center;font-weight:600;color:var(--blue-d);background:var(--blue-l);border-color:var(--blue-b)">'+
            '<span style="font-size:11px;color:var(--g500)">%</span></div>'+
            '<div class="kra-body">'+
            '<div style="display:grid;grid-template-columns:1fr 66px;gap:6px;padding:6px 0 3px;border-bottom:1px solid var(--g200);margin-bottom:2px">'+
            '<div class="kpi-ch" style="text-align:left">KPI Description</div><div class="kpi-ch">Weight%</div></div>';
          (kra.kpis||[]).forEach(function(kpi,pi){
            h+='<div style="display:grid;grid-template-columns:1fr 66px;gap:6px;align-items:center;padding:7px 0;border-bottom:1px solid var(--g100)">'+
              '<input class="fi" id="am-kpi-desc-'+ki+'-'+pi+'" value="'+esc(kpi.desc)+'" style="font-size:11px">'+
              '<input type="number" class="fi kpi-inp" id="am-kpi-wt-'+ki+'-'+pi+'" value="'+kpi.kpi_weight+'" min="0" max="100" style="text-align:center">'+
              '</div>';
          });
          h+='<div style="font-size:11px;padding:6px 0;color:'+(kpiOk?'var(--green)':'var(--red)')+'">KPI weights: '+Math.round(kpiTotal*10)/10+'%'+(kpiOk?' \u2713':' \u26a0 must equal 100%')+'</div>'+
          '</div></div>';
        });
        return h;
      }

      m.innerHTML='<div class="modal modal-lg">'+
        '<div class="mhead"><div style="display:flex;align-items:center;gap:10px">'+
        (emp?'<div class="av" style="background:'+avc(emp.emp_no)[0]+';color:'+avc(emp.emp_no)[1]+'">'+initials(emp.name)+'</div>':'')+
        '<div><div class="mtitle">Amend Goals \u2014 '+(emp?esc(emp.name):'Emp '+empNo)+'</div>'+
        '<div style="font-size:11px;color:var(--g400)">Changes saved to DB. Employee will see updated goals after approval.</div></div></div>'+
        '<button class="mx" id="am-x">\u2715</button></div>'+
        '<div class="mbody" id="am-body">'+buildAmendHTML()+'</div>'+
        '<div class="mfoot">'+
        '<button class="btn" id="am-cls">Cancel</button>'+
        '<button class="btn btn-sm" id="am-save-only">Save Changes</button>'+
        '<button class="btn btn-green" id="am-save-appr">Save &amp; Approve \u2713</button>'+
        '</div></div>';
      document.body.appendChild(m);
      sel('am-x').onclick=sel('am-cls').onclick=function(){m.remove();};

      function collectAmends(){
        amendKRAs.forEach(function(kra,ki){
          var nm=sel('am-kra-nm-'+ki),wt=sel('am-kra-wt-'+ki);
          if(nm)kra.kra_name=nm.value;
          if(wt)kra.kra_weight=parseFloat(wt.value)||0;
          (kra.kpis||[]).forEach(function(kpi,pi){
            var d=sel('am-kpi-desc-'+ki+'-'+pi),w=sel('am-kpi-wt-'+ki+'-'+pi);
            if(d)kpi.desc=d.value;
            if(w)kpi.kpi_weight=parseFloat(w.value)||0;
          });
        });
      }

      function doSave(thenApprove){
        collectAmends();
        // Validate KRA weights
        var kraTotal=amendKRAs.reduce(function(s,k){return s+(k.kra_weight||0);},0);
        if(Math.abs(kraTotal-100)>0.5){toast('KRA weights must total 100% (currently '+Math.round(kraTotal*10)/10+'%)','error');return;}
        for(var i=0;i<amendKRAs.length;i++){
          var kt=(amendKRAs[i].kpis||[]).reduce(function(s,k){return s+(k.kpi_weight||0);},0);
          if(Math.abs(kt-100)>0.5){toast('KPI weights in "'+amendKRAs[i].kra_name+'" must total 100%','error');return;}
        }
        xhr('POST','/api/goals/'+empNo+'/amend',{kras:amendKRAs},function(err2){
          if(err2){toast(err2,'error');return;}
          toast('Changes saved \u2713','ok');
          if(thenApprove){
            xhr('POST','/api/goals/'+empNo+'/approve',{comments:'Approved after amendment'},function(err3){
              if(err3){toast(err3,'error');return;}
              m.remove();G.team=null;toast('Goals amended and approved \u2713','ok');pgApprovals();renderNav();
            });
          }
        });
      }

      sel('am-save-only').onclick=function(){doSave(false);};
      sel('am-save-appr').onclick=function(){doSave(true);};
    });
  });
}

// ── HR REVIEWS (HR Admin full access to all employee reviews) ──
// HR CHANGE REQUESTS PAGE
function pgChangeReqs(){
  xhr('GET','/api/goals/change-requests/all',null,function(err,reqs){
    if(err){setContent('<div class="alert al-err">'+err+'</div>');return;}
    reqs=reqs||[];
    var pending=reqs.filter(function(r){return r.status==='pending'||r.status==='pending_hr';});
    var reviewed=reqs.filter(function(r){return r.status!=='pending';});

    function buildReqCard(cr,i,showActions){
      var sc={pending:{col:'var(--amber)',bg:'#FFFBEB',lbl:'Pending Supervisor'},
              pending_hr:{col:'#7C3AED',bg:'#F5F3FF',lbl:'Pending HR Sign-off'},
              approved:{col:'var(--green)',bg:'#F0FDF4',lbl:'Approved'},
              rejected:{col:'var(--red)',bg:'#FEF2F2',lbl:'Rejected'}}[cr.status]||{col:'var(--g400)',bg:'var(--g50)',lbl:cr.status};
      var h='<div class="card" style="margin-bottom:10px;border-left:3px solid '+sc.col+'">'+
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">'+
        '<div style="flex:1">'+
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">'+
        '<span style="font-size:13px;font-weight:600;color:var(--g900)">'+esc(cr.emp_name)+'</span>'+
        '<span style="font-size:10px;color:var(--g500)">'+esc(cr.designation||'')+'</span>'+
        '<span style="font-size:10px;background:var(--g100);padding:2px 7px;border-radius:10px;color:var(--g600)">'+esc((cr.company||'').replace(' (Pvt) Ltd','').replace(' (Private) Limited',''))+'</span>'+
        (cr.is_post_midyear?'<span style="font-size:9px;background:#FEF3C7;color:#92400E;padding:2px 7px;border-radius:10px;font-weight:700">⚠ POST MID-YEAR</span>':'')+
        '<span style="font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;background:'+sc.bg+';color:'+sc.col+'">'+sc.lbl+'</span>'+
        '</div>'+
        '<div style="font-size:12px;color:var(--g800);margin-bottom:6px;padding:8px 10px;background:var(--g50);border-radius:var(--r)">'+
        '<strong>Reason for change:</strong> '+esc(cr.reason||'')+'</div>'+
        '<div style="font-size:10px;color:var(--g500);display:flex;gap:14px;flex-wrap:wrap;margin-bottom:4px">'+
        '<span>Supervisor: '+esc(cr.supervisor_name||'Not assigned')+'</span>'+
        '<span>Submitted: '+fmtD(cr.requested_at)+'</span>'+
        (cr.sup_approved_at?'<span style="color:var(--blue)">\u2714 Sup approved: '+fmtD(cr.sup_approved_at)+' ('+esc(cr.sup_approved_by_name||'')+')</span>':'')+
        (cr.reviewed_at?'<span>\u2713 HR reviewed: '+fmtD(cr.reviewed_at)+' by '+esc(cr.reviewed_by_name||'HR')+'</span>':'')+
        '</div>'+
        (cr.sup_comments?'<div style="font-size:11px;color:var(--g600);margin-top:6px;padding:6px 10px;background:#EFF6FF;border-radius:var(--r)"><strong>Supervisor comments:</strong> '+esc(cr.sup_comments)+'</div>':'')+
        (cr.reviewer_comments?'<div style="font-size:11px;color:var(--g600);margin-top:6px;padding:6px 10px;background:#F0FDF4;border-radius:var(--r)"><strong>HR comments:</strong> '+esc(cr.reviewer_comments)+'</div>':'')+
        (showActions?'<div class="fg" style="margin-top:10px;margin-bottom:0"><textarea class="fi" rows="2" id="hr-cr-cmt-'+i+'" placeholder="Add comments (required for rejection)…" style="font-size:11px"></textarea></div>':'')+
        '</div>'+
        '<div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">'+
        '<button class="btn btn-sm" id="hr-cr-gs-'+i+'">View Goals</button>'+
        (showActions&&cr.status==='pending_hr'?'<button class="btn btn-sm btn-blue" id="hr-cr-app-'+i+'">✓ Final HR Approve</button><button class="btn btn-sm btn-red" id="hr-cr-rej-'+i+'">✗ Reject</button>':'')+
        (showActions&&cr.status==='pending'?'<button class="btn btn-sm btn-green" id="hr-cr-app-'+i+'">✓ Approve</button><button class="btn btn-sm btn-red" id="hr-cr-rej-'+i+'">✗ Reject</button>':'')+
        '</div></div></div>';
      return h;
    }

    var h='<div class="alert al-info" style="margin-bottom:14px">'+
      '<strong>Goal Change Requests</strong> — Employees submit change requests to amend approved goals. '+
      'The supervisor approves first. Post-mid-year requests are flagged and HR is notified automatically.</div>';

    var nHR=pending.filter(function(r){return r.status==='pending_hr';}).length;
    h+='<div style="font-size:13px;font-weight:700;color:var(--g800);margin-bottom:8px">'+
      'Pending <span style="font-size:11px;font-weight:400;color:var(--g500)">('+pending.length+')</span>'+
      (nHR?'<span style="margin-left:8px;font-size:10px;background:#F5F3FF;color:#7C3AED;padding:2px 8px;border-radius:10px;font-weight:600">⚠ '+nHR+' awaiting HR sign-off</span>':'')+
      '</div>';
    if(!pending.length){
      h+='<div class="card" style="text-align:center;padding:28px;color:var(--g400)">✓ No pending change requests</div>';
    } else {
      pending.forEach(function(cr,i){ h+=buildReqCard(cr,i,true); });
    }

    h+='<div style="font-size:13px;font-weight:700;color:var(--g800);margin:20px 0 8px">'+
      'History <span style="font-size:11px;font-weight:400;color:var(--g500)">('+reviewed.length+')</span></div>';
    if(!reviewed.length){
      h+='<div class="card" style="text-align:center;padding:20px;color:var(--g400)">No reviewed requests yet</div>';
    } else {
      reviewed.forEach(function(cr,i){ h+=buildReqCard(cr,pending.length+i,false); });
    }

    setContent(h);

    // Wire pending buttons
    pending.forEach(function(cr,i){
      var gsb=sel('hr-cr-gs-'+i);

      var app=sel('hr-cr-app-'+i);
      if(app)app.onclick=(function(en,rid,ci){return function(){
        var cmt=(sel('hr-cr-cmt-'+ci)||{}).value||'';
        xhr('POST','/api/goals/'+en+'/change-requests/'+rid+'/approve',{comments:cmt},function(err){
          if(err){toast(err,'error');return;}
          toast('✓ Approved — employee can now edit their goals','ok');
          G.pendingChangeCount=Math.max(0,(G.pendingChangeCount||1)-1);renderNav();pgChangeReqs();
        });
      };})(cr.emp_no,cr.id,i);
      var rej=sel('hr-cr-rej-'+i);
      if(rej)rej.onclick=(function(en,rid,ci){return function(){
        var cmt=(sel('hr-cr-cmt-'+ci)||{}).value||'';
        if(!cmt.trim()){toast('Please provide a reason for rejecting','error');return;}
        xhr('POST','/api/goals/'+en+'/change-requests/'+rid+'/reject',{comments:cmt},function(err){
          if(err){toast(err,'error');return;}
          toast('Change request rejected','info');
          G.pendingChangeCount=Math.max(0,(G.pendingChangeCount||1)-1);renderNav();pgChangeReqs();
        });
      };})(cr.emp_no,cr.id,i);

    reviewed.forEach(function(cr,i){
      var gsb=sel('hr-cr-gs-'+(pending.length+i));

  });

function filterHRR(){
  if(!G.hrRevUsers)return;
  var q=(sel('hrr-q').value||'').toLowerCase(),co=sel('hrr-co').value;
  var list=G.hrRevUsers;
  if(q)list=list.filter(function(u){return u.name.toLowerCase().includes(q)||String(u.emp_no).includes(q);});
  if(co)list=list.filter(function(u){return u.company===co;});

// Review Override Modal
function openReviewOverrideModal(empNo, empName, reviewType){
  var label = reviewType==='mid_year' ? 'Mid-Year' : 'Year-End';
  xhr('GET','/api/review-overrides/'+empNo,null,function(err,overrides){
    if(err){toast('Could not load overrides: '+err,'error');return;}
    var existing=(overrides||[]).find(function(o){return o.review_type===reviewType;});
    var cs=existing?existing.state:null;
    var stLabel='Current: '+(cs==='open'?'<span style="color:var(--green);font-weight:600">Unlocked</span>':
                cs==='locked'?'<span style="color:var(--red);font-weight:600">Locked (override)</span>':
                '<span style="color:var(--g500)">Following global window</span>');
    var m=document.createElement('div');m.className='modal-bg';
    m.onclick=function(e){if(e.target===m)m.remove();};
    m.innerHTML='<div class="modal" style="max-width:480px">'+
      '<div class="mhead"><div class="mtitle">'+label+' Override — '+esc(empName)+'</div>'+
      '<button class="mx" id="or-x">✕</button></div>'+
      '<div class="mbody">'+
      '<div class="alert al-info" style="margin-bottom:12px">'+stLabel+'</div>'+
      '<p style="font-size:12px;color:var(--g500);margin:0 0 12px">Override the global cycle window for this employee only. Useful for new joiners, probation completions, or late submissions approved by HR.</p>'+
      '<div class="fg"><label class="fl">Override State</label>'+
      '<select class="fi" id="or-state">'+
        '<option value=""'+(cs?'':' selected')+'>Follow global window (no override)</option>'+
        '<option value="open"'+(cs==='open'?' selected':'')+'>Force Open — employee can access this review</option>'+
        '<option value="locked"'+(cs==='locked'?' selected':'')+'>Force Locked — cannot access even if window is open</option>'+
      '</select></div>'+
      '<div class="fg"><label class="fl">Reason <span style="color:var(--red)">*</span></label>'+
      '<input class="fi" id="or-reason" placeholder="e.g. New joiner probation review, late submission approved by HR…" value="'+(existing&&existing.reason?esc(existing.reason):'')+'"></div>'+
      '</div>'+
      '<div class="mfoot">'+
      '<button class="btn" id="or-cancel">Cancel</button>'+
      '<button class="btn btn-blue" id="or-save">Save Override</button>'+
      '</div></div>';
    document.body.appendChild(m);
    sel('or-x').onclick=sel('or-cancel').onclick=function(){m.remove();};
    sel('or-save').onclick=function(){
      var state=sel('or-state').value||null;
      var reason=(sel('or-reason').value||'').trim();
      if(state&&!reason){toast('Please enter a reason for the override','error');return;}
      var btn=sel('or-save');btn.disabled=true;btn.textContent='Saving…';
      xhr('POST','/api/review-overrides/'+empNo,{review_type:reviewType,state:state||null,reason:reason},function(err){
        if(err){toast(err,'error');btn.disabled=false;btn.textContent='Save Override';return;}
        m.remove();
        var msg=state==='open'?'Unlocked':state==='locked'?'Locked':'Override cleared';
        toast('✓ '+label+': '+msg+' for '+empName,'ok');
      });
    };
  });
}

// ── USER MANAGEMENT ───────────────────────────────────────────
function pgUserMgmt(){
  xhr('GET','/admin/users?limit=500',null,function(err,users){
    if(err){setContent('<div class="alert al-err">'+err+'</div>');return;}
    // Also fetch full user data (includes email) and merge
    xhr('GET','/api/employees',null,function(e2,fullUsers){
      if(fullUsers&&fullUsers.length){
        var emailMap={};
        fullUsers.forEach(function(u){if(u.email)emailMap[u.emp_no]=u.email;});
        users.forEach(function(u){if(emailMap[u.emp_no])u.email=emailMap[u.emp_no];});
      }
    G.umData=users;
    var cos=[...new Set(users.map(function(u){return u.company;}))].sort();
    var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
      '<div style="font-size:13px;font-weight:600">'+users.length+' employees</div>'+
      '<button class="btn btn-blue btn-sm" id="btn-add-user">\u002b Add Employee</button></div>'+
      '<div class="filter-row">'+
      '<input placeholder="Search name, emp no\u2026" id="um-q">'+
      '<select id="um-co"><option value="">All companies</option>'+cos.map(function(c){return'<option>'+esc(c)+'</option>';}).join('')+'</select>'+
      '<select id="um-st"><option value="">All statuses</option><option value="not_activated">Not Activated</option><option value="locked">Locked</option><option value="inactive">Inactive</option></select>'+
      '<span style="font-size:12px;color:var(--g400)" id="um-count">'+users.length+' employees</span></div>'+
      '<div class="card"><div id="um-table">'+buildUMTable(users)+'</div></div>';
    setContent(h);
    sel('btn-add-user').onclick=openAddUserModal;
    sel('um-q').oninput=filterUM; sel('um-co').onchange=filterUM; sel('um-st').onchange=filterUM;
    wireUMTable(users);
    }); // close api/employees xhr
  }); // close admin/users xhr
}
function filterUM(){
  if(!G.umData)return;
  var q=(sel('um-q').value||'').toLowerCase(),co=sel('um-co').value,st=sel('um-st').value,now=Math.floor(Date.now()/1000);
  var list=G.umData;
  if(q)list=list.filter(function(u){return u.name.toLowerCase().includes(q)||String(u.emp_no).includes(q)||(u.designation||'').toLowerCase().includes(q);});
  if(co)list=list.filter(function(u){return u.company===co;});
  if(st==='not_activated')list=list.filter(function(u){return !u.activated;});
  else if(st==='locked')list=list.filter(function(u){return u.locked_until&&u.locked_until>now;});
  else if(st==='inactive')list=list.filter(function(u){return !u.is_active;});
  var cnt=sel('um-count');if(cnt)cnt.textContent=list.length+' employees';
  html('um-table',buildUMTable(list)); wireUMTable(list);
}
function buildUMTable(list){
  if(!list.length)return'<div class="empty">No employees found</div>';
  var now=Math.floor(Date.now()/1000);
  var h='<div class="tbl-wrap"><table class="tbl"><thead><tr>'+
    '<th>Employee</th><th>Company</th><th>Role</th><th>Status</th><th>Last Login</th><th>Actions</th>'+
    '</tr></thead><tbody>';
  list.slice(0,100).forEach(function(u,i){
    var locked=u.locked_until&&u.locked_until>now;
    var sTxt=!u.is_active?'\ud83d\udeab Inactive':locked?'\ud83d\udd12 Locked':!u.activated?'\u26a0 Not Activated':u.must_change_pw?'\u26a1 Must Change PW':'\u2713 Active';
    var sCol=!u.is_active||locked?'var(--red)':!u.activated?'var(--amber)':'var(--green)';
    h+='<tr><td><div class="nc">'+avEl(u,'sm')+'<div><div class="en">'+esc(u.name)+'</div>'+
      '<div class="es">'+esc(u.designation||'')+' \u00b7 Emp '+u.emp_no+'</div>'+
      (u.email?'<div style="font-size:9px;color:var(--blue)">\u2709 '+esc(u.email)+'</div>':'<div style="font-size:9px;color:var(--amber)">\u26a0 No email</div>')+
      '</div></div></td>'+
      '<td style="font-size:10px;color:var(--g400)">'+esc((u.company||'').replace(' (Pvt) Ltd','').replace(' (Private) Limited',''))+'</td>'+
      '<td><select class="fi" id="um-role-'+i+'" style="padding:3px 6px;font-size:10px;width:110px">'+
      Object.entries(RLB).map(function(kv){return'<option value="'+kv[0]+'"'+(u.role===kv[0]?' selected':'')+'>'+kv[1]+'</option>';}).join('')+'</select></td>'+
      '<td style="font-size:11px;color:'+sCol+';font-weight:500">'+sTxt+'</td>'+
      '<td style="font-size:10px;color:var(--g400)">'+(u.last_login?new Date(u.last_login*1000).toLocaleDateString('en-GB'):'Never')+'</td>'+
      '<td><div style="display:flex;gap:3px;flex-wrap:wrap">'+
      (!u.activated?'<button class="btn btn-blue btn-sm" id="um-act-'+i+'">Activate</button>':'')+
      '<button class="btn btn-sm" id="um-rst-'+i+'">Reset PW</button>'+
      (locked?'<button class="btn btn-green btn-sm" id="um-ulk-'+i+'">Unlock</button>':'')+
      '<button class="btn btn-sm" id="um-edt-'+i+'">\u270e Edit</button>'+
      '<button class="btn btn-amber btn-sm" id="um-rsg-'+i+'" title="Delete this employee\'s goal sheet so they can start fresh">Reset Goals</button>'+
      (u.is_active?'<button class="btn btn-red btn-sm" id="um-dis-'+i+'">Disable</button>':'<button class="btn btn-green btn-sm" id="um-ena-'+i+'">Enable</button>')+
      '<button class="btn btn-sm" id="um-del-'+i+'" style="padding:4px 7px" title="Delete permanently">\ud83d\uddd1</button>'+
      '</div></td></tr>';
  });
  return h+'</tbody></table></div>'+(list.length>100?'<div class="empty" style="padding:8px">Showing 100 of '+list.length+' \u2014 filter to see more</div>':'');
}
function wireUMTable(list){
  list.slice(0,100).forEach(function(u,i){
    var rs=sel('um-role-'+i);if(rs)rs.onchange=(function(en){return function(){xhr('PUT','/admin/users/'+en+'/role',{role:this.value},function(err){if(err)toast(err,'error');else toast('Role updated \u2713','ok');})};})(u.emp_no);
    var ab=sel('um-act-'+i);if(ab)ab.onclick=(function(en,nm){return function(){
      var pw=prompt('Set temp password for '+nm+' (min 6 chars):');if(!pw||pw.length<6){toast('Too short','error');return;}
      xhr('PUT','/admin/users/'+en+'/activate',{temp_password:pw},function(err,res){if(err){toast(err,'error');return;}
      alert('Activated: '+nm+'\nEmp No: '+en+'\nTemp PW: '+pw+'\n(They must change on first login)');toast('Activated \u2713','ok');pgUserMgmt();});};})(u.emp_no,u.name);
    var rb=sel('um-rst-'+i);if(rb)rb.onclick=(function(en,nm){return function(){
      xhr('POST','/admin/users/'+en+'/generate-reset-token',null,function(err,res){if(err){toast(err,'error');return;}
      alert('Reset token for '+nm+':\nEmp No: '+en+'\nToken: '+res.reset_token+'\nExpires: '+res.expires+'\n\nTell them to click "Forgot password?" on the login page.');});};})(u.emp_no,u.name);
    var ul=sel('um-ulk-'+i);if(ul)ul.onclick=(function(en){return function(){xhr('POST','/admin/users/'+en+'/unlock',null,function(err){if(err){toast(err,'error');return;}toast('Unlocked \u2713','ok');pgUserMgmt();});};})(u.emp_no);
    var ed=sel('um-edt-'+i);if(ed)ed.onclick=(function(en){return function(){openEditModal(en);};})(u.emp_no);
    var rsg=sel('um-rsg-'+i);if(rsg)rsg.onclick=(function(en,nm){return function(){
      if(!confirm('Reset goals for '+nm+'?\n\nThis will DELETE their current goal sheet so they can start fresh.\nThis cannot be undone.'))return;
      xhr('POST','/api/goals/'+en+'/reset',null,function(err){
        if(err){toast(err,'error');return;}
        toast('Goals reset for '+nm+' \u2713','ok');
        G.umData=null;pgUserMgmt();
      });
    };})(u.emp_no,u.name);
    var db2=sel('um-dis-'+i);if(db2)db2.onclick=(function(en){return function(){if(!confirm('Disable this account?'))return;xhr('POST','/admin/users/'+en+'/deactivate',null,function(err){if(err){toast(err,'error');return;}toast('Disabled','info');pgUserMgmt();});};})(u.emp_no);
    var eb=sel('um-ena-'+i);if(eb)eb.onclick=(function(en){return function(){xhr('POST','/admin/users/'+en+'/reactivate',null,function(err){if(err){toast(err,'error');return;}toast('Enabled \u2713','ok');pgUserMgmt();});};})(u.emp_no);
    var dlb=sel('um-del-'+i);if(dlb)dlb.onclick=(function(en,nm){return function(){
      if(!confirm('PERMANENTLY DELETE '+nm+' (Emp '+en+')?\n\nThis removes their account, goals and reviews.\nThis CANNOT be undone.'))return;
      var t=prompt('Type name to confirm deletion:\n'+nm);if(t!==nm){toast('Cancelled','warn');return;}
      xhr('DELETE','/admin/users/'+en,null,function(err,res){if(err){toast(err,'error');return;}toast('\u2713 '+res.message,'ok');G.umData=null;pgUserMgmt();});
    };})(u.emp_no,u.name);
  });
}

// ── CALIBRATION ───────────────────────────────────────────────
function pgCalib(){
  xhr('GET','/api/calibration',null,function(err,data){
    if(err){setContent('<div class="alert al-err">'+err+'</div>');return;}
    G.calibData=data;
    // All employees — not filtered by score
    var allData=data||[];
    var yeData=allData.filter(function(e){return e.ye_score!=null||e.system_rating||e.final_rating;});
    var cos=[...new Set(allData.map(function(e){return e.company;}))].sort();

    // Overall distribution counts
    var dist={A:0,B:0,C:0,D:0,E:0};
    yeData.forEach(function(e){var r=e.final_rating||e.system_rating;if(r)dist[r]++;});

    var h='<div class="alert '+(G.calibLocked?'al-warn':'al-ok')+'">'+
      (G.calibLocked?'\ud83d\udd12':'\ud83d\udd13')+
      ' Calibration is <strong>'+(G.calibLocked?'LOCKED \u2014 final ratings not yet visible to employees':'PUBLISHED \u2014 employees can see their final rating')+'</strong></div>';

    // Tabs
    h+='<div class="tabs">'+
      '<button class="tab on" id="cal-tab-dist">Rating Distribution</button>'+
      '<button class="tab" id="cal-tab-ind">Individual Calibration</button>'+
      '</div><div id="cal-body"></div>';

    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:8px;flex-wrap:wrap">'+
      '<div style="display:flex;gap:8px">'+
      '<button class="btn btn-sm" id="calib-dl-btn">\u2193 Download Calibration CSV</button>'+
      '<button class="btn btn-sm" id="calib-dl-co-btn">\u2193 Download by Company</button></div>'+
      '<button class="btn '+(G.calibLocked?'btn-blue':'btn-red')+'" id="calib-pub-btn">'+
      (G.calibLocked?'\ud83d\udd13 Publish Final Ratings to Employees':'\ud83d\udd12 Re-Lock Calibration')+'</button></div>';

    setContent(h);

    function buildDistTab(){
      var hh=ratingKey();
      hh+='<div class="stats s5" style="margin-bottom:16px">';
      RATINGS.forEach(function(r){hh+=sCard(dist[r.r]||0,r.r+' \u2014 '+r.lbl,
        (r.r==='A'?'>125%':r.r==='B'?'101\u2013125%':r.r==='C'?'85\u2013100%':r.r==='D'?'60\u201384%':'<60%'),r.col);});
      hh+='</div>';

      // Company distribution table
      hh+='<div class="card"><div class="card-title">Rating Distribution by Company '+
        '<span class="card-sub">Click a company row to see employee detail</span></div>'+
        '<div class="tbl-wrap"><table class="tbl"><thead><tr>'+
        '<th>Company</th><th>Staff</th>'+
        RATINGS.map(function(r){return'<th style="color:'+r.col+'">'+r.r+'</th>';}).join('')+
        '<th style="color:var(--green)">A+B</th><th style="color:var(--green)">A+B%</th>'+
        '</tr></thead><tbody>';

      // Build per-company distribution
      var coDist={};
      yeData.forEach(function(e){
        var co=e.company||'Unknown';
        if(!coDist[co])coDist[co]={A:0,B:0,C:0,D:0,E:0,total:0};
        var r=e.final_rating||e.system_rating;
        if(r&&coDist[co][r]!==undefined){coDist[co][r]++;coDist[co].total++;}
      });

      cos.forEach(function(co,ci){
        var cd=coDist[co]||{A:0,B:0,C:0,D:0,E:0,total:0};
        var coTotal=data.filter(function(e){return e.company===co;}).length;
        var ab=(cd.A||0)+(cd.B||0);
        var abPct=cd.total>0?Math.round(ab/cd.total*100):0;
        var coShort=(co||'').replace(' (Private) Limited','').replace(' (Pvt) Ltd','');
        hh+='<tr style="cursor:pointer" id="cdist-row-'+ci+'">'+
          '<td style="font-size:11px;font-weight:500">'+esc(coShort)+' <span style="font-size:9px;color:var(--blue)">\u25bc</span></td>'+
          '<td>'+coTotal+'</td>'+
          RATINGS.map(function(r){
            var cnt=cd[r.r]||0;
            return'<td style="color:'+r.col+';font-weight:'+(cnt>0?'700':'400')+'">'+cnt+'</td>';
          }).join('')+
          '<td style="color:var(--green);font-weight:700">'+ab+'</td>'+
          '<td style="color:var(--green);font-weight:700">'+abPct+'%</td>'+
          '</tr>';
      });

      // Totals row
      var totAB=(dist.A||0)+(dist.B||0);
      var totABpct=total>0?Math.round(totAB/total*100):0;
      hh+='<tr style="background:var(--g50);font-weight:700;border-top:2px solid var(--g200)">'+
        '<td>All Companies</td><td>'+data.length+'</td>'+
        RATINGS.map(function(r){return'<td style="color:'+r.col+'">'+(dist[r.r]||0)+'</td>';}).join('')+
        '<td style="color:var(--green)">'+totAB+'</td>'+
        '<td style="color:var(--green)">'+totABpct+'%</td></tr>';

      hh+='</tbody></table></div></div>';
      return hh;
    }

    function buildIndTab(){
      var hh='<div class="card"><div class="card-title">Individual Calibration '+
        '<span class="card-sub">'+allData.length+' total employees \u00b7 '+yeData.length+' with year-end scores</span></div>'+
        '<div class="filter-row"><input placeholder="Search name\u2026" id="cal-q">'+
        '<select id="cal-co"><option value="">All companies</option>'+
        cos.map(function(c){return'<option>'+esc(c)+'</option>';}).join('')+'</select>'+
        '<select id="cal-scored"><option value="">All employees</option>'+
        '<option value="scored">Scored only</option>'+
        '<option value="unscored">Not yet scored</option></select></div>'+
        '<div id="cal-table">'+buildCalibTable(allData)+'</div></div>';
      return hh;
    }

    var tabDist=sel('cal-tab-dist'),tabInd=sel('cal-tab-ind');
    if(tabDist)tabDist.onclick=function(){
      tabDist.classList.add('on');tabInd.classList.remove('on');
      html('cal-body',buildDistTab());
      wireCoDist(cos,coDist2);
    };
    if(tabInd)tabInd.onclick=function(){
      tabInd.classList.add('on');tabDist.classList.remove('on');
      html('cal-body',buildIndTab());
      var co2=sel('cal-co');if(co2)co2.onchange=filterCalibTable;
      var cq=sel('cal-q');if(cq)cq.oninput=filterCalibTable;
      var cs=sel('cal-scored');if(cs)cs.onchange=filterCalibTable;
      wireCalibTable(allData);
    };

    // Build company dist map
    var coDist2={};
    yeData.forEach(function(e){
      var co=e.company||'Unknown';
      if(!coDist2[co])coDist2[co]={A:0,B:0,C:0,D:0,E:0,total:0};
      var r=e.final_rating||e.system_rating;
      if(r&&coDist2[co][r]!==undefined){coDist2[co][r]++;coDist2[co].total++;}
    });

    function filterCalibTable(){
      var co=(sel('cal-co')||{}).value||'';
      var q=((sel('cal-q')||{}).value||'').toLowerCase();
      var scored=(sel('cal-scored')||{}).value||'';

function filterCalib(){

function pgReports(){
  xhr('GET','/api/stats',null,function(err,s){
    if(err){setContent('<div class="alert al-err">'+err+'</div>');return;}
    var gs={}; (s.goal_stats||[]).forEach(function(g){gs[g.status]=g.n;});
    var midDist={}; (s.mid_dist||[]).forEach(function(d){midDist[d.system_rating]=d.n;});
    var yeDist={};  (s.ye_dist||[]).forEach(function(d){yeDist[d.system_rating]=d.n;});
    var midTotal=Object.values(midDist).reduce(function(a,b){return a+b;},0);
    var yeTotal=Object.values(yeDist).reduce(function(a,b){return a+b;},0);
    var approvedN=gs.approved||0;

    var h='<div class="tabs">'+
      '<button class="tab on" id="rpt-tab-live">Live Tracker</button>'+
      '<button class="tab" id="rpt-tab-dist">Rating Distribution</button>'+
      '<button class="tab" id="rpt-tab-dl">Downloads</button>'+
      '</div><div id="rpt-body"></div>';
    setContent(h);

    function buildLiveTracker(){
      var hh='';
      var approvedN=gs.approved||0;
      var coList=s.by_company||[];

      hh+='<div class="stats s4" style="margin-bottom:16px">'+
        sCard(s.total_users,'Total Employees',coList.length+' companies',null)+
        sCard(Math.round(((gs.approved||0)/Math.max(s.total_users,1))*100)+'%','Goal Approval Rate',(gs.approved||0)+' approved of '+s.total_users,null)+
        sCard((s.mid_year&&s.mid_year.self_submitted)||0,'Mid-Year Submitted',
          (s.mid_year&&s.mid_year.mgr_submitted||0)+' mgr reviewed',null)+
        sCard((s.year_end&&s.year_end.self_submitted)||0,'Year-End Submitted',
          (s.year_end&&s.year_end.mgr_submitted||0)+' mgr reviewed',null)+'</div>';

      if(s.pending_changes>0){
        hh+='<div class="alert al-warn" style="margin-bottom:14px">\u270f <strong>'+s.pending_changes+'</strong> pending goal change request'+(s.pending_changes>1?'s':'')+' require review.</div>';
      }

      // Goal Status by Company — click to expand
      hh+='<div class="card" style="margin-bottom:14px">'+
        '<div class="card-title">Goal Status by Company <span class="card-sub">Click a company to see employee detail</span></div>'+
        '<div class="tbl-wrap"><table class="tbl"><thead><tr>'+
        '<th>Company</th><th>Staff</th><th>Activated</th><th>Draft</th>'+
        '<th>Submitted</th><th>Approved</th><th>Not Started</th><th>Approval %</th>'+
        '</tr></thead><tbody>';
      coList.forEach(function(co,ci){
        var notStarted=Math.max(0,co.n-(co.approved_n||0)-(co.submitted_n||0)-(co.draft_n||0));
        var pct=co.n>0?Math.round((co.approved_n||0)/co.n*100):0;
        var cName=(co.company||'').replace(' (Pvt) Ltd','').replace(' (Private) Limited','');
        hh+='<tr style="cursor:pointer" id="gco-row-'+ci+'">'+ 
          '<td><span style="font-size:11px;font-weight:500">'+esc(cName)+'</span> <span style="font-size:10px;color:var(--blue)">\u25bc</span></td>'+
          '<td>'+co.n+'</td>'+
          '<td><span style="color:'+(co.activated_n===co.n?'var(--green)':'var(--amber)')+'">'+co.activated_n+'</span></td>'+
          '<td>'+co.draft_n+'</td>'+
          '<td><span style="color:'+(co.submitted_n?'var(--amber)':'var(--g300)')+'">'+co.submitted_n+'</span></td>'+
          '<td><span style="color:'+(co.approved_n?'var(--green)':'var(--g300)')+'">'+co.approved_n+'</span></td>'+
          '<td><span style="color:'+(notStarted>0?'var(--red)':'var(--g300)')+'">'+notStarted+'</span></td>'+
          '<td>'+pb(pct,pct>=80?'#16A34A':pct>=50?'#D97706':'#DC2626')+'</td></tr>';
      });
      hh+='</tbody></table></div></div>';

      // Appraisal Tracker — Image 2 layout with Mid-Year/Year-End tabs
      hh+='<div class="card" style="margin-bottom:14px">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'+
        '<div><div class="card-title" style="margin-bottom:2px">Appraisal Tracker by Company</div>'+
        '<div style="font-size:11px;color:var(--g500)">Tracks submission progress live \u2014 rating columns appear once scores are submitted.</div></div>'+
        '<div style="display:flex;gap:6px">'+
        '<button class="btn btn-sm btn-blue" id="appr-mid-btn">Mid-Year</button>'+
        '<button class="btn btn-sm" id="appr-ye-btn">Year-End</button></div></div>'+
        '<div id="appr-tracker-body">'+buildApprTrackerTable(coList,'mid')+'</div></div>';

      return hh;
    }

    function buildApprTrackerTable(coList,phase){
      // Image 2 layout: COMPANY | HC | COMPLETE | SELF DONE | IN PROGRESS | NOT STARTED | SUBMIT% | A B C D E | A+B%
      var midDist={}; (s.mid_dist||[]).forEach(function(d){midDist[d.system_rating]=d.n;});
      var yeDist={};  (s.ye_dist||[]).forEach(function(d){yeDist[d.system_rating]=d.n;});
      var dist=phase==='mid'?midDist:yeDist;
      var hh='<div class="tbl-wrap"><table class="tbl"><thead><tr>'+
        '<th style="font-size:9px;font-weight:700;color:var(--g500);text-transform:uppercase">Company</th>'+
        '<th style="font-size:9px;color:var(--g500)">HC</th>'+
        '<th style="font-size:9px;color:var(--green)">\u2713 Complete</th>'+
        '<th style="font-size:9px;color:var(--blue)">Self Done</th>'+
        '<th style="font-size:9px;color:var(--amber)">In Progress</th>'+
        '<th style="font-size:9px;color:var(--red)">Not Started</th>'+
        '<th style="font-size:9px;color:var(--g500)">Submit %</th>'+
        '<th style="font-size:9px;color:var(--g500)">A</th>'+
        '<th style="font-size:9px;color:var(--g500)">B</th>'+
        '<th style="font-size:9px;color:var(--g500)">C</th>'+
        '<th style="font-size:9px;color:var(--g500)">D</th>'+
        '<th style="font-size:9px;color:var(--g500)">E</th>'+
        '<th style="font-size:9px;color:var(--g500)">A+B%</th>'+
        '</tr></thead><tbody>';
      var totHC=0,totComplete=0,totSelf=0,totInProg=0,totNS=0;
      coList.forEach(function(co,ci){
        var selfDone=phase==='mid'?(co.mid_submitted_n||0):(co.ye_submitted_n||0);
        var mgrDone=phase==='mid'?(co.mid_mgr_n||0):(co.ye_mgr_n||0);
        var approvedGoals=co.approved_n||0;
        // Not Started = approved goals but no self-assessment submitted yet
        var notStarted=Math.max(0,approvedGoals-selfDone);
        // In Progress = self done but supervisor not yet done
        var inProg=Math.max(0,selfDone-mgrDone);
        // Complete = supervisor done
        var submitPct=approvedGoals>0?Math.round(selfDone/approvedGoals*100):0;
        var cName=(co.company||'').replace(' (Pvt) Ltd','').replace(' (Private) Limited','');
        totHC+=co.n;totComplete+=mgrDone;totSelf+=selfDone;totInProg+=inProg;totNS+=notStarted;
        hh+='<tr style="cursor:pointer" id="appr-row-'+ci+'">'+ 
          '<td style="font-size:11px;font-weight:500">'+esc(cName)+' <span style="font-size:9px;color:var(--blue)">\u25bc</span></td>'+
          '<td>'+co.n+'</td>'+
          '<td style="color:var(--green);font-weight:600">'+mgrDone+'</td>'+
          '<td style="color:var(--blue);font-weight:600">'+selfDone+'</td>'+
          '<td style="color:var(--amber)">'+inProg+'</td>'+
          '<td style="color:var(--red)">'+notStarted+(!approvedGoals?' <span style="font-size:9px;color:var(--g400)">\u00b7'+co.n+' no goals</span>':'')+'</td>'+
          '<td>'+pb(submitPct,'#3B82F6')+'</td>'+
          '<td style="color:var(--green);font-weight:600">0</td>'+
          '<td style="color:var(--blue)">0</td>'+
          '<td>0</td><td>0</td>'+
          '<td style="color:var(--red)">0</td>'+
          '<td style="color:var(--red);font-weight:600">0%</td>'+
          '</td></tr>';
      });
      // Totals row
      var totPct=totHC>0?Math.round(totSelf/totHC*100):0;
      hh+='<tr style="background:var(--g50);font-weight:700;border-top:2px solid var(--g200)">'+
        '<td style="font-size:11px">All Companies</td><td>'+totHC+'</td>'+
        '<td style="color:var(--green)">'+totComplete+'</td>'+
        '<td style="color:var(--blue)">'+totSelf+'</td>'+
        '<td style="color:var(--amber)">'+totInProg+'</td>'+
        '<td style="color:var(--red)">'+totNS+'</td>'+
        '<td>'+pb(totPct,'#3B82F6')+'</td>'+
        '<td colspan="5" style="font-size:10px;color:var(--g400)">Rating data after scores submitted</td><td></td></tr>';
      return hh+'</tbody></table></div>';
    }


    function buildDistribution(){
      var hh='<div class="two-col" style="margin-bottom:14px">';
      // Mid-year
      hh+='<div class="card"><div class="card-title">Mid-Year Indicative Ratings <span class="card-sub">'+midTotal+' submitted</span></div>';
      if(!midTotal){hh+='<div class="empty" style="padding:20px 0">No mid-year scores yet</div>';}
      else{RATINGS.forEach(function(r){
        var cnt=midDist[r.r]||0,pct=midTotal?Math.round(cnt/midTotal*100):0;
        hh+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px">'+
          '<span style="font-size:11px;font-weight:600;color:'+r.col+'">'+r.r+' \u2014 '+r.lbl+'</span>'+
          '<span style="font-size:11px;color:var(--g400)">'+cnt+' ('+pct+'%)</span></div>'+pb(pct,r.col)+'</div>';
      });}
      hh+='</div>';
      // Year-end
      hh+='<div class="card"><div class="card-title">Year-End Ratings <span class="card-sub">'+yeTotal+' submitted</span></div>';
      if(!yeTotal){hh+='<div class="empty" style="padding:20px 0">No year-end scores yet</div>';}
      else{RATINGS.forEach(function(r){
        var cnt=yeDist[r.r]||0,pct=yeTotal?Math.round(cnt/yeTotal*100):0;
        hh+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px">'+
          '<span style="font-size:11px;font-weight:600;color:'+r.col+'">'+r.r+' \u2014 '+r.lbl+'</span>'+
          '<span style="font-size:11px;color:var(--g400)">'+cnt+' ('+pct+'%)</span></div>'+pb(pct,r.col)+'</div>';
      });}
      hh+='</div></div>';
      return hh;
    }

    function buildDownloads(){
      var hh='<div class="card"><div class="card-title">Download Reports <span class="card-sub">CSV format \u2014 opens in Excel</span></div>'+
        '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px" id="rpt-grid"></div></div>';
      return hh;
    }

    var rt=sel('rpt-tab-live'),rd=sel('rpt-tab-dist'),rdl=sel('rpt-tab-dl');
    function clrRptTabs(){[rt,rd,rdl].forEach(function(t){if(t)t.classList.remove('on');});}

    if(rt)rt.onclick=function(){clrRptTabs();rt.classList.add('on');html('rpt-body',buildLiveTracker());wireApprTrackerTabs(s.by_company||[],s);};

      wireDownloads();
    };

    rt.classList.add('on');
    html('rpt-body',buildLiveTracker());
    wireApprTrackerTabs(s.by_company||[],s);
  });
}

function openCompanyModal(company,type){
  var shortName=company.replace(' (Private) Limited','').replace(' (Pvt) Ltd','').replace(' (Pvt)','');
  var phaseLbl=type==='appraisal_mid'?'Mid-Year Appraisal Status':type==='appraisal_end'?'Year-End Appraisal Status':'Goal Status';
  var title=shortName+' \u2014 '+phaseLbl;

  var m=document.createElement('div');m.className='modal-bg';
  m.onclick=function(e){if(e.target===m)m.remove();};
  m.innerHTML='<div class="modal modal-lg">'+
    '<div class="mhead">'+
    '<div><div class="mtitle">'+esc(title)+'</div>'+
    '<div id="co-modal-sub" style="font-size:11px;color:var(--g400)">Loading\u2026</div></div>'+
    '<button class="mx" id="com-x">\u2715</button></div>'+
    '<div class="mbody" id="co-modal-body"><div class="empty" style="padding:30px">Loading\u2026</div></div>'+
    '<div class="mfoot"><button class="btn" id="com-cls">Close</button></div></div>';
  document.body.appendChild(m);
  sel('com-x').onclick=sel('com-cls').onclick=function(){m.remove();};

  xhr('GET','/api/company-drilldown/'+encodeURIComponent(company),null,function(err,users){
    if(err){
      var b=sel('co-modal-body');if(b)b.innerHTML='<div class="empty">Error: '+esc(err)+'</div>';
      return;
    }
    var sub=sel('co-modal-sub');
    if(sub){
      if(type==='goals'){
        var approved=(users||[]).filter(function(u){return u.goal_status==='approved';}).length;
        var pending=(users||[]).filter(function(u){return u.goal_status==='submitted';}).length;
        var draft=(users||[]).filter(function(u){return u.goal_status==='draft';}).length;
        var notStarted=(users||[]).filter(function(u){return !u.goal_status||u.goal_status==='not_started';}).length;
        sub.innerHTML=(users||[]).length+' employees &nbsp;\u00b7&nbsp; '+
          '<span style="color:var(--green)">'+approved+' approved</span> &nbsp;\u00b7&nbsp; '+
          '<span style="color:var(--amber)">'+pending+' pending</span> &nbsp;\u00b7&nbsp; '+
          '<span style="color:var(--g500)">'+draft+' draft</span> &nbsp;\u00b7&nbsp; '+
          '<span style="color:var(--red)">'+notStarted+' not started</span>';
      } else {
        var phase=type==='appraisal_mid'?'mid':'end';
        var selfDone=(users||[]).filter(function(u){return phase==='mid'?u.mid_submitted:u.ye_submitted;}).length;
        var mgrDone=(users||[]).filter(function(u){return phase==='mid'?u.mid_mgr_submitted:u.ye_mgr_submitted;}).length;
        var pendingSup=(users||[]).length-mgrDone;
        sub.innerHTML=(users||[]).length+' employees &nbsp;\u00b7&nbsp; '+
          '<span style="color:var(--blue)">'+selfDone+' self done</span> &nbsp;\u00b7&nbsp; '+
          '<span style="color:var(--green)">'+mgrDone+' supervisor done</span> &nbsp;\u00b7&nbsp; '+
          '<span style="color:var(--red)">'+pendingSup+' pending supervisor</span>';
      }
    }
    var body=sel('co-modal-body');
    if(body)body.innerHTML=buildCoModalTable(users||[],type);
  });
}

        '<td><div style="font-weight:600;font-size:12px;color:var(--g900)">'+esc(u.name)+'</div></td>'+
        '<td style="font-size:11px;color:var(--g500)">'+esc(u.designation||'\u2014')+'</td>'+
        '<td style="font-size:11px;color:var(--g500)">'+esc(u.grade||'\u2014')+'</td>'+
        '<td style="font-size:11px;color:var(--g600)">'+esc(u.manager_name||'\u2014')+'</td>'+
        '<td>'+bdg(u.goal_status||'not_started')+'</td>'+
        '<td><span class="badge '+(selfDone?'ba':'bd')+'">'+(selfDone?'\u2713 Done':'\u2022 Pending')+'</span>'+

// ── PROMOTIONS ───────────────────────────────────────────────
function pgPromotions(){
  xhr('GET','/api/promotions',null,function(err,rows){
    if(err){setContent('<div class="alert al-err">'+err+'</div>');return;}
    G.promoData=rows||[];
    var cos=[...new Set((rows||[]).map(function(r){return r.company;}))].sort();

    var approved=(rows||[]).filter(function(r){return r.promo_status==='approved';}).length;
    var rejected=(rows||[]).filter(function(r){return r.promo_status==='rejected';}).length;
    var pending=(rows||[]).filter(function(r){return !r.promo_status||r.promo_status==='pending';}).length;

    var h='<div class="stats s4" style="margin-bottom:16px">'+
      sCard((rows||[]).length,'Total Recommended','FY 2026\u201327',null)+
      sCard(pending,'Pending Decision','Awaiting HR review',pending>0?'#D97706':null)+
      sCard(approved,'Approved','\u2713 Promotion confirmed',approved>0?'#16A34A':null)+
      sCard(rejected,'Not Approved','\u2717 Not this cycle',rejected>0?'#DC2626':null)+'</div>';

    h+='<div class="filter-row">'+
      '<input placeholder="Search name\u2026" id="promo-q">'+

      '<select id="promo-st"><option value="">All statuses</option>'+
      '<option value="pending">Pending</option>'+
      '<option value="approved">Approved</option>'+
      '<option value="rejected">Not Approved</option></select>'+
      '<button class="btn btn-sm" id="promo-dl">\u2193 Download CSV</button></div>';

    h+='<div id="promo-list">'+buildPromoList(rows||[])+'</div>';

    sel('promo-co').onchange=filterPromos;
    sel('promo-st').onchange=filterPromos;
    var dlBtn=sel('promo-dl');
    if(dlBtn)dlBtn.onclick=function(){
      var a=document.createElement('a');

      a.download='promotions-2026-27.csv';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
    };
  });

function filterPromos(){
  if(!G.promoData)return;
  var q=((sel('promo-q')||{}).value||'').toLowerCase();
  var co=(sel('promo-co')||{}).value||'';
  var st=(sel('promo-st')||{}).value||'';
  var list=G.promoData;
  if(q)list=list.filter(function(r){return r.name.toLowerCase().includes(q)||String(r.emp_no).includes(q);});
  if(co)list=list.filter(function(r){return r.company===co;});
  if(st)list=list.filter(function(r){return (r.promo_status||'pending')===st;});
  html('promo-list',buildPromoList(list));
}

function buildPromoList(list){
  if(!list.length)return'<div class="card" style="text-align:center;padding:40px">'+
    '<div style="font-size:36px;margin-bottom:12px">\ud83c\udfc5</div>'+
    '<p style="color:var(--g400)">No promotion recommendations found.</p></div>';

  // Group by company
  var byCompany={};
  var coOrder=[];
  list.forEach(function(r){
    var co=r.company||'Unknown';
    if(!byCompany[co]){byCompany[co]=[];coOrder.push(co);}
    byCompany[co].push(r);
  });

  var h='';
  var globalIdx=0;
  coOrder.forEach(function(co){
    var coList=byCompany[co];
    var coShort=co.replace(' (Private) Limited','').replace(' (Pvt) Ltd','');
    var coApproved=coList.filter(function(r){return r.promo_status==='approved';}).length;
    var coRejected=coList.filter(function(r){return r.promo_status==='rejected';}).length;
    var coPending=coList.filter(function(r){return !r.promo_status||r.promo_status==='pending';}).length;

    h+='<div style="margin-bottom:6px;margin-top:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">'+
      '<div style="font-size:13px;font-weight:700;color:var(--g700)">'+esc(coShort)+
      ' <span style="font-size:11px;color:var(--g400);font-weight:400">('+coList.length+' recommended)</span></div>'+
      '<div style="display:flex;gap:8px;font-size:11px">'+
      (coApproved?'<span style="color:var(--green);font-weight:600">\u2713 '+coApproved+' approved</span>':'')+
      (coPending?'<span style="color:var(--amber);font-weight:600">\u23f3 '+coPending+' pending</span>':'')+
      (coRejected?'<span style="color:var(--red);font-weight:600">\u2717 '+coRejected+' not approved</span>':'')+
      '</div></div>';

    coList.forEach(function(r){
      var i=globalIdx++;
      var status=r.promo_status||'pending';
      var statusCol=status==='approved'?'var(--green)':status==='rejected'?'var(--red)':'var(--amber)';
      var statusLbl=status==='approved'?'\u2713 Approved':status==='rejected'?'\u2717 Not Approved':'\u23f3 Pending Decision';

      h+='<div class="card" style="margin-bottom:10px;border-left:4px solid '+statusCol+'">'+
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px">'+
        '<div style="display:flex;align-items:center;gap:12px">'+
        avEl(r)+
        '<div>'+
        '<div style="font-size:14px;font-weight:700;color:var(--g900)">'+esc(r.name)+'</div>'+
        '<div style="font-size:11px;color:var(--g500)">'+esc(r.designation||'')+'</div>'+
        '<div style="font-size:11px;color:var(--g400)">Grade: '+esc(r.grade||'\u2014')+'</div>'+
        '</div></div>'+
        '<div style="text-align:right">'+
        '<span style="font-size:11px;font-weight:700;color:'+statusCol+'">'+statusLbl+'</span>'+
        (r.promo_decision_at?'<div style="font-size:10px;color:var(--g400)">'+fmtD(r.promo_decision_at)+(r.decided_by_name?' by '+esc(r.decided_by_name):'')+'</div>':'')+
        '</div></div>'+

        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:12px">'+
        '<div style="background:var(--g50);border-radius:var(--r);padding:12px">'+
        '<div style="font-size:9px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Performance</div>'+
        '<div style="display:flex;gap:12px;margin-bottom:8px">'+
        '<div style="text-align:center"><div style="font-size:20px;font-weight:700;color:var(--blue)">'+(r.overall_score!=null?r.overall_score+'%':'\u2014')+'</div>'+
        '<div style="font-size:9px;color:var(--g500)">Score</div></div>'+
        '<div style="text-align:center"><div style="font-size:18px;font-weight:700">'+(r.final_rating||r.system_rating?rBdg(r.final_rating||r.system_rating):'\u2014')+'</div>'+
        '<div style="font-size:9px;color:var(--g500)">Rating</div></div></div>'+
        '<div style="font-size:10px;color:var(--g600)"><strong>Supervisor:</strong> '+esc(r.supervisor_name||'\u2014')+'</div>'+
        '</div>'+
        '<div style="background:var(--g50);border-radius:var(--r);padding:12px">'+
        '<div style="font-size:9px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Supervisor Justification</div>'+
        '<div style="font-size:11px;color:var(--g700);line-height:1.5">'+esc(r.promo_justification||'\u2014')+'</div>'+
        (r.mgr_strengths?'<div style="font-size:10px;color:var(--g500);margin-top:6px"><strong>Strengths:</strong> '+esc(r.mgr_strengths)+'</div>':'')+
        '</div></div>'+
        (status==='rejected'&&r.promo_decision_reason?
          '<div class="alert al-warn" style="margin-bottom:10px">\u26a0 Reason: '+esc(r.promo_decision_reason)+'</div>':'');

      if(status==='pending'){
        h+='<div style="display:flex;justify-content:flex-end;gap:8px">'+
          '<button class="btn btn-red btn-sm" id="promo-rej-'+i+'">\u2717 Not Approved</button>'+
          '<button class="btn btn-green btn-sm" id="promo-app-'+i+'">\u2713 Approve Promotion</button>'+
          '</div>';
      } else {
        h+='<div style="display:flex;justify-content:flex-end;gap:8px">'+
          '<button class="btn btn-sm" id="promo-rev-'+i+'">Revise Decision</button>'+
          '</div>';
      }
      h+='</div>';
    });
  });

  setTimeout(function(){
    var globalIdx2=0;
    coOrder.forEach(function(co){
      byCompany[co].forEach(function(r){
        var i=globalIdx2++;
        var appBtn=sel('promo-app-'+i);
        if(appBtn)appBtn.onclick=(function(en,nm){return function(){
          if(!confirm('Approve promotion for '+nm+'?'))return;
          promoDecide(en,'approved',null);
        };})(r.emp_no,r.name);
        var rejBtn=sel('promo-rej-'+i);
        if(rejBtn)rejBtn.onclick=(function(en,nm){return function(){
          openPromoDecisionModal(en,nm,'rejected');
        };})(r.emp_no,r.name);
        var revBtn=sel('promo-rev-'+i);
        if(revBtn)revBtn.onclick=(function(en,nm,st){return function(){
          if(st==='approved'){openPromoDecisionModal(en,nm,'rejected');}
          else{if(!confirm('Change to APPROVED for '+nm+'?'))return;promoDecide(en,'approved',null);}
        };})(r.emp_no,r.name,r.promo_status||'pending');
      });
    });
  },100);

  return h;
}

function openPromoDecisionModal(empNo,name,decision){
  var m=document.createElement('div');m.className='modal-bg';
  m.onclick=function(e){if(e.target===m)m.remove();};
  m.innerHTML='<div class="modal" style="max-width:460px">'+
    '<div class="mhead"><div class="mtitle">\u2717 Not Approve Promotion \u2014 '+esc(name)+'</div>'+
    '<button class="mx" id="pdm-x">\u2715</button></div>'+
    '<div class="mbody">'+
    '<div class="alert al-warn">\u26a0 Please provide a reason. This will be recorded in the HR audit log.</div>'+
    '<div class="fg"><label class="fl">Reason for not approving <span style="color:var(--red)">*</span></label>'+
    '<textarea class="fi" id="pdm-reason" rows="4" placeholder="Explain why the promotion is not being approved at this time\u2026"></textarea></div>'+
    '</div>'+
    '<div class="mfoot">'+
    '<button class="btn" id="pdm-cancel">Cancel</button>'+
    '<button class="btn btn-red" id="pdm-confirm">\u2717 Confirm Not Approved</button>'+
    '</div></div>';
  document.body.appendChild(m);
  sel('pdm-x').onclick=sel('pdm-cancel').onclick=function(){m.remove();};
  sel('pdm-confirm').onclick=function(){
    var reason=(sel('pdm-reason')||{}).value||'';
    if(!reason.trim()){toast('Please provide a reason','error');return;}
    var btn=sel('pdm-confirm');btn.disabled=true;btn.textContent='Saving\u2026';
    promoDecide(empNo,'rejected',reason.trim(),function(){m.remove();});
  };
}

function promoDecide(empNo,decision,reason,cb){
  xhr('POST','/api/promotions/'+empNo+'/decide',{decision:decision,reason:reason||null},function(err){
    if(err){toast(err,'error');return;}
    toast(decision==='approved'?'\u2713 Promotion approved':'\u2717 Promotion not approved','ok');
    if(cb)cb();
    pgPromotions();
  });
}

// ── PERFORMANCE HISTORY ──────────────────────────────────────
function pgHistory(){
  var myRole=G.user&&G.user.role;
  var myEmpNo=G.user&&G.user.emp_no;
  var canViewOthers=isHR()||(RL[myRole]>=RL.supervisor);

  if(!canViewOthers){
    renderHistoryFor(myEmpNo,null,true);
    return;
  }

  // Supervisor/HR: show employee picker + history
  xhr('GET','/api/employees',null,function(err,emps){
    if(err){setContent('<div class="alert al-err">'+err+'</div>');return;}
    var allEmps=emps||[];
    var myEmps;
    if(isHR()){
      myEmps=allEmps;
    } else {
      var treeSet={};
      treeSet[myEmpNo]=true;
      var changed=true;
      while(changed){
        changed=false;
        allEmps.forEach(function(e){
          if(!treeSet[e.emp_no]&&treeSet[e.reports_to]){treeSet[e.emp_no]=true;changed=true;}
        });
      }
      myEmps=allEmps.filter(function(e){return treeSet[e.emp_no];});
    }
    myEmps.sort(function(a,b){return a.name.localeCompare(b.name);});
    G._histEmps=myEmps;

    var targetEmpNo=G.historyEmpNo||myEmpNo;
    var targetName=G.historyEmpName||(myEmps.find(function(e){return e.emp_no===targetEmpNo;})||{}).name||null;

    var h='<div class="card" style="margin-bottom:16px;padding:14px 16px">'+
      '<div style="font-size:12px;font-weight:600;color:var(--g700);margin-bottom:10px">View Performance History For</div>'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">'+
      '<div style="flex:1;min-width:200px;position:relative">'+
      '<label style="font-size:11px;color:var(--g500);display:block;margin-bottom:4px">Type name or employee number</label>'+
      '<input type="text" id="hist-search" class="fi" placeholder="Search employees\u2026" autocomplete="off" style="width:100%">'+
      '<div id="hist-dd" style="display:none;position:absolute;z-index:200;background:#fff;border:1px solid var(--g300);border-radius:var(--r);box-shadow:0 4px 12px rgba(0,0,0,.1);max-height:220px;overflow-y:auto;width:100%;top:100%;left:0"></div>'+
      '</div>'+
      '<button class="btn btn-blue btn-sm" id="hist-load-btn" style="flex-shrink:0">View History</button>'+
      '</div>'+
      '<div id="hist-note" style="margin-top:8px;font-size:11px;color:var(--g500)">'+(targetEmpNo===myEmpNo?'Showing your own history':'')+'</div>'+
      '</div><div id="hist-content"></div>';

    setContent(h);

    var sinp=sel('hist-search'),sdd=sel('hist-dd');
    var curEmpNo=targetEmpNo,curName=targetName;

    if(targetName&&targetEmpNo!==myEmpNo)sinp.value=targetName+' ('+targetEmpNo+')';

    function showDD(q){
      if(!q){sdd.style.display='none';return;}
      var ql=q.toLowerCase();
      var hits=(G._histEmps||[]).filter(function(e){
        return e.name.toLowerCase().indexOf(ql)>-1||String(e.emp_no).indexOf(ql)>-1;
      }).slice(0,15);
      if(!hits.length){sdd.style.display='none';return;}
      var items=hits.map(function(e){
        var co=(e.company||'').replace(' (Private) Limited','').replace(' (Pvt) Ltd','');
        var d=document.createElement('div');
        d.style.cssText='padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--g100);font-size:12px';
        d.innerHTML='<div style="font-weight:600">'+esc(e.name)+'</div><div style="font-size:10px;color:var(--g400)">Emp '+e.emp_no+' \u00b7 '+esc(e.designation||'')+'  \u00b7  '+esc(co)+'</div>';
        d.onmousedown=function(ev){ev.preventDefault();};
        d.onclick=(function(en,nm){return function(){
          curEmpNo=en;curName=nm;
          sinp.value=nm+' ('+en+')';
          sdd.style.display='none';
          var nd=sel('hist-note');
          if(nd)nd.textContent=en===myEmpNo?'Showing your own history':'Selected: '+nm;
        };})(e.emp_no,e.name);
        return d;
      });
      sdd.innerHTML='';
      items.forEach(function(d){sdd.appendChild(d);});
      sdd.style.display='block';
    }

    sinp.oninput=function(){showDD(this.value);};
    sinp.onfocus=function(){if(this.value)showDD(this.value);};
    sinp.onblur=function(){setTimeout(function(){sdd.style.display='none';},200);};
    sinp.onkeydown=function(ev){
      if(ev.key==='Enter'){
        var first=sdd.querySelector('div');
        if(first)first.click();
        else if(curEmpNo)renderHistoryFor(curEmpNo,curName,curEmpNo===myEmpNo);
      }
    };

    var lb=sel('hist-load-btn');
    if(lb)lb.onclick=function(){
      if(!curEmpNo){toast('Please select an employee first','warn');return;}
      renderHistoryFor(curEmpNo,curName,curEmpNo===myEmpNo);
    };

    if(targetEmpNo)renderHistoryFor(targetEmpNo,targetName,targetEmpNo===myEmpNo);
  });
}

function renderHistoryFor(empNo,empName,isOwn){

  setHist('<div class="empty" style="padding:30px">Loading\u2026</div>');
  xhr('GET','/api/performance/history/'+empNo,null,function(err,history){
    if(err){setHist('<div class="alert al-err">'+err+'</div>');return;}
    if(!history||!history.length){
      setHist('<div class="card" style="text-align:center;padding:40px">'+
        '<div style="font-size:36px;margin-bottom:12px">\ud83d\udcdc</div>'+
        '<div style="font-size:14px;font-weight:600;margin-bottom:8px">No past cycle data yet</div>'+
        '<p style="color:var(--g400)">Performance history builds as cycles complete and HR publishes ratings.</p></div>');

      '<div style="font-size:14px;font-weight:600">'+pageTitle+

        '</div></div>'+

        '<div style="font-size:26px;font-weight:700;color:var(--blue);margin-bottom:6px">'+(cycle.mid_score!=null?cycle.mid_score+'%':'\u2014')+'</div>'+
        (midRt?rBdg(midRt)+'<br>':'')+
        (cycle.mid_went_well?'<div style="font-size:10px;color:var(--g600);margin-top:8px"><strong>What went well:</strong><br>'+esc(cycle.mid_went_well)+'</div>':'')+
        (cycle.mid_improve?'<div style="font-size:10px;color:var(--g600);margin-top:6px"><strong>Areas to improve:</strong><br>'+esc(cycle.mid_improve)+'</div>':'')+
        (cycle.mid_mgr_comments?'<div style="font-size:10px;color:var(--g500);margin-top:6px;padding-top:6px;border-top:1px solid var(--g200)"><strong>Supervisor feedback:</strong><br>'+esc(cycle.mid_mgr_comments)+'</div>':'')+
        '</div>'+
        '<div style="background:var(--g50);border-radius:var(--r);padding:14px">'+
        '<div style="font-size:9px;font-weight:700;color:#7C3AED;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Year-End Review</div>'+

        (yeRt?rBdg(yeRt)+'<br>':'')+

          var kraAch=hasAny?Math.round(tot*10)/10:null;
          var bg=kraAch!=null?(kraAch>=85?'#F0FDF4':kraAch>=60?'#FFFBEB':'#FEF2F2'):'var(--g50)';

        }).join('')+
        '</div></div>';
    });
    setHist(hh);
    var dlBtn=sel('hist-dl');
    if(dlBtn)dlBtn.onclick=function(){
      var a=document.createElement('a');
      a.href='/api/export/my-history'+(isOwn?'':'/'+empNo);
      a.download=(empName||'employee')+'-performance-history.csv';
      document.body.appendChild(a);a.click();document.body.removeChild(a);

// ── PERFORMANCE ANALYTICS (HR) ───────────────────────────────────
function pgAnalytics(){
  xhr('GET','/api/analytics/ratings-by-cycle',null,function(err,cycles){
    if(err){setContent('<div class="alert al-err">'+err+'</div>');return;}
    if(!cycles||!cycles.length){
      setContent('<div class="alert al-info">\ud83d\udcca Performance Analytics</div>'+
        '<div class="card" style="text-align:center;padding:40px"><p style="color:var(--g400)">No cycle data yet. Analytics will populate as cycles complete.</p></div>');
      return;
    }

    var h='<div class="alert al-info">\ud83d\udcca <strong>Performance Analytics</strong> \u2014 Year-on-year trends, company ratings, and competency data.</div>';

    // Download buttons
    h+='<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">'+
      '<button class="btn btn-sm" id="an-dl-ratings">\u2193 Download Year-wise Ratings (All Employees)</button>'+
      '<button class="btn btn-sm" id="an-dl-competency">\u2193 Download Competency Ratings</button></div>';

    // Year-on-year distribution
    h+='<div class="card" style="margin-bottom:14px">'+
      '<div class="card-title">Year-on-Year Rating Distribution</div>'+
      '<div class="tbl-wrap"><table class="tbl"><thead><tr>'+
      '<th>Rating</th>'+
      cycles.map(function(c){return'<th>FY '+esc(c.cycle)+'</th>';}).join('')+
      '</tr></thead><tbody>';
    RATINGS.forEach(function(r){
      h+='<tr><td style="font-weight:600;color:'+r.col+'">'+r.r+' \u2014 '+r.lbl+'</td>'+
        cycles.map(function(c){
          var cnt=c.distribution[r.r]||0;
          var total=Object.values(c.distribution).reduce(function(a,b){return a+b;},0);
          var pct=total>0?Math.round(cnt/total*100):0;
          return'<td style="color:'+r.col+';font-weight:'+(cnt>0?'700':'400')+'">'+cnt+(cnt>0?' ('+pct+'%)':'')+'</td>';
        }).join('')+'</tr>';
    });
    h+='<tr style="background:var(--g50);font-weight:700"><td style="color:var(--green)">A+B Total</td>'+
      cycles.map(function(c){
        var ab=(c.distribution.A||0)+(c.distribution.B||0);
        var total=Object.values(c.distribution).reduce(function(a,b){return a+b;},0);
        var pct=total>0?Math.round(ab/total*100):0;
        return'<td style="color:var(--green)">'+ab+(ab>0?' ('+pct+'%)':'')+'</td>';
      }).join('')+'</tr>';
    h+='</tbody></table></div></div>';

    // Company performance by cycle
    var allCos=[...new Set(cycles.flatMap(function(c){return c.employees.map(function(e){return e.company;});}))].sort();
    h+='<div class="card" style="margin-bottom:14px">'+
      '<div class="card-title">Company Performance by Cycle '+
      '<span class="card-sub">Average score | A+B%</span></div>'+
      '<div class="tbl-wrap"><table class="tbl"><thead><tr>'+
      '<th>Company</th>'+
      cycles.map(function(c){return'<th>FY '+esc(c.cycle)+' Avg</th><th>A+B%</th>';}).join('')+
      '</tr></thead><tbody>';
    allCos.forEach(function(co){
      var coShort=co.replace(' (Private) Limited','').replace(' (Pvt) Ltd','');
      h+='<tr><td style="font-size:11px;font-weight:500">'+esc(coShort)+'</td>'+
        cycles.map(function(c){
          var coEmps=c.employees.filter(function(e){return e.company===co&&(e.ye_score!=null||e.final_rating||e.ye_rating);});
          if(!coEmps.length)return'<td colspan="2" style="color:var(--g300);font-size:10px;text-align:center">\u2014</td>';
          var avg=coEmps.reduce(function(s,e){return s+(e.ye_score||0);},0)/coEmps.length;
          var ab=coEmps.filter(function(e){var r=e.final_rating||e.ye_rating;return r==='A'||r==='B';}).length;
          var abPct=Math.round(ab/coEmps.length*100);
          var col=avg>=85?'var(--green)':avg>=60?'var(--amber)':'var(--red)';
          return'<td style="color:'+col+';font-weight:600">'+Math.round(avg*10)/10+'%</td>'+
            '<td style="color:var(--green);font-weight:600">'+abPct+'%</td>';
        }).join('')+'</tr>';
    });
    h+='</tbody></table></div></div>';

    // Competency ratings (current cycle)
    var curCycle=cycles[cycles.length-1];
    var compEmps=curCycle.employees.filter(function(e){return e.c1_self!=null||e.c1_mgr!=null;});
    if(compEmps.length){
      var COMP_LABELS=['Service Delivery & Customer Experience','Operational Excellence','Communication & Stakeholder Handling',
        'Problem Solving & Service Recovery','Ownership, Responsiveness & Execution','Commercial & Business Awareness'];
      h+='<div class="card"><div class="card-title">Competency Ratings \u2014 FY '+esc(curCycle.cycle)+
        ' <span class="card-sub">'+compEmps.length+' employees rated</span></div>'+
        '<div class="tbl-wrap"><table class="tbl"><thead><tr>'+
        '<th>Competency</th><th>Avg Self</th><th>Avg Mgr</th><th>Gap</th>'+
        '</tr></thead><tbody>';
      for(var ci=1;ci<=6;ci++){
        var ck='c'+ci;
        var selfVals=compEmps.filter(function(e){return e[ck+'_self']!=null;}).map(function(e){return e[ck+'_self'];});
        var mgrVals=compEmps.filter(function(e){return e[ck+'_mgr']!=null;}).map(function(e){return e[ck+'_mgr'];});
        var avgSelf=selfVals.length?Math.round(selfVals.reduce(function(a,b){return a+b;},0)/selfVals.length*10)/10:null;
        var avgMgr=mgrVals.length?Math.round(mgrVals.reduce(function(a,b){return a+b;},0)/mgrVals.length*10)/10:null;
        var gap=avgSelf!=null&&avgMgr!=null?Math.round((avgSelf-avgMgr)*10)/10:null;
        var gapCol=gap!=null?(gap>0?'var(--amber)':'var(--green)'):'var(--g400)';
        h+='<tr>'+
          '<td style="font-size:11px">'+esc(COMP_LABELS[ci-1])+'</td>'+
          '<td style="font-weight:600">'+(avgSelf!=null?avgSelf+'/5':'\u2014')+'</td>'+
          '<td style="font-weight:600">'+(avgMgr!=null?avgMgr+'/5':'\u2014')+'</td>'+
          '<td style="color:'+gapCol+';font-weight:600">'+(gap!=null?(gap>0?'+':'')+gap:'')+'</td></tr>';
      }
      h+='</tbody></table></div></div>';
    }

    setContent(h);

    var d1=sel('an-dl-ratings');if(d1)d1.onclick=function(){
      var a=document.createElement('a');a.href='/api/export/analytics-ratings';
      a.download='ratings-by-year.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);
    };
    var d2=sel('an-dl-competency');if(d2)d2.onclick=function(){
      var a=document.createElement('a');a.href='/api/export/analytics-competency';
      a.download='competency-ratings.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);
    };
  });
}

function pgEmployees(){
  xhr('GET','/api/employees',null,function(err,emps){

    G.empData=emps;
    var clusters=[...new Set(emps.filter(function(e){return e.cluster;}).map(function(e){return e.cluster;}))].sort();
    var fStyle='padding:6px 10px;border:1px solid var(--g300);border-radius:var(--r);font-size:12px;font-family:var(--font);outline:none';
    var h='<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">'+
      '<input placeholder="Search name, designation\u2026" id="ed-q" style="'+fStyle+';width:200px">'+
      '<select id="ed-cluster" style="'+fStyle+';min-width:150px">'+
      '<option value="">All Clusters (L2)</option>'+
      clusters.map(function(c){return'<option>'+esc(c)+'</option>';}).join('')+'</select>'+
      '<select id="ed-co" style="'+fStyle+';min-width:200px">'+
      '<option value="">All Companies (L3)</option></select>'+
      '<select id="ed-dept" style="'+fStyle+';min-width:180px">'+
      '<option value="">All Departments (L4)</option></select>'+
